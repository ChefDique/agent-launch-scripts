<svg width="42" height="42" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Gemini: High-Fidelity Animated Orchestrator -->
  <defs>
    <linearGradient id="geminiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8e2de2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a00e0;stop-opacity:1" />
    </linearGradient>
    <filter id="geminiGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Core Pulsing Star -->
  <path d="M50 15 L58 35 L85 35 L65 50 L75 75 L50 60 L25 75 L35 50 L15 35 L42 35 Z" fill="url(#geminiGrad)" filter="url(#geminiGlow)">
    <animateTransform attributeName="transform" type="scale" values="1;1.1;1" dur="2s" repeatCount="indefinite" transform-origin="50 50" />
    <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite" />
  </path>

  <!-- Orbiting Satellite -->
  <circle cx="50" cy="50" r="3" fill="#fff">
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="4s" repeatCount="indefinite" />
    <animate attributeName="cx" values="20;80;20" dur="4s" repeatCount="indefinite" />
  </circle>

  <!-- Data Flow Lines -->
  <g stroke="#fff" stroke-width="0.5" opacity="0.4">
    <line x1="20" y1="50" x2="80" y2="50">
      <animate attributeName="stroke-dasharray" values="0,100;100,0" dur="2s" repeatCount="indefinite" />
    </line>
    <line x1="50" y1="20" x2="50" y2="80">
      <animate attributeName="stroke-dasharray" values="0,100;100,0" dur="2s" repeatCount="indefinite" />
    </line>
  </g>
</svg>
