<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Hermes">
  <defs>
    <linearGradient id="hermesGold" x1="18" y1="4" x2="44" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff3a6"/>
      <stop offset="0.42" stop-color="#f5c542"/>
      <stop offset="1" stop-color="#b97914"/>
    </linearGradient>
    <filter id="hermesGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    .hermes-mark { animation: hermes-bob 2.8s ease-in-out infinite; transform-origin: 32px 34px; }
    .hermes-wing-left { animation: hermes-wing-left 1.8s ease-in-out infinite; transform-origin: 31px 20px; }
    .hermes-wing-right { animation: hermes-wing-right 1.8s ease-in-out infinite; transform-origin: 33px 20px; }
    .hermes-orb { animation: hermes-pulse 2.2s ease-in-out infinite; transform-origin: center; }
    @keyframes hermes-bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }
    @keyframes hermes-wing-left {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(-5deg); }
    }
    @keyframes hermes-wing-right {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(5deg); }
    }
    @keyframes hermes-pulse {
      0%, 100% { opacity: 0.78; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.08); }
    }
  </style>
  <g class="hermes-mark" filter="url(#hermesGlow)">
    <rect x="30" y="10" width="4" height="46" rx="2" fill="url(#hermesGold)"/>
    <g class="hermes-wing-left">
      <path d="M30 18 C24 14 14 14 10 18 C14 16 22 16 28 20" fill="#ffe785" opacity="0.92"/>
      <path d="M30 22 C26 19 18 19 14 22 C18 20 24 20 28 24" fill="#d4961c" opacity="0.82"/>
    </g>
    <g class="hermes-wing-right">
      <path d="M34 18 C40 14 50 14 54 18 C50 16 42 16 36 20" fill="#ffe785" opacity="0.92"/>
      <path d="M34 22 C38 19 46 19 50 22 C46 20 40 20 36 24" fill="#d4961c" opacity="0.82"/>
    </g>
    <path d="M32 48 C22 44 20 38 26 34 C20 36 18 42 24 46 C18 40 22 30 30 28 C24 32 22 38 28 42"
      fill="none" stroke="#f5c542" stroke-width="2.6" stroke-linecap="round"/>
    <path d="M32 48 C42 44 44 38 38 34 C44 36 46 42 40 46 C46 40 42 30 34 28 C40 32 42 38 36 42"
      fill="none" stroke="#d4961c" stroke-width="2.6" stroke-linecap="round"/>
    <circle class="hermes-orb" cx="32" cy="10" r="4.4" fill="#f5c542"/>
    <circle cx="32" cy="10" r="2" fill="#fff8e1" opacity="0.8"/>
  </g>
</svg>
