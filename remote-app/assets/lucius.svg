<svg width="42" height="42" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Lucius Fox: Wayne Tech HUD (refined 2026-05-03)
       Polish notes: optically centered figure on cy=52 (matches Xavier
       baseline). Single amber accent color (#ffaa00) with neutral darks
       below for contrast. Stroke weights normalized to 1.2 / 1.8 (no more
       1px hairlines that disappear at small sizes). Reduced from 2
       blinking elements to 1 slow HUD scan (3s loop) — the previous 1s
       sweep felt nervous at dock scale. -->
  <defs>
    <linearGradient id="lHead" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#7e5b48" />
      <stop offset="100%" stop-color="#5b3d2e" />
    </linearGradient>
    <linearGradient id="lSuit" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#222a35" />
      <stop offset="100%" stop-color="#141821" />
    </linearGradient>
  </defs>

  <!-- Suit silhouette — collar V, anchored to baseline. -->
  <path d="M22 75 L50 88 L78 75 V100 H22 Z" fill="url(#lSuit)" stroke="#3a4452" stroke-width="1.2" />
  <path d="M50 88 L46 100 M50 88 L54 100" stroke="#3a4452" stroke-width="1.2" />

  <!-- Lapel notch + tie strap — minimal accent, no animation. -->
  <path d="M50 88 L50 96" stroke="#ffaa00" stroke-width="1.2" opacity="0.7" />

  <!-- Head — same ellipse anatomy as Xavier for cross-agent consistency. -->
  <ellipse cx="50" cy="48" rx="20" ry="24" fill="url(#lHead)" stroke="#ffaa00" stroke-width="1.2" />

  <!-- Glowing visor — solid frame, internal scanning bar (slow). -->
  <rect x="29" y="42" width="42" height="13" rx="3" fill="#0a0a0e" stroke="#ffaa00" stroke-width="1.5" />
  <rect x="31" y="44" width="38" height="9" rx="1.5" fill="#1c1d22" />

  <!-- Single slow HUD scan — 3s loop, smoother than the old 1s. -->
  <rect x="31" y="44" width="6" height="9" fill="#ffaa00" opacity="0.85">
    <animate attributeName="x" values="31;63;31" dur="3s" repeatCount="indefinite" />
  </rect>

  <!-- Faint visor-light reflection — static highlight, no motion. -->
  <rect x="33" y="45" width="34" height="1.5" fill="#ffd47e" opacity="0.35" />
</svg>
