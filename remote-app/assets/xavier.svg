<svg width="42" height="42" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Xavier: Cerebro & Neural Waves (High Visibility) -->
  <defs>
    <radialGradient id="neuralGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0088ff;stop-opacity:0" />
    </radialGradient>
  </defs>
  <!-- Bright Skin Tone -->
  <path d="M50 20 C35 20 25 35 25 50 C25 65 35 75 50 75 C65 75 75 65 75 50 C75 35 65 20 50 20" fill="#ffdbac" />
  <!-- Vibrant Cerebro Rings -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#00ffff" stroke-width="1" stroke-dasharray="5 10">
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="6s" repeatCount="indefinite" />
  </circle>
  <!-- Shiny Cerebro Helmet Frame -->
  <path d="M25 50 Q25 15 50 15 Q75 15 75 50" fill="none" stroke="#e0e0e0" stroke-width="4" />
  <rect x="45" y="10" width="10" height="8" fill="#c0c0c0" />
  <!-- Bright Neural Pulse -->
  <circle cx="50" cy="50" r="5" fill="url(#neuralGlow)">
    <animate attributeName="r" values="5;48;5" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="1;0;1" dur="2s" repeatCount="indefinite" />
  </circle>
  <!-- High Contrast Eyes -->
  <circle cx="42" cy="48" r="3" fill="#000">
    <animate attributeName="ry" values="3;0.5;3" dur="4s" repeatCount="indefinite" />
  </circle>
  <circle cx="58" cy="48" r="3" fill="#000">
    <animate attributeName="ry" values="3;0.5;3" dur="4s" repeatCount="indefinite" />
  </circle>
</svg>
