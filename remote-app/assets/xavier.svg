<svg width="42" height="42" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Xavier: Neural Overdrive (Cinematic) -->
  <defs>
    <radialGradient id="neuralPulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0044ff;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Neural Pathway Grid -->
  <g stroke="#00ffff" stroke-width="0.3" opacity="0.4" stroke-dasharray="1 3">
    <path d="M50 50 L10 10 M50 50 L90 10 M50 50 L50 0 M50 50 L10 90 M50 50 L90 90">
      <animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite" />
    </path>
  </g>

  <path d="M50 20 C35 20 25 35 25 50 C25 65 35 75 50 75 C65 75 75 65 75 50 C75 35 65 20 50 20" fill="#ffdbac" />
  
  <!-- High-Energy Cerebro -->
  <path d="M25 50 Q25 10 50 10 Q75 10 75 50" fill="none" stroke="#fff" stroke-width="3">
    <animate attributeName="stroke-width" values="3;5;3" dur="2s" repeatCount="indefinite" />
  </path>
  
  <!-- Rotating Data Ring -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#00ffff" stroke-width="1" stroke-dasharray="5 15">
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="4s" repeatCount="indefinite" />
  </circle>

  <!-- High-Frequency Pulse -->
  <circle cx="50" cy="50" r="5" fill="url(#neuralPulse)">
    <animate attributeName="r" values="5;45;5" dur="1.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="1;0;1" dur="1.5s" repeatCount="indefinite" />
  </circle>

  <circle cx="42" cy="48" r="3" fill="#000" />
  <circle cx="58" cy="48" r="3" fill="#000" />
</svg>
