<svg width="42" height="42" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Swarmy: Kinetic Tech Edition -->
  <defs>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fff" />
      <stop offset="100%" style="stop-color:#00ffff;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- High-Speed Orbitals -->
  <circle cx="50" cy="50" r="1.5" fill="#fff">
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="1s" repeatCount="indefinite" />
    <animate attributeName="cx" values="5;95;5" dur="1s" repeatCount="indefinite" />
  </circle>
  <circle cx="50" cy="50" r="2" fill="#00ffff">
    <animateTransform attributeName="transform" type="rotate" from="360 50 50" to="0 50 50" dur="1.5s" repeatCount="indefinite" />
    <animate attributeName="cy" values="5;95;5" dur="1.5s" repeatCount="indefinite" />
  </circle>

  <!-- Body -->
  <circle cx="50" cy="50" r="38" fill="#00ffff" stroke="#fff" stroke-width="2">
    <animate attributeName="r" values="36;40;36" dur="0.5s" repeatCount="indefinite" />
  </circle>

  <g stroke="#fff" stroke-width="8" stroke-linecap="round">
    <path d="M30 30 L15 5">
      <animateTransform attributeName="transform" type="rotate" from="-10 30 30" to="20 30 30" dur="0.2s" repeatCount="indefinite" additive="sum" />
    </path>
    <path d="M70 30 L85 5">
      <animateTransform attributeName="transform" type="rotate" from="10 70 30" to="-20 70 30" dur="0.2s" repeatCount="indefinite" additive="sum" />
    </path>
  </g>

  <rect x="32" y="40" width="14" height="12" rx="6" fill="#fff">
    <animate attributeName="height" values="12;1;12" dur="2s" repeatCount="indefinite" />
  </rect>
  <rect x="54" y="40" width="14" height="12" rx="6" fill="#fff">
    <animate attributeName="height" values="12;1;12" dur="2s" repeatCount="indefinite" />
  </rect>
</svg>
