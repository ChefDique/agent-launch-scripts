<svg width="42" height="42" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Swarmy: Multi-agent overlord (refined 2026-05-03)
       Polish notes: heavy reductionist pass. v1 had FIVE simultaneous
       animations (orbital 1, orbital 2, body radius pulse, two arm
       rotations, two eye blinks) — read as a strobe at 46×46. v2 keeps
       the swarm-of-orbitals concept but at the iconic level: three small
       satellites circling a central core, all on the same slow 6s
       rotation timing, plus the core radius breath. Eyes static. Arms
       removed (read as legs/twigs at small scale). Palette unified to
       cyan + soft pink-magenta accent matching the panel swarmy token
       (#ff77cc). -->
  <defs>
    <radialGradient id="sCore" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#aef9ff" />
      <stop offset="65%"  stop-color="#21bcd6" />
      <stop offset="100%" stop-color="#0e7c93" />
    </radialGradient>
  </defs>

  <!-- Swarm halo — soft glow disc behind the core. Static. -->
  <circle cx="50" cy="52" r="40" fill="#ff77cc" opacity="0.08" />

  <!-- Three satellites — single rotation group, single 6s timing.
       Positioned at 0°, 120°, 240° around the core radius. -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 50 52" to="360 50 52" dur="6s" repeatCount="indefinite" />
    <circle cx="50" cy="14" r="3" fill="#ff77cc" opacity="0.95" />
    <circle cx="83" cy="71" r="2.4" fill="#7df0ff" opacity="0.85" />
    <circle cx="17" cy="71" r="2.4" fill="#7df0ff" opacity="0.85" />
  </g>

  <!-- Core body — single breath pulse on radius, 4s loop. -->
  <circle cx="50" cy="52" r="22" fill="url(#sCore)" stroke="#ffffff" stroke-width="1.4">
    <animate attributeName="r" values="22;24;22" dur="4s" repeatCount="indefinite" />
  </circle>

  <!-- Core ring — secondary outline for depth. -->
  <circle cx="50" cy="52" r="26" fill="none" stroke="#ff77cc" stroke-width="0.8" stroke-dasharray="2 6" opacity="0.6" />

  <!-- Eyes — calm, static, friendly. -->
  <circle cx="42" cy="50" r="2.4" fill="#0a1620" />
  <circle cx="58" cy="50" r="2.4" fill="#0a1620" />

  <!-- Eye sparkle highlights for "alive" feel without animation. -->
  <circle cx="43" cy="49" r="0.8" fill="#ffffff" opacity="0.9" />
  <circle cx="59" cy="49" r="0.8" fill="#ffffff" opacity="0.9" />
</svg>
