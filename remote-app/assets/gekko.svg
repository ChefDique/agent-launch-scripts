<svg width="42" height="42" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Gordon Gekko: High-Visibility Shimmer Edition -->
  <defs>
    <linearGradient id="suitShimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0);" />
      <stop offset="50%" style="stop-color:rgba(255,255,255,0.4);" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0);" />
    </linearGradient>
  </defs>

  <path d="M50 20 C40 20 32 30 32 45 C32 60 40 70 50 70 C60 70 68 60 68 45 C68 30 60 20 50 20" fill="#ffdbac" />
  <path d="M32 40 Q32 10 50 10 Q68 10 68 40 L68 30 Q68 15 50 15 Q32 15 32 30 Z" fill="#4e342e" />
  
  <!-- Sharp Pinstriped Suit -->
  <path d="M25 70 L50 85 L75 70 V100 H25 Z" fill="#2c3e50" />
  <g stroke="#fff" stroke-width="1" opacity="0.4">
    <path d="M35 70 V100" />
    <path d="M45 80 V100" />
    <path d="M55 80 V100" />
    <path d="M65 70 V100" />
  </g>

  <!-- Shimmer Overlay -->
  <rect x="25" y="70" width="50" height="30" fill="url(#suitShimmer)">
    <animate attributeName="x" values="-50;100" dur="2s" repeatCount="indefinite" />
  </rect>

  <path d="M50 85 L58 100 L42 100 Z" fill="#e74c3c" />
  
  <path d="M42 45 H46 M54 45 H58" stroke="#000" stroke-width="2" />
  <path d="M44 60 Q50 64 56 60" fill="none" stroke="#000" stroke-width="1.5" />
</svg>
