<svg width="42" height="42" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Gordon Gekko: High Visibility Edition -->
  <defs>
    <linearGradient id="suitGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34495e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c3e50;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0" />
      <stop offset="50%" style="stop-color:white;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:white;stop-opacity:0" />
    </linearGradient>
  </defs>
  <!-- Face (Brightened) -->
  <path d="M50 20 C40 20 32 30 32 45 C32 60 40 70 50 70 C60 70 68 60 68 45 C68 30 60 20 50 20" fill="#ffdbac" />
  <!-- Slicked Back Hair -->
  <path d="M32 40 Q32 15 50 15 Q68 15 68 40 L68 30 Q68 18 50 18 Q32 18 32 30 Z" fill="#5d4037" />
  <rect x="35" y="15" width="30" height="10" fill="url(#shimmer)">
    <animate attributeName="x" values="-30;100" dur="2.5s" repeatCount="indefinite" />
  </rect>
  <!-- Pinstriped Suit (Lighter Navy) -->
  <path d="M25 70 L50 85 L75 70 L75 100 L25 100 Z" fill="url(#suitGrad)" />
  <!-- HIGH VISIBILITY PINSTRIPES -->
  <path d="M35 70 L35 100 M45 78 L45 100 M55 78 L55 100 M65 70 L65 100" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" />
  <!-- Shimmer on suit -->
  <rect x="25" y="70" width="50" height="30" fill="url(#shimmer)">
    <animate attributeName="x" values="-50;100" dur="3s" repeatCount="indefinite" />
  </rect>
  <!-- Bright Red Power Tie -->
  <path d="M50 85 L58 100 L42 100 Z" fill="#e74c3c">
     <animate attributeName="opacity" values="1;0.7;1" dur="1.5s" repeatCount="indefinite" />
  </path>
  <!-- Bright Sparkles -->
  <circle cx="20" cy="30" r="2.5" fill="white">
    <animate attributeName="opacity" values="0;1;0" dur="0.8s" repeatCount="indefinite" />
  </circle>
  <circle cx="80" cy="50" r="2.5" fill="white">
    <animate attributeName="opacity" values="0;1;0" dur="0.8s" begin="0.4s" repeatCount="indefinite" />
  </circle>
</svg>
