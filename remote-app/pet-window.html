<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' file: data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' file: data:;">
  <title>AgentRemote Pet</title>
  <style>
    :root {
      --accent: #e07c4c;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
      --text-primary: #f4f4f8;
      --text-muted: #9a9aa8;
      --bg-deep: rgba(8, 8, 14, 0.72);
      --bg-glass: rgba(20, 20, 30, 0.64);
      --border-soft: rgba(255, 255, 255, 0.12);
    }
    * { box-sizing: border-box; }
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      color: var(--text-primary);
      font-family: "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
      user-select: none;
    }
    body {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 8px 8px 10px;
      -webkit-app-region: drag;
    }
    .pet-shell {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      gap: 5px;
    }
    .bubble {
      position: relative;
      width: min(100%, 306px);
      min-height: 64px;
      max-height: min(132px, calc(100vh - 118px));
      border: 1px solid var(--border-soft);
      border-radius: 16px;
      background:
        radial-gradient(circle at 18px 16px, color-mix(in srgb, var(--accent) 14%, transparent), transparent 34px),
        linear-gradient(180deg, rgba(255, 255, 255, 0.045), transparent 40%),
        var(--bg-glass);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.09),
        0 14px 28px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(24px) saturate(136%);
      overflow: hidden;
      opacity: 0.98;
      -webkit-app-region: no-drag;
      transition:
        max-height 0.2s var(--ease),
        min-height 0.2s var(--ease),
        border-color 0.2s var(--ease),
        box-shadow 0.2s var(--ease);
    }
    body.chat-expanded .bubble {
      min-height: 144px;
      max-height: min(236px, calc(100vh - 118px));
      border-color: color-mix(in srgb, var(--accent) 34%, rgba(255, 255, 255, 0.13));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.10),
        0 18px 34px rgba(0, 0, 0, 0.38),
        0 0 0 1px color-mix(in srgb, var(--accent) 14%, transparent);
    }
    .bubble::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 30px;
      background: linear-gradient(180deg, rgba(8, 8, 14, 0.66), rgba(8, 8, 14, 0));
      pointer-events: none;
      z-index: 1;
    }
    .chat-meta {
      position: absolute;
      top: 8px;
      left: 10px;
      max-width: 112px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.26px;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 2;
    }
    .live-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px color-mix(in srgb, var(--accent) 70%, transparent);
      flex: 0 0 auto;
    }
    .agent-name {
      min-width: 0;
      max-width: 96px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .chrome-actions {
      position: absolute;
      top: 5px;
      right: 5px;
      display: flex;
      align-items: center;
      gap: 3px;
      z-index: 3;
      -webkit-app-region: no-drag;
    }
    .icon-btn {
      width: 18px;
      height: 18px;
      border: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.62);
      display: grid;
      place-items: center;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
      -webkit-app-region: no-drag;
    }
    .icon-btn:hover {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.12);
    }
    .reply-toggle {
      width: 38px;
      border-radius: 999px;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.18px;
      text-transform: uppercase;
    }
    body.chat-expanded .reply-toggle {
      display: none;
    }
    .collapse-btn {
      font-size: 14px;
      transform: rotate(0deg);
      transition: transform 0.18s var(--ease), background 0.18s var(--ease), color 0.18s var(--ease);
    }
    body.chat-expanded .collapse-btn {
      transform: rotate(180deg);
    }
    .log {
      min-height: 36px;
      max-height: min(66px, calc(100vh - 184px));
      overflow: auto;
      padding: 29px 10px 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 10.5px;
      line-height: 1.34;
      user-select: text;
      transition: max-height 0.2s var(--ease);
    }
    body.chat-expanded .log {
      min-height: 58px;
      max-height: min(112px, calc(100vh - 214px));
      font-size: 11px;
      line-height: 1.38;
    }
    .log::-webkit-scrollbar { width: 4px; }
    .log::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
    }
    .msg {
      display: block;
      min-width: 0;
      color: rgba(244, 244, 248, 0.9);
    }
    .msg .from {
      display: none;
      color: var(--accent);
      font-weight: 700;
      text-transform: uppercase;
    }
    .msg .text {
      display: block;
      min-width: 0;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    body:not(.chat-expanded) .msg:nth-last-child(n+3) {
      display: none;
    }
    body:not(.chat-expanded) .msg .text {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .empty {
      color: var(--text-muted);
      font-style: italic;
    }
    .reply {
      display: none;
      grid-template-columns: minmax(0, 1fr) 46px;
      gap: 6px;
      padding: 0 8px 8px;
    }
    body.chat-expanded .reply {
      display: grid;
    }
    .reply input {
      min-width: 0;
      height: 28px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
      padding: 0 8px;
      font: inherit;
      font-size: 11px;
      outline: none;
      -webkit-app-region: no-drag;
    }
    .reply input:focus {
      border-color: color-mix(in srgb, var(--accent) 68%, white 8%);
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 20%, transparent);
    }
    .reply button {
      height: 28px;
      border: 0;
      border-radius: 8px;
      background: color-mix(in srgb, var(--accent) 82%, white 8%);
      color: #120c09;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.4px;
      cursor: pointer;
      -webkit-app-region: no-drag;
    }
    .reply button:disabled {
      cursor: default;
      opacity: 0.46;
      filter: grayscale(0.4);
    }
    .resize-grip {
      position: absolute;
      right: 4px;
      bottom: 4px;
      width: 12px;
      height: 12px;
      border-right: 1px solid rgba(255, 255, 255, 0.24);
      border-bottom: 1px solid rgba(255, 255, 255, 0.24);
      opacity: 0.55;
      pointer-events: none;
    }
    .chat-tab {
      display: none;
      align-items: center;
      gap: 6px;
      height: 26px;
      padding: 0 10px;
      border: 1px solid rgba(255, 255, 255, 0.11);
      border-radius: 999px;
      background: rgba(20, 20, 30, 0.68);
      color: var(--text-primary);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.32);
      backdrop-filter: blur(22px) saturate(132%);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.18px;
      cursor: pointer;
      -webkit-app-region: no-drag;
    }
    .chat-tab::before {
      content: "";
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px color-mix(in srgb, var(--accent) 70%, transparent);
    }
    body.chat-collapsed .bubble {
      display: none;
    }
    body.chat-collapsed .chat-tab {
      display: flex;
    }
    body.chat-collapsed.chat-expanded .reply {
      display: none;
    }
    .sprite-wrap {
      position: relative;
      width: 112px;
      height: 122px;
      flex: 0 0 auto;
      filter: drop-shadow(0 18px 24px rgba(0, 0, 0, 0.48));
      transform-origin: 50% 75%;
      animation: float 4.8s var(--ease) infinite;
    }
    .sprite-wrap::before {
      content: "";
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 4px;
      height: 28px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, color-mix(in srgb, var(--accent) 24%, transparent), transparent 70%);
      filter: blur(10px);
      opacity: 0.78;
    }
    .sprite {
      --pet-y: 0px;
      --pet-to-x: -576px;
      --pet-step: steps(6);
      position: relative;
      width: 96px;
      height: 104px;
      margin: 6px auto 0;
      display: block;
      background-image: var(--pet-sheet);
      background-repeat: no-repeat;
      background-size: 768px 936px;
      background-position: 0 var(--pet-y);
      image-rendering: auto;
      animation: row 1.25s var(--pet-step) infinite;
    }
    body.mood-running-right .sprite {
      --pet-y: -104px;
      --pet-to-x: -768px;
      --pet-step: steps(8);
      animation-duration: 0.92s;
    }
    body.mood-running-left .sprite {
      --pet-y: -208px;
      --pet-to-x: -768px;
      --pet-step: steps(8);
      animation-duration: 0.92s;
    }
    body.mood-waving .sprite {
      --pet-y: -312px;
      --pet-to-x: -384px;
      --pet-step: steps(4);
      animation-duration: 0.74s;
    }
    body.sending .sprite,
    body.mood-jumping .sprite {
      --pet-y: -416px;
      --pet-to-x: -480px;
      --pet-step: steps(5);
      animation-duration: 0.8s;
    }
    body.error .sprite,
    body.mood-failed .sprite {
      --pet-y: -520px;
      --pet-to-x: -768px;
      --pet-step: steps(8);
      animation-duration: 0.95s;
    }
    body.mood-waiting .sprite {
      --pet-y: -624px;
      --pet-to-x: -576px;
      --pet-step: steps(6);
      animation-duration: 1.25s;
    }
    body.mood-running .sprite {
      --pet-y: -728px;
      --pet-to-x: -576px;
      --pet-step: steps(6);
      animation-duration: 0.82s;
    }
    body.mood-review .sprite {
      --pet-y: -832px;
      --pet-to-x: -576px;
      --pet-step: steps(6);
      animation-duration: 1.2s;
    }
    body.pet-moving .sprite-wrap {
      animation-duration: 0.9s;
      filter:
        drop-shadow(0 18px 24px rgba(0, 0, 0, 0.48))
        drop-shadow(0 0 12px color-mix(in srgb, var(--accent) 45%, transparent));
    }
    @keyframes row {
      to { background-position: var(--pet-to-x) var(--pet-y); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50% { transform: translateY(-4px) rotate(1.5deg); }
    }
  </style>
</head>
<body>
  <main class="pet-shell">
    <button class="chat-tab" id="chat-tab" type="button" title="Show chat" aria-label="Show chat">chat</button>
    <section class="bubble" aria-label="Agent pet chat">
      <div class="chat-meta">
        <span class="live-dot"></span>
        <span class="agent-name" id="agent-name">Agent</span>
      </div>
      <div class="chrome-actions">
        <button class="icon-btn reply-toggle" id="reply-toggle" title="Reply" aria-label="Reply">reply</button>
        <button class="icon-btn collapse-btn" id="collapse" title="Expand chat" aria-label="Expand chat">^</button>
        <button class="icon-btn close-btn" id="close" title="Close pet" aria-label="Close pet">x</button>
      </div>
      <div class="log" id="log">
        <div class="empty">waiting for agent output</div>
      </div>
      <div class="reply">
        <input id="reply-input" type="text" autocomplete="off" spellcheck="false" placeholder="reply" />
        <button id="reply" disabled>Send</button>
      </div>
      <span class="resize-grip" aria-hidden="true"></span>
    </section>
    <div class="sprite-wrap" title="Drag to move">
      <span class="sprite" id="sprite" role="presentation"></span>
    </div>
  </main>
  <script>
    const { ipcRenderer } = require('electron');
    const params = new URLSearchParams(window.location.search);
    const agentId = params.get('agentId') || '';
    let config = null;
    let chatTailOffset = 0;
    let historyLoaded = false;
    let pollHandle = null;
    let moodTimer = null;

    const nameEl = document.getElementById('agent-name');
    const logEl = document.getElementById('log');
    const inputEl = document.getElementById('reply-input');
    const sendBtn = document.getElementById('reply');
    const closeBtn = document.getElementById('close');
    const collapseBtn = document.getElementById('collapse');
    const replyToggleBtn = document.getElementById('reply-toggle');
    const chatTabBtn = document.getElementById('chat-tab');
    const collapseKey = `agentremote.pet.${agentId || 'unknown'}.chatCollapsed`;
    const expandKey = `agentremote.pet.${agentId || 'unknown'}.chatExpanded`;

    function normalizeSender(value) {
      const raw = String(value || '').toLowerCase();
      if (raw.startsWith('claude-')) return raw.slice(7);
      if (raw === 'overlordswarmy') return 'swarmy';
      return raw;
    }

    function messageBelongsHere(env) {
      if (!env || typeof env !== 'object' || !config) return false;
      const from = normalizeSender(env.from);
      const to = normalizeSender(env.to);
      const id = normalizeSender(config.agent.id);
      const label = normalizeSender(config.agent.displayName);
      return from === 'richard' || from === id || from === label || to === id || to === label;
    }

    function scrollToBottom() {
      logEl.scrollTop = logEl.scrollHeight;
    }

    function syncChatControls() {
      const collapsed = document.body.classList.contains('chat-collapsed');
      const expanded = document.body.classList.contains('chat-expanded');
      const title = collapsed ? 'Show chat' : (expanded ? 'Compact chat' : 'Expand chat');
      collapseBtn.title = title;
      collapseBtn.setAttribute('aria-label', title);
    }

    function setCollapsed(collapsed) {
      document.body.classList.toggle('chat-collapsed', collapsed);
      try { localStorage.setItem(collapseKey, collapsed ? '1' : '0'); } catch {}
      syncChatControls();
      if (!collapsed) requestAnimationFrame(scrollToBottom);
    }

    function setExpanded(expanded) {
      document.body.classList.toggle('chat-expanded', expanded);
      try { localStorage.setItem(expandKey, expanded ? '1' : '0'); } catch {}
      if (expanded) {
        setCollapsed(false);
        requestAnimationFrame(() => {
          scrollToBottom();
          inputEl.focus();
        });
      }
      syncChatControls();
    }

    const MOOD_CLASSES = [
      'mood-running-right',
      'mood-running-left',
      'mood-waving',
      'mood-jumping',
      'mood-failed',
      'mood-waiting',
      'mood-running',
      'mood-review'
    ];

    function normalizeMood(value) {
      const mood = String(value || 'idle').toLowerCase();
      if (mood === 'recording' || mood === 'sent') return 'waving';
      if (mood === 'transcribing' || mood === 'thinking') return 'review';
      if (mood === 'error' || mood === 'failed') return 'failed';
      if (mood === 'moving-right') return 'running-right';
      if (mood === 'moving-left') return 'running-left';
      if (MOOD_CLASSES.includes(`mood-${mood}`)) return mood;
      return 'idle';
    }

    function setMood(mood, ms = 0) {
      if (moodTimer) {
        clearTimeout(moodTimer);
        moodTimer = null;
      }
      document.body.classList.remove(...MOOD_CLASSES);
      const next = normalizeMood(mood);
      if (next !== 'idle') document.body.classList.add(`mood-${next}`);
      if (ms > 0) {
        moodTimer = setTimeout(() => {
          document.body.classList.remove(...MOOD_CLASSES);
          moodTimer = null;
        }, ms);
      }
    }

    function renderMessages(envelopes, append = false) {
      const filtered = (Array.isArray(envelopes) ? envelopes : []).filter(messageBelongsHere).slice(-6);
      if (!append) logEl.innerHTML = '';
      if (!filtered.length && !append && logEl.children.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = 'waiting for agent output';
        logEl.appendChild(empty);
        return;
      }
      const existingEmpty = logEl.querySelector('.empty');
      if (existingEmpty && filtered.length) existingEmpty.remove();
      for (const env of filtered) {
        const row = document.createElement('div');
        row.className = 'msg';
        const from = document.createElement('span');
        from.className = 'from';
        from.textContent = normalizeSender(env.from || '?');
        const body = document.createElement('span');
        body.className = 'text';
        body.textContent = String(env.message || '');
        row.appendChild(from);
        row.appendChild(body);
        logEl.appendChild(row);
      }
      while (logEl.children.length > 6) logEl.removeChild(logEl.firstElementChild);
      scrollToBottom();
    }

    async function loadHistory() {
      const res = await ipcRenderer.invoke('chat-tail-init');
      if (!res || !res.ok) return;
      chatTailOffset = res.offset || 0;
      historyLoaded = true;
      renderMessages(res.envelopes || [], false);
    }

    async function tailRefresh() {
      if (!historyLoaded) return;
      const res = await ipcRenderer.invoke('chat-tail-read', { offset: chatTailOffset });
      if (!res || !res.ok) return;
      chatTailOffset = typeof res.offset === 'number' ? res.offset : chatTailOffset;
      renderMessages(res.envelopes || [], true);
    }

    function applyConfig(next) {
      config = next;
      if (!config || !config.agent || !config.pet) return;
      document.documentElement.style.setProperty('--accent', config.agent.themeColor || '#e07c4c');
      nameEl.textContent = config.agent.displayName || config.agent.id;
      document.getElementById('sprite').style.setProperty('--pet-sheet', `url("${config.pet.sheetUrl}")`);
      document.title = `${config.agent.displayName || config.agent.id} Pet`;
    }

    async function init() {
      const res = await ipcRenderer.invoke('get-agent-pet-config', { agentId });
      if (!res || !res.ok) {
        nameEl.textContent = 'Pet unavailable';
        return;
      }
      applyConfig(res.config);
      await loadHistory();
      pollHandle = setInterval(tailRefresh, 4000);
    }

    async function sendReply() {
      const text = inputEl.value.trim();
      if (!text || !config) return;
      inputEl.value = '';
      sendBtn.disabled = true;
      document.body.classList.add('sending');
      setMood('jumping', 900);
      const local = {
        from: 'richard',
        to: config.agent.id,
        message: text
      };
      renderMessages([local], true);
      try {
        const res = await ipcRenderer.invoke('pet-send-message', { agentId, message: text });
        if (!res || !res.ok) {
          document.body.classList.add('error');
          setTimeout(() => document.body.classList.remove('error'), 1300);
        }
      } finally {
        setTimeout(() => document.body.classList.remove('sending'), 900);
        inputEl.focus();
      }
    }

    inputEl.addEventListener('input', () => {
      sendBtn.disabled = !inputEl.value.trim();
    });
    inputEl.addEventListener('keydown', (ev) => {
      if (ev.key !== 'Enter') return;
      ev.preventDefault();
      sendReply();
    });
    sendBtn.addEventListener('click', sendReply);
    collapseBtn.addEventListener('click', () => {
      if (document.body.classList.contains('chat-expanded')) {
        setExpanded(false);
      } else {
        setCollapsed(true);
      }
    });
    replyToggleBtn.addEventListener('click', () => {
      setExpanded(true);
    });
    chatTabBtn.addEventListener('click', () => {
      setCollapsed(false);
      setExpanded(true);
    });
    closeBtn.addEventListener('click', () => {
      ipcRenderer.invoke('pet-close-window', { agentId });
    });
    ipcRenderer.on('chat-tail-changed', tailRefresh);
    ipcRenderer.on('pet-config-updated', (_event, next) => {
      applyConfig(next);
      renderMessages([], false);
      loadHistory();
    });
    ipcRenderer.on('pet-mood', (_event, payload = {}) => {
      setMood(payload.mood || 'idle', Number(payload.ms) || 0);
    });
    ipcRenderer.on('pet-window-moving', (_event, payload = {}) => {
      const moving = !!payload.moving;
      document.body.classList.toggle('pet-moving', moving);
      setMood(moving ? `moving-${payload.direction === 'left' ? 'left' : 'right'}` : 'jumping', moving ? 0 : 650);
    });
    window.addEventListener('beforeunload', () => {
      if (pollHandle) clearInterval(pollHandle);
      if (moodTimer) clearTimeout(moodTimer);
    });
    try { setCollapsed(localStorage.getItem(collapseKey) === '1'); } catch {}
    try { setExpanded(localStorage.getItem(expandKey) === '1'); } catch {}
    init();
  </script>
</body>
</html>
