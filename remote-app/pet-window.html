<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' file: data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' file: data:;">
  <title>AgentRemote Pet</title>
  <style>
    :root {
      --accent: #e07c4c;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
      --text-primary: #f4f4f8;
      --text-muted: #9a9aa8;
      --bg-deep: rgba(8, 8, 14, 0.72);
      --bg-glass: rgba(20, 20, 30, 0.64);
      --border-soft: rgba(255, 255, 255, 0.12);
    }
    * { box-sizing: border-box; }

    * {
      scrollbar-color: rgba(224, 124, 76, 0.5) rgba(255, 255, 255, 0.035);
      scrollbar-width: thin;
    }

    *::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    *::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.035);
      border-radius: 999px;
      margin: 6px;
    }

    *::-webkit-scrollbar-thumb {
      background:
        linear-gradient(180deg, rgba(224, 124, 76, 0.72), rgba(16, 163, 127, 0.38));
      border: 2px solid rgba(8, 8, 14, 0.72);
      border-radius: 999px;
      background-clip: padding-box;
      box-shadow: 0 0 10px rgba(224, 124, 76, 0.22);
    }

    *::-webkit-scrollbar-thumb:hover {
      background:
        linear-gradient(180deg, rgba(255, 146, 90, 0.82), rgba(44, 247, 197, 0.48));
      background-clip: padding-box;
    }

    *::-webkit-scrollbar-corner {
      background: transparent;
    }
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      color: var(--text-primary);
      font-family: "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
      user-select: none;
    }
    body {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 10px 10px 12px;
      -webkit-app-region: no-drag;
    }
    body.bubble-below {
      align-items: flex-start;
      padding: 12px 10px 10px;
    }
    .pet-shell {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      gap: 5px;
    }
    body.bubble-below .pet-shell {
      justify-content: flex-start;
    }
    .chat-tab,
    .bubble {
      order: 1;
    }
    .chat-meta {
      order: 2;
    }
    .sprite-wrap {
      order: 3;
      cursor: grab;
      touch-action: none;
      -webkit-app-region: no-drag;
    }
    body.pet-picked-up .sprite-wrap {
      cursor: grabbing;
    }
    body.bubble-below .sprite-wrap {
      order: 1;
    }
    body.bubble-below .chat-meta {
      order: 2;
    }
    body.bubble-below .chat-tab,
    body.bubble-below .bubble {
      order: 3;
    }
    .bubble {
      position: relative;
      width: min(calc(100% - 16px), 306px);
      min-height: 126px;
      max-height: min(152px, calc(100vh - 112px));
      overflow: hidden;
      padding: 7px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 12px;
      background: #000;
      box-shadow: 0 14px 26px rgba(0, 0, 0, 0.22);
      backdrop-filter: none;
      -webkit-app-region: no-drag;
      display: flex;
      flex-direction: column;
      gap: 5px;
      transition:
        max-height 0.16s var(--ease),
        min-height 0.16s var(--ease),
        opacity 0.2s var(--ease);
    }
    body.chat-expanded .bubble {
      min-height: min(156px, calc(100vh - 148px));
      max-height: min(224px, calc(100vh - 148px));
    }
    .bubble::before {
      content: none;
    }
    .chat-meta {
      max-width: min(100%, 310px);
      height: 18px;
      margin-top: -2px;
      padding: 0 7px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.26px;
      text-transform: uppercase;
      pointer-events: none;
    }
    .live-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px color-mix(in srgb, var(--accent) 70%, transparent);
      flex: 0 0 auto;
    }
    .agent-name {
      min-width: 0;
      max-width: 168px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .chrome-actions {
      position: absolute;
      top: 0;
      right: 0;
      display: flex;
      align-items: center;
      gap: 3px;
      z-index: 3;
      -webkit-app-region: no-drag;
    }
    .icon-btn {
      width: 18px;
      height: 18px;
      border: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.62);
      display: grid;
      place-items: center;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
      -webkit-app-region: no-drag;
    }
    .icon-btn:hover {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.12);
    }
    .reply-toggle {
      width: 38px;
      border-radius: 999px;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.18px;
      text-transform: uppercase;
    }
    body.chat-expanded .reply-toggle {
      display: none;
    }
    .collapse-btn {
      font-size: 14px;
      transform: rotate(0deg);
      transition: transform 0.18s var(--ease), background 0.18s var(--ease), color 0.18s var(--ease);
    }
    body.chat-expanded .collapse-btn {
      transform: rotate(180deg);
    }
    .log {
      min-height: 78px;
      max-height: min(104px, calc(100vh - 172px));
      overflow: auto;
      padding: 0 12px 0 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1 1 auto;
      font-size: 10px;
      line-height: 1.34;
      user-select: text;
      scrollbar-gutter: stable;
      transition: max-height 0.2s var(--ease);
    }
    body.chat-expanded .log {
      min-height: 104px;
      max-height: min(160px, calc(100vh - 232px));
      padding-top: 0;
      padding-right: 12px;
      font-size: 11px;
      line-height: 1.38;
    }
    .log::-webkit-scrollbar { width: 5px; }
    .log::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
    }
    .msg {
      display: flex;
      flex-direction: column;
      align-self: flex-start;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      padding: 1px 2px 5px;
      border: 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.055);
      border-radius: 0;
      background: transparent;
      color: rgba(244, 244, 248, 0.9);
      box-shadow: none;
      backdrop-filter: none;
    }
    .msg.from-me {
      align-self: flex-start;
      border-color: color-mix(in srgb, var(--accent) 24%, rgba(255, 255, 255, 0.055));
      color: color-mix(in srgb, var(--accent) 26%, rgba(244, 244, 248, 0.94));
    }
    .msg .from {
      display: none;
      color: var(--accent);
      font-weight: 700;
      text-transform: uppercase;
    }
    .msg .text {
      display: block;
      min-width: 0;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    body:not(.chat-expanded) .msg .text {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .empty {
      color: var(--text-muted);
      font-style: italic;
    }
    .reply {
      display: none;
      grid-template-columns: minmax(0, 1fr) 46px;
      gap: 4px;
      padding: 0;
      flex: 0 0 auto;
    }
    body.chat-expanded .reply {
      display: grid;
    }
    .reply input {
      min-width: 0;
      height: 30px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
      padding: 0 8px;
      font: inherit;
      font-size: 11px;
      outline: none;
      -webkit-app-region: no-drag;
    }
    .reply input:focus {
      border-color: color-mix(in srgb, var(--accent) 68%, white 8%);
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 20%, transparent);
    }
    .reply button {
      height: 30px;
      border: 0;
      border-radius: 8px;
      background: color-mix(in srgb, var(--accent) 82%, white 8%);
      color: #120c09;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.4px;
      cursor: pointer;
      -webkit-app-region: no-drag;
    }
    .reply button:disabled {
      cursor: default;
      opacity: 0.46;
      filter: grayscale(0.4);
    }
    .resize-grip {
      display: none;
    }
    .resize-grip::after {
      content: none;
    }
    .chat-tab {
      display: none;
      align-items: center;
      gap: 6px;
      max-width: min(180px, calc(100vw - 24px));
      height: 26px;
      padding: 0 10px;
      border: 1px solid rgba(255, 255, 255, 0.11);
      border-radius: 999px;
      background: #000;
      color: var(--text-primary);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.32);
      backdrop-filter: blur(22px) saturate(132%);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.18px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: pointer;
      -webkit-app-region: no-drag;
    }
    .chat-tab::before {
      content: "";
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px color-mix(in srgb, var(--accent) 70%, transparent);
    }
    body.chat-collapsed .bubble {
      display: none;
    }
    body.chat-collapsed .chat-meta {
      display: none;
    }
    body.chat-collapsed .chat-tab {
      display: flex;
    }
    body.chat-collapsed.chat-expanded .reply {
      display: none;
    }
    body.chat-expanded .pet-shell {
      gap: 4px;
    }
    .sprite-wrap {
      position: relative;
      width: calc(var(--pet-display-width) + 16px);
      height: calc(var(--pet-display-height) + 18px);
      flex: 0 0 auto;
      filter: drop-shadow(0 18px 24px rgba(0, 0, 0, 0.48));
      transform-origin: 50% 75%;
      animation: float 4.8s var(--ease) infinite;
      transition: width 0.2s var(--ease), height 0.2s var(--ease);
    }
    body.chat-expanded .sprite-wrap {
      width: calc(var(--pet-display-width) + 16px);
      height: calc(var(--pet-display-height) + 18px);
    }
    .sprite-wrap::before {
      content: "";
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 4px;
      height: 28px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, color-mix(in srgb, var(--accent) 24%, transparent), transparent 70%);
      filter: blur(10px);
      opacity: 0.78;
    }
    .sprite {
      --pet-y: 0px;
      --pet-to-x: calc(var(--pet-display-width) * -6);
      --pet-step: steps(6);
      --pet-duration: 1.25s;
      --pet-scale-x: 1;
      position: relative;
      width: var(--pet-display-width);
      height: var(--pet-display-height);
      margin: 6px auto 0;
      display: block;
      background-image: var(--pet-sheet);
      background-repeat: no-repeat;
      background-size: var(--pet-bg-width) var(--pet-bg-height);
      background-position: 0 var(--pet-y);
      image-rendering: auto;
      animation: row var(--pet-duration) var(--pet-step) infinite;
      transform: scaleX(var(--pet-scale-x));
      transition: transform 0.2s var(--ease), margin 0.2s var(--ease);
    }
    body.chat-expanded .sprite {
      margin-top: 6px;
      transform: scaleX(var(--pet-scale-x));
      transform-origin: 50% 0;
    }
    body.pet-picked-up .sprite-wrap,
    body.pet-moving .sprite-wrap {
      animation-duration: 0.9s;
      filter:
        drop-shadow(0 18px 24px rgba(0, 0, 0, 0.48))
        drop-shadow(0 0 12px color-mix(in srgb, var(--accent) 45%, transparent));
    }
    @keyframes row {
      to { background-position: var(--pet-to-x) var(--pet-y); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50% { transform: translateY(-4px) rotate(1.5deg); }
    }
  </style>
</head>
<body>
  <main class="pet-shell">
    <button class="chat-tab" id="chat-tab" type="button" title="Show chat" aria-label="Show chat">Agent</button>
    <section class="bubble" aria-label="Agent pet chat">
      <div class="chrome-actions">
        <button class="icon-btn reply-toggle" id="reply-toggle" title="Reply" aria-label="Reply">reply</button>
        <button class="icon-btn collapse-btn" id="collapse" title="Expand chat" aria-label="Expand chat">^</button>
        <button class="icon-btn close-btn" id="close" title="Close pet" aria-label="Close pet">x</button>
      </div>
      <div class="log" id="log">
        <div class="empty">waiting for agent output</div>
      </div>
      <div class="reply">
        <input id="reply-input" type="text" autocomplete="off" spellcheck="false" placeholder="reply" />
        <button id="reply" disabled>Send</button>
      </div>
    </section>
    <div class="chat-meta">
      <span class="live-dot"></span>
      <span class="agent-name" id="agent-name">Agent</span>
    </div>
    <div class="sprite-wrap" title="Drag to move">
      <span class="sprite" id="sprite" role="presentation"></span>
    </div>
    <span class="resize-grip" aria-hidden="true" title="Resize"></span>
  </main>
  <script>
    const { ipcRenderer } = require('electron');
    const {
      DEFAULT_PROFILE,
      cleanPaneLines,
      createPaneStreamFilterState,
      filterPaneChunk
    } = require('./pane-stream-filter');
    const params = new URLSearchParams(window.location.search);
    const agentId = params.get('agentId') || '';
    let config = null;
    const outputChannel = `pane-output:${agentId}`;
    const MAX_PET_PANE_LINES = 18;
    let chatTailOffset = 0;
    let historyLoaded = false;
    let pollHandle = null;
    let moodTimer = null;
    let resizeDrag = null;
    let petDrag = null;
    let lastWindowBounds = null;
    let paneOutputListener = null;
    let paneOutputLines = [];
    let paneOutputCarry = '';
    let paneFilterState = createPaneStreamFilterState();
    let paneStreamHandle = null;
    let paneStreamLastSeenAt = 0;
    let paneStreamRecovering = false;
    let paneRenderPending = false;
    let lastPaneTailReplayFingerprint = '';
    let transcriptPollHandle = null;
    let lastTranscriptFingerprint = '';

    const nameEl = document.getElementById('agent-name');
    const logEl = document.getElementById('log');
    const inputEl = document.getElementById('reply-input');
    const sendBtn = document.getElementById('reply');
    const closeBtn = document.getElementById('close');
    const collapseBtn = document.getElementById('collapse');
    const replyToggleBtn = document.getElementById('reply-toggle');
    const chatTabBtn = document.getElementById('chat-tab');
    const spriteEl = document.getElementById('sprite');
    const collapseKey = `agentremote.pet.${agentId || 'unknown'}.chatCollapsed`;
    const expandKey = `agentremote.pet.${agentId || 'unknown'}.chatExpanded`;
    const PET_WINDOW_GEOMETRY = {
      minWidth: 300,
      minHeight: 340,
      maxWidth: 520,
      maxHeight: 620
    };
    const PET_ATLAS = {
      columns: 8,
      rows: 9,
      scale: 0.5,
      sourceCell: { width: 192, height: 208 },
      moods: {
        idle: { row: 0, frames: 6, duration: '1.25s' },
        'held-right': { row: 0, frames: 6, duration: '0.72s' },
        'held-left': { row: 0, frames: 6, duration: '0.72s', flip: true },
        'running-right': { row: 1, frames: 8, duration: '0.92s' },
        'running-left': { row: 2, frames: 8, duration: '0.92s' },
        waving: { row: 3, frames: 4, duration: '0.74s' },
        jumping: { row: 4, frames: 5, duration: '0.8s' },
        failed: { row: 5, frames: 8, duration: '0.95s' },
        waiting: { row: 6, frames: 6, duration: '1.25s' },
        running: { row: 7, frames: 6, duration: '0.82s' },
        review: { row: 8, frames: 6, duration: '1.2s' }
      },
      aliases: {
        recording: 'waving',
        sent: 'waving',
        transcribing: 'review',
        thinking: 'review',
        error: 'failed',
        failed: 'failed',
        'moving-right': 'held-right',
        'moving-left': 'held-left',
        released: 'idle',
        settling: 'idle'
      }
    };
    const PET_ATLAS_DISPLAY_CELL = {
      width: PET_ATLAS.sourceCell.width * PET_ATLAS.scale,
      height: PET_ATLAS.sourceCell.height * PET_ATLAS.scale
    };
    const MOOD_CLASSES = Object.keys(PET_ATLAS.moods)
      .filter((mood) => mood !== 'idle')
      .map((mood) => `mood-${mood}`);

    function applyAtlasGeometry() {
      document.documentElement.style.setProperty('--pet-display-width', `${PET_ATLAS_DISPLAY_CELL.width}px`);
      document.documentElement.style.setProperty('--pet-display-height', `${PET_ATLAS_DISPLAY_CELL.height}px`);
      document.documentElement.style.setProperty('--pet-bg-width', `${PET_ATLAS_DISPLAY_CELL.width * PET_ATLAS.columns}px`);
      document.documentElement.style.setProperty('--pet-bg-height', `${PET_ATLAS_DISPLAY_CELL.height * PET_ATLAS.rows}px`);
    }

    function atlasMoodFor(value) {
      const mood = String(value || 'idle').toLowerCase();
      const aliased = PET_ATLAS.aliases[mood] || mood;
      return PET_ATLAS.moods[aliased] ? aliased : 'idle';
    }

    function applyAtlasMood(mood) {
      const row = PET_ATLAS.moods[mood] || PET_ATLAS.moods.idle;
      spriteEl.style.setProperty('--pet-y', `${-row.row * PET_ATLAS_DISPLAY_CELL.height}px`);
      spriteEl.style.setProperty('--pet-to-x', `${-row.frames * PET_ATLAS_DISPLAY_CELL.width}px`);
      spriteEl.style.setProperty('--pet-step', `steps(${row.frames})`);
      spriteEl.style.setProperty('--pet-duration', row.duration);
      spriteEl.style.setProperty('--pet-scale-x', row.flip ? '-1' : '1');
    }

    function normalizeSender(value) {
      return String(value || '').toLowerCase().replace(/^@+/, '').trim().replace(/[^a-z0-9]+/g, '');
    }

    function agentAliases() {
      if (!config || !config.agent) return [];
      return Array.from(new Set([
        normalizeSender(config.agent.id),
        normalizeSender(config.agent.displayName),
        normalizeSender(config.agent.tmuxTarget),
        normalizeSender(String(config.agent.displayName || '').replace(/\s+/g, '-')),
        normalizeSender(String(config.agent.displayName || '').replace(/\s+/g, ''))
      ].filter(Boolean)));
    }

    function petAliases() {
      if (!config || !config.pet) return [];
      return Array.from(new Set([
        normalizeSender(config.pet.id),
        normalizeSender(config.pet.displayName),
        normalizeSender(String(config.pet.displayName || '').replace(/\s+/g, '-')),
        normalizeSender(String(config.pet.displayName || '').replace(/\s+/g, ''))
      ].filter(Boolean)));
    }

    function messageMentionsAlias(message, aliases) {
      const text = String(message || '').toLowerCase();
      return aliases.some((alias) => {
        if (!alias || alias === 'team' || alias === 'richard') return false;
        const escaped = alias.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        return new RegExp(`(^|[^a-z0-9_-])@?${escaped}([^a-z0-9_-]|$)`, 'i').test(text);
      });
    }

    function messageBelongsHere(env) {
      if (!env || typeof env !== 'object' || !config) return false;
      const from = normalizeSender(env.from);
      const to = normalizeSender(env.to);
      const aliases = agentAliases();
      const petNames = petAliases();
      if (aliases.includes(from)) return true;
      if (aliases.includes(to)) return true;
      if (petNames.includes(from)) return true;
      if (petNames.includes(to)) return true;
      return false;
    }

    function scrollToBottom() {
      logEl.scrollTop = logEl.scrollHeight;
    }

    function isNearLogBottom() {
      return logEl.scrollHeight - logEl.scrollTop - logEl.clientHeight < 36;
    }

    function maybeScrollToBottom(force = false) {
      if (force || isNearLogBottom()) scrollToBottom();
    }

    function restoreScrollPosition(previousScrollTop) {
      if (typeof previousScrollTop !== 'number') return;
      logEl.scrollTop = previousScrollTop;
    }

    function renderEmpty(message = 'waiting for agent output') {
      logEl.innerHTML = '';
      const empty = document.createElement('div');
      empty.className = 'empty';
      empty.textContent = message;
      logEl.appendChild(empty);
    }

    function clearLogRowsForSource(source) {
      if (!logEl) return;
      for (const row of Array.from(logEl.children)) {
        if (!row.dataset || row.dataset.source !== source) continue;
        row.remove();
      }
    }

    function hasLogRowsForSource(source) {
      if (!logEl) return false;
      return Array.from(logEl.children).some((row) => row.dataset && row.dataset.source === source);
    }

    function appendPaneChunk(rawChunk) {
      if (!shouldUsePaneStream()) return 0;
      const result = filterPaneChunk(rawChunk, paneFilterState, paneOutputCarry, paneStreamProfile());
      paneOutputCarry = result.carry;
      const added = result.lines.length;
      paneOutputLines.push(...result.lines);
      if (paneOutputLines.length > MAX_PET_PANE_LINES * 4) {
        paneOutputLines = paneOutputLines.slice(-MAX_PET_PANE_LINES * 2);
      }
      if (paneOutputLines.length === 0) return 0;
      if (added > 0 || !hasLogRowsForSource('pane')) {
        schedulePaneRender();
      }
      return added;
    }

    function shouldUsePaneStream() {
      return !!(config && config.agent && config.agent.petPaneStream === true);
    }

    function shouldUseTranscriptStream() {
      return !!(config && config.agent && config.agent.petTranscriptStream === true);
    }

    function paneStreamProfile() {
      const options = config && config.agent && config.agent.petStreamProfileOptions && typeof config.agent.petStreamProfileOptions === 'object'
        ? config.agent.petStreamProfileOptions
        : {};
      return {
        ...DEFAULT_PROFILE,
        ...options,
        id: config && config.agent && config.agent.petStreamProfile ? config.agent.petStreamProfile : DEFAULT_PROFILE.id,
        maxRenderedLines: Number.isFinite(Number(options.maxRenderedLines)) ? Number(options.maxRenderedLines) : MAX_PET_PANE_LINES
      };
    }

    function paneRenderLimit() {
      const value = Number(paneStreamProfile().maxRenderedLines);
      return Number.isFinite(value) ? Math.max(1, Math.min(60, Math.floor(value))) : MAX_PET_PANE_LINES;
    }

    function schedulePaneRender() {
      if (paneRenderPending) return;
      paneRenderPending = true;
      requestAnimationFrame(() => {
        paneRenderPending = false;
        renderPaneLines(paneOutputLines);
      });
    }

    function boundedWindowSize(width, height) {
      return {
        width: Math.max(PET_WINDOW_GEOMETRY.minWidth, Math.min(PET_WINDOW_GEOMETRY.maxWidth, Math.round(width))),
        height: Math.max(PET_WINDOW_GEOMETRY.minHeight, Math.min(PET_WINDOW_GEOMETRY.maxHeight, Math.round(height)))
      };
    }

    function syncChatControls() {
      const collapsed = document.body.classList.contains('chat-collapsed');
      const expanded = document.body.classList.contains('chat-expanded');
      const title = collapsed ? 'Show chat' : (expanded ? 'Compact chat' : 'Expand chat');
      collapseBtn.title = title;
      collapseBtn.setAttribute('aria-label', title);
    }

    function applyBubblePlacement(placement) {
      const below = placement === 'below';
      document.body.classList.toggle('bubble-below', below);
      document.body.classList.toggle('bubble-above', !below);
    }

    function setCollapsed(collapsed) {
      document.body.classList.toggle('chat-collapsed', collapsed);
      try { localStorage.setItem(collapseKey, collapsed ? '1' : '0'); } catch {}
      syncChatControls();
      if (!collapsed) requestAnimationFrame(scrollToBottom);
    }

    function setExpanded(expanded) {
      document.body.classList.toggle('chat-expanded', expanded);
      try { localStorage.setItem(expandKey, expanded ? '1' : '0'); } catch {}
      if (expanded) {
        setCollapsed(false);
        requestAnimationFrame(() => {
          scrollToBottom();
          inputEl.focus();
        });
      }
      syncChatControls();
    }

    function setMood(mood, ms = 0) {
      if (petDrag && !['held-left', 'held-right', 'moving-left', 'moving-right', 'released', 'settling'].includes(String(mood || '').toLowerCase())) {
        return;
      }
      if (moodTimer) {
        clearTimeout(moodTimer);
        moodTimer = null;
      }
      document.body.classList.remove(...MOOD_CLASSES);
      const next = atlasMoodFor(mood);
      applyAtlasMood(next);
      if (next !== 'idle') document.body.classList.add(`mood-${next}`);
      if (ms > 0) {
        moodTimer = setTimeout(() => {
          document.body.classList.remove(...MOOD_CLASSES);
          applyAtlasMood('idle');
          moodTimer = null;
        }, ms);
      }
    }

    function setHeldMood(direction) {
      setMood(direction === 'left' ? 'held-left' : 'held-right');
    }

    function renderMessages(envelopes, append = false) {
      const filtered = (Array.isArray(envelopes) ? envelopes : []).filter(messageBelongsHere).slice(-20);
      const shouldStickToBottom = !append || isNearLogBottom();
      const previousScrollTop = logEl.scrollTop;
      if (!append) clearLogRowsForSource('chat');
      if (!filtered.length && !append && logEl.children.length === 0) {
        renderEmpty();
        return 0;
      }
      const existingEmpty = logEl.querySelector('.empty');
      if (existingEmpty && filtered.length) existingEmpty.remove();
      for (const env of filtered) {
        const sender = normalizeSender(env.from || '?');
        const row = document.createElement('div');
        row.className = 'msg';
        if (['richard', 'operator'].includes(sender)) row.classList.add('from-me');
        const from = document.createElement('span');
        from.className = 'from';
        from.textContent = sender;
        const body = document.createElement('span');
        body.className = 'text';
        body.textContent = String(env.message || '');
        row.appendChild(from);
        row.appendChild(body);
        row.dataset.source = 'chat';
        logEl.appendChild(row);
      }
      while (logEl.children.length > 20) logEl.removeChild(logEl.firstElementChild);
      if (shouldStickToBottom) scrollToBottom();
      else restoreScrollPosition(previousScrollTop);
      return filtered.length;
    }

    function renderPaneLines(lines) {
      const shouldStickToBottom = isNearLogBottom();
      const previousScrollTop = logEl.scrollTop;
      const trimmed = cleanPaneLines(lines, { profile: paneStreamProfile() }).slice(-paneRenderLimit());
      clearLogRowsForSource('pane');
      if (!trimmed.length) {
        if (!hasLogRowsForSource('chat')) renderEmpty();
        return 0;
      }
      for (const line of trimmed) {
        const row = document.createElement('div');
        row.className = 'msg';
        row.dataset.source = 'pane';
        const body = document.createElement('span');
        body.className = 'text';
        body.textContent = line;
        row.appendChild(body);
        logEl.appendChild(row);
      }
      if (shouldStickToBottom) scrollToBottom();
      else restoreScrollPosition(previousScrollTop);
      return trimmed.length;
    }

    function renderTranscriptMessages(messages) {
      const normalized = (Array.isArray(messages) ? messages : [])
        .map((message) => ({
          id: String(message && message.id || ''),
          text: String(message && message.text || '').trim()
        }))
        .filter((message) => message.text.length > 0)
        .slice(-8);
      const fingerprint = normalized.map((message) => `${message.id}:${message.text}`).join('\n---\n');
      if (fingerprint && fingerprint === lastTranscriptFingerprint && hasLogRowsForSource('transcript')) {
        return normalized.length;
      }
      lastTranscriptFingerprint = fingerprint;

      const shouldStickToBottom = isNearLogBottom();
      const previousScrollTop = logEl.scrollTop;
      clearLogRowsForSource('pane');
      clearLogRowsForSource('transcript');
      if (!normalized.length) {
        if (!hasLogRowsForSource('chat')) renderEmpty();
        return 0;
      }
      const existingEmpty = logEl.querySelector('.empty');
      if (existingEmpty) existingEmpty.remove();
      for (const message of normalized) {
        const row = document.createElement('div');
        row.className = 'msg';
        row.dataset.source = 'transcript';
        const body = document.createElement('span');
        body.className = 'text';
        body.textContent = message.text;
        row.appendChild(body);
        logEl.appendChild(row);
      }
      while (logEl.children.length > 24) logEl.removeChild(logEl.firstElementChild);
      if (shouldStickToBottom) scrollToBottom();
      else restoreScrollPosition(previousScrollTop);
      return normalized.length;
    }

    async function refreshTranscriptTail(force = false) {
      if (!shouldUseTranscriptStream()) return 0;
      const res = await ipcRenderer.invoke('pet-transcript-tail', { agentId, maxMessages: 8 });
      if (!res || !res.ok) {
        if (force && !hasLogRowsForSource('chat') && !hasLogRowsForSource('pane')) {
          renderEmpty(res && res.error ? res.error : 'agent transcript unavailable');
        }
        return 0;
      }
      return renderTranscriptMessages(res.messages || []);
    }

    async function refreshPaneTail(force = false) {
      if (!shouldUsePaneStream()) return 0;
      const res = await ipcRenderer.invoke('pet-pane-tail', { agentId });
      if (!res || !res.ok) {
        if (force) renderEmpty(res && res.error ? res.error : 'agent pane unavailable');
        return 0;
      }
      const lines = cleanPaneLines(res.lines, { profile: paneStreamProfile() }).slice(-paneRenderLimit());
      const payload = lines.join('\n');
      if (!payload) {
        if (force && !hasLogRowsForSource('chat')) renderEmpty();
        if (force) lastPaneTailReplayFingerprint = '';
        return 0;
      }
      lastPaneTailReplayFingerprint = payload;
      paneOutputLines = lines;
      paneOutputCarry = '';
      paneFilterState = createPaneStreamFilterState();
      return renderPaneLines(lines);
    }

    async function startPaneStream() {
      if (!shouldUsePaneStream()) return false;
      if (!config || !agentId || paneOutputListener) return false;
      const safeHandler = (_event, b64) => {
        try {
          const text = atob(b64);
          paneStreamLastSeenAt = Date.now();
          appendPaneChunk(text);
        } catch (err) {
          console.warn('[pet] failed to decode pane output:', err && err.message ? err.message : err);
        }
      };
      paneOutputListener = safeHandler;
      ipcRenderer.on(outputChannel, safeHandler);
      const res = await ipcRenderer.invoke('start-pane-pipe', { agentId, consumer: 'pet-window' });
      if (!res || !res.ok) {
        ipcRenderer.removeListener(outputChannel, safeHandler);
        paneOutputListener = null;
        paneStreamLastSeenAt = 0;
        if (!hasLogRowsForSource('chat') && !hasLogRowsForSource('pane')) {
          renderEmpty(res && res.error ? res.error : 'agent pane unavailable');
        }
        return false;
      }
      paneStreamLastSeenAt = Date.now();
      return true;
    }

    async function stopPaneStream() {
      if (!paneOutputListener) return;
      ipcRenderer.removeListener(outputChannel, paneOutputListener);
      paneOutputListener = null;
      paneStreamLastSeenAt = 0;
      try {
        await ipcRenderer.invoke('stop-pane-pipe', { agentId, consumer: 'pet-window' });
      } catch {
        // Ignore.
      }
    }

    async function ensurePaneStream() {
      if (!shouldUsePaneStream()) return;
      if (!agentId) return;
      if (!paneOutputListener) {
        const started = await startPaneStream();
        if (!started && !paneStreamRecovering) {
          await refreshPaneTail(true);
        }
        return;
      }
      if (paneStreamRecovering) return;
      if (!paneStreamLastSeenAt) return;
      if (Date.now() - paneStreamLastSeenAt < 12000) return;
      const res = await ipcRenderer.invoke('pet-pane-tail', { agentId });
      const lines = res && res.ok && Array.isArray(res.lines) ? cleanPaneLines(res.lines, { profile: paneStreamProfile() }) : [];
      const payload = lines.slice(-paneRenderLimit()).join('\n');
      if (!payload || payload === lastPaneTailReplayFingerprint) return;

      paneStreamRecovering = true;
      try {
        await stopPaneStream();
        paneOutputLines = [];
        paneOutputCarry = '';
        paneFilterState = createPaneStreamFilterState();
        await refreshPaneTail(true);
        await startPaneStream();
      } finally {
        paneStreamRecovering = false;
      }
    }

    async function loadHistory() {
      const res = await ipcRenderer.invoke('chat-tail-init');
      if (!res || !res.ok) return;
      chatTailOffset = res.offset || 0;
      historyLoaded = true;
      renderMessages(res.envelopes || [], false);
    }

    async function tailRefresh() {
      if (!historyLoaded) return;
      const res = await ipcRenderer.invoke('chat-tail-read', { offset: chatTailOffset });
      if (!res || !res.ok) return;
      chatTailOffset = typeof res.offset === 'number' ? res.offset : chatTailOffset;
      renderMessages(res.envelopes || [], true);
    }

    function applyConfig(next) {
      config = next;
      if (!config || !config.agent || !config.pet) return;
      if (shouldUseTranscriptStream() || !shouldUsePaneStream()) {
        clearLogRowsForSource('pane');
        paneOutputLines = [];
        paneOutputCarry = '';
        paneFilterState = createPaneStreamFilterState();
        void stopPaneStream();
      }
      document.documentElement.style.setProperty('--accent', config.agent.themeColor || '#e07c4c');
      const agentName = config.agent.displayName || config.agent.id;
      nameEl.textContent = agentName;
      chatTabBtn.textContent = agentName;
      chatTabBtn.title = `Show ${agentName} chat`;
      chatTabBtn.setAttribute('aria-label', `Show ${agentName} chat`);
      spriteEl.style.setProperty('--pet-sheet', `url("${config.pet.sheetUrl}")`);
      document.title = `${agentName} Pet`;
    }

    async function init() {
      applyAtlasGeometry();
      applyAtlasMood('idle');
      applyBubblePlacement('above');
      const res = await ipcRenderer.invoke('get-agent-pet-config', { agentId });
      if (!res || !res.ok) {
        nameEl.textContent = 'Pet unavailable';
        return;
      }
      applyConfig(res.config);
      if (shouldUseTranscriptStream()) {
        await refreshTranscriptTail(true);
        transcriptPollHandle = setInterval(() => {
          void refreshTranscriptTail();
        }, 2000);
      } else {
        await loadHistory();
      }
      if (!shouldUseTranscriptStream() && shouldUsePaneStream()) {
        await startPaneStream();
        paneStreamHandle = setInterval(() => {
          void ensurePaneStream();
        }, 4500);
      }
      pollHandle = setInterval(tailRefresh, 4000);
    }

    async function sendReply() {
      const text = inputEl.value.trim();
      if (!text || !config) return;
      inputEl.value = '';
      sendBtn.disabled = true;
      document.body.classList.add('sending');
      setMood('jumping', 900);
      const local = {
        from: 'richard',
        to: config.agent.id,
        message: text
      };
      renderMessages([local], true);
      try {
        const res = await ipcRenderer.invoke('pet-send-message', { agentId, message: text });
        if (!res || !res.ok) {
          document.body.classList.add('error');
          setTimeout(() => document.body.classList.remove('error'), 1300);
        }
      } finally {
        setTimeout(() => document.body.classList.remove('sending'), 900);
        inputEl.focus();
      }
    }

    function appendReplyText(text) {
      const current = inputEl.value;
      const start = typeof inputEl.selectionStart === 'number' ? inputEl.selectionStart : current.length;
      const end = typeof inputEl.selectionEnd === 'number' ? inputEl.selectionEnd : current.length;
      const spacer = current && start === current.length && !/\s$/.test(current) ? ' ' : '';
      const next = `${current.slice(0, start)}${spacer}${text}${current.slice(end)}`;
      const cursor = start + spacer.length + text.length;
      inputEl.value = next;
      inputEl.setSelectionRange(cursor, cursor);
      sendBtn.disabled = !inputEl.value.trim();
    }

    function clipboardImageToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const result = String(reader.result || '');
          const marker = 'base64,';
          const index = result.indexOf(marker);
          resolve(index >= 0 ? result.slice(index + marker.length) : result);
        };
        reader.onerror = () => reject(reader.error || new Error('image paste read failed'));
        reader.readAsDataURL(file);
      });
    }

    async function saveNativeClipboardImageReference() {
      const result = await ipcRenderer.invoke('save-native-clipboard-image');
      if (!result || !result.ok || !result.path) return null;
      return `[image: ${result.path}]`;
    }

    async function handleReplyImagePaste(ev) {
      const items = Array.from((ev.clipboardData && ev.clipboardData.items) || []);
      const images = items
        .filter(item => item.kind === 'file' && /^image\//.test(item.type || ''))
        .map(item => item.getAsFile())
        .filter(Boolean);
      if (!images.length) {
        const marker = await saveNativeClipboardImageReference();
        if (!marker) return;
        ev.preventDefault();
        setMood('review', 900);
        appendReplyText(marker);
        inputEl.focus();
        return;
      }
      ev.preventDefault();
      setMood('review', 900);
      for (const image of images) {
        try {
          const base64 = await clipboardImageToBase64(image);
          const result = await ipcRenderer.invoke('save-pasted-image', {
            base64,
            mimeType: image.type || 'image/png'
          });
          if (!result || !result.ok) throw new Error(result && result.error ? result.error : 'image paste failed');
          appendReplyText(`[image: ${result.path}]`);
        } catch (err) {
          renderMessages([{
            from: config && config.agent ? config.agent.id : agentId,
            to: 'richard',
            message: err && err.message ? err.message : 'image paste failed'
          }], true);
        }
      }
      inputEl.focus();
    }

    inputEl.addEventListener('input', () => {
      sendBtn.disabled = !inputEl.value.trim();
    });
    inputEl.addEventListener('paste', handleReplyImagePaste);
    inputEl.addEventListener('keydown', (ev) => {
      if (ev.key !== 'Enter') return;
      ev.preventDefault();
      sendReply();
    });
    sendBtn.addEventListener('click', sendReply);
    collapseBtn.addEventListener('click', () => {
      if (document.body.classList.contains('chat-expanded')) {
        setExpanded(false);
      } else {
        setCollapsed(true);
      }
    });
    replyToggleBtn.addEventListener('click', () => {
      setExpanded(true);
    });
    chatTabBtn.addEventListener('click', () => {
      setCollapsed(false);
      setExpanded(true);
    });
    closeBtn.addEventListener('click', () => {
      ipcRenderer.invoke('pet-close-window', { agentId });
    });
    window.addEventListener('pointerdown', (ev) => {
      if (ev.target.closest('button, input, .resize-grip, .bubble, .chat-tab')) return;
      ev.preventDefault();
      const target = ev.target.closest('.sprite-wrap') || document.body;
      try { target.setPointerCapture(ev.pointerId); } catch {}
      const baseBounds = lastWindowBounds || {
        x: Number.isFinite(window.screenX) ? window.screenX : 0,
        y: Number.isFinite(window.screenY) ? window.screenY : 0
      };
      petDrag = {
        pointerId: ev.pointerId,
        grabOffsetX: ev.screenX - baseBounds.x,
        grabOffsetY: ev.screenY - baseBounds.y,
        lastScreenX: ev.screenX,
        direction: 'right',
        target
      };
      document.body.classList.add('pet-picked-up');
      setHeldMood('right');
    });
    window.addEventListener('pointermove', (ev) => {
      if (!petDrag || ev.pointerId !== petDrag.pointerId) return;
      const dx = ev.screenX - petDrag.lastScreenX;
      if (Math.abs(dx) >= 1) {
        petDrag.direction = dx < 0 ? 'left' : 'right';
        petDrag.lastScreenX = ev.screenX;
      }
      document.body.classList.add('pet-picked-up', 'pet-moving');
      setHeldMood(petDrag.direction);
      ipcRenderer.send('pet-drag-window', {
        agentId,
        screenX: ev.screenX,
        screenY: ev.screenY,
        grabOffsetX: petDrag.grabOffsetX,
        grabOffsetY: petDrag.grabOffsetY,
        direction: petDrag.direction
      });
    });
    function endPetDrag(ev) {
      if (!petDrag) return;
      if (ev && ev.pointerId !== petDrag.pointerId) return;
      try { petDrag.target.releasePointerCapture(petDrag.pointerId); } catch {}
      ipcRenderer.send('pet-drag-end', { agentId });
      petDrag = null;
      document.body.classList.remove('pet-picked-up');
      document.body.classList.remove('pet-moving');
      setMood('released', 250);
    }
    window.addEventListener('pointerup', endPetDrag);
    window.addEventListener('pointercancel', endPetDrag);
    window.addEventListener('blur', () => {
      if (petDrag) return;
      document.body.classList.remove('pet-picked-up');
    });
    document.querySelector('.resize-grip').addEventListener('pointerdown', (ev) => {
      ev.preventDefault();
      ev.stopPropagation();
      const target = ev.currentTarget;
      target.setPointerCapture(ev.pointerId);
      resizeDrag = {
        pointerId: ev.pointerId,
        startX: ev.screenX,
        startY: ev.screenY,
        startWidth: window.outerWidth,
        startHeight: window.outerHeight
      };
      document.body.classList.add('resizing');
    });
    window.addEventListener('pointermove', (ev) => {
      if (!resizeDrag || ev.pointerId !== resizeDrag.pointerId) return;
      const next = boundedWindowSize(
        resizeDrag.startWidth + (ev.screenX - resizeDrag.startX),
        resizeDrag.startHeight + (ev.screenY - resizeDrag.startY)
      );
      ipcRenderer.invoke('pet-resize-window', {
        agentId,
        ...next,
        anchorX: 'center',
        anchorY: document.body.classList.contains('bubble-below') ? 'top' : 'bottom'
      });
    });
    window.addEventListener('pointerup', (ev) => {
      if (!resizeDrag || ev.pointerId !== resizeDrag.pointerId) return;
      resizeDrag = null;
      document.body.classList.remove('resizing');
    });
    ipcRenderer.on('chat-tail-changed', tailRefresh);
    ipcRenderer.on('pet-config-updated', (_event, next) => {
      applyConfig(next);
      renderMessages([], false);
      loadHistory();
    });
    ipcRenderer.on('pet-mood', (_event, payload = {}) => {
      setMood(payload.mood || 'idle', Number(payload.ms) || 0);
    });
    ipcRenderer.on('pet-window-bounds', (_event, payload = {}) => {
      if (payload && payload.bounds) lastWindowBounds = payload.bounds;
      applyBubblePlacement(payload.bubblePlacement || 'above');
    });
    ipcRenderer.on('pet-window-moving', (_event, payload = {}) => {
      const moving = !!payload.moving;
      if (payload && payload.bounds) lastWindowBounds = payload.bounds;
      document.body.classList.toggle('pet-moving', moving);
      document.body.classList.toggle('pet-picked-up', moving);
      applyBubblePlacement(payload.bubblePlacement || 'above');
      setMood(moving ? `moving-${payload.direction === 'left' ? 'left' : 'right'}` : 'released', moving ? 0 : 650);
    });
    window.addEventListener('beforeunload', () => {
      if (pollHandle) clearInterval(pollHandle);
      if (paneStreamHandle) clearInterval(paneStreamHandle);
      if (transcriptPollHandle) clearInterval(transcriptPollHandle);
      if (moodTimer) clearTimeout(moodTimer);
      void stopPaneStream();
    });
    try { setCollapsed(localStorage.getItem(collapseKey) === '1'); } catch {}
    try { setExpanded(localStorage.getItem(expandKey) === '1'); } catch {}
    init();
  </script>
</body>
</html>
