      if (!msg) return;
      const selected = Object.values(agents).filter(a => a.selected);
      if (selected.length === 0) return;
      const isAll = selected.length === Object.keys(agents).length;
      const payload = selected.map(a => ({ id: a.id, tmuxTarget: a.tmuxTarget }));
      ipcRenderer.send('broadcast-message', { message: msg, selectedAgents: payload, isAll });
      input.value = '';
      // Keep selection so consecutive messages don't require re-clicking. Power-user feel.
    }

    function deploy() {
      const ids = Object.values(agents).filter(a => a.selected).map(a => a.id);
      if (ids.length === 0) return;
      // v2.5: ride the layout-mode along as the `layout` field. main.js
      // whitelists the value to one of LAYOUT_MODES before passing it through
      // to chq-tmux.sh as CHQ_LAYOUT.
      ipcRenderer.send('spawn-agents', { agents: ids, layout: layoutMode });
    }

    // Wire the layout-mode segmented control. Click → set as active, persist,
    // and update layoutMode for the next Deploy. No IPC fired here — the value
    // is only consumed when Deploy runs. After a click we also re-evaluate the
    // mismatch hint so the visual feedback updates immediately (without waiting
    // for the next 3s poll).
    function wireLayoutPills() {
      const pills = document.querySelectorAll('.layout-pill');
      // Initial render: mark the persisted layoutMode as active.
      pills.forEach(p => p.classList.toggle('active', p.dataset.layout === layoutMode));
      pills.forEach(p => {
        p.addEventListener('click', () => {
          const next = p.dataset.layout;
          if (!LAYOUT_MODES.includes(next)) return;
          layoutMode = next;
          try { localStorage.setItem('agentRemoteLayoutMode', next); } catch { /* sandboxed */ }
          pills.forEach(o => o.classList.toggle('active', o.dataset.layout === next));
          applyLayoutMismatchHint();
        });
      });
      // v2.7: prime per-pill / Deploy tooltips at boot so a hover during
      // the first 3s (before pollSessionLayoutOnce returns) still shows the
      // base explainer with no stale text.
      applyLayoutMismatchHint();
    }

    // ---------------------------------------------------------------------
    // Session-layout tracking + tear-down button (Issue 2)
    // ---------------------------------------------------------------------
    // chq-tmux.sh stashes the chosen layout in a tmux session option
    // @chq_layout at start time, and cmd_add reads it back on every Deploy.
    // So once a session is up in (e.g.) `panes` mode, flipping the WINDOWS
    // pill in the panel and re-Deploying re-uses the existing session under
    // the OLD layout — confusing. Surface that with:
    //
    //   1. A tooltip / amber border on .layout-pills when the active pill
    //      differs from the session's @chq_layout (and a session is running).
    //   2. A small ✕ "stop session" button next to the pills that runs
    //      `tmux kill-session -t chq` after an inline ✓✗ confirm.
    //
    // sessionLayout is refreshed on each pollStatusOnce() tick (3s) via the
    // get-session-layout IPC. Empty string = no session.
    let sessionLayout = '';

    async function pollSessionLayoutOnce() {
      try {
        const v = await ipcRenderer.invoke('get-session-layout');
        sessionLayout = String(v || '').trim();
      } catch {
        sessionLayout = '';
      }
      applyLayoutMismatchHint();
      applyStopButtonState();
    }

    // Toggle the .mismatch class on .layout-pills when chq is running AND the
    // active pill differs from the session's stashed layout. When that's true,
    // also set a tooltip on the wrapper explaining why the pill choice isn't
    // taking effect. When chq isn't running or the layouts agree, strip both.
    // Special case: sessionLayout === 'unknown' means the session exists but
    // its layout wasn't stashed (legacy or external session) — we can't tell
    // if there's a mismatch, so don't show the hint.
    //
    // v2.7: ALSO refresh per-pill tooltips here (they live in data-base-title)
    // so each pill keeps its own explainer + a running-state suffix when
    // applicable. Same poll tick that flips the .mismatch class also rewrites
    // the per-pill .title — Richard hovers PANES and sees "Horizontal split-
    // panes…" plus the suffix "Session running in PANES mode" when it applies.
    function applyLayoutMismatchHint() {
      const pills = document.getElementById('layout-pills');
      if (!pills) return;
      const running = sessionLayout && sessionLayout.length > 0;
      const known = running && sessionLayout !== 'unknown';
      const mismatch = known && sessionLayout !== layoutMode;
      pills.classList.toggle('mismatch', mismatch);
      if (mismatch) {
        pills.title = `Session running in ${sessionLayout.toUpperCase()} mode. Stop the session and redeploy to apply ${layoutMode.toUpperCase()}.`;
      } else if (known) {
        pills.title = `Session running in ${sessionLayout.toUpperCase()} mode.`;
      } else if (running) {
        pills.title = 'Session running (layout unknown — started outside AgentRemote).';
      } else {
        pills.title = '';
      }

      // Per-pill tooltips. Suffix added only when chq is running so the
      // base explainer reads cleanly when there's no session yet. Spec
      // wording: "${baseTooltip} | Session running in ${runningLayout} mode
      // — stop and redeploy to apply." Only the active pill gets the
      // "stop and redeploy" hint when there's a mismatch — the inactive
      // pills get a simpler "Session running in X mode" suffix.
      const pillEls = pills.querySelectorAll('.layout-pill');
      pillEls.forEach(p => {
        const base = p.dataset.baseTitle || p.title || '';
        let suffix = '';
        if (known) {
          if (mismatch && p.classList.contains('active')) {
            suffix = ` | Session running in ${sessionLayout.toUpperCase()} mode — stop and redeploy to apply.`;
          } else {
            suffix = ` | Session running in ${sessionLayout.toUpperCase()} mode.`;
          }
        } else if (running) {
          suffix = ' | Session running (layout unknown — started outside AgentRemote).';
        }
        p.title = base + suffix;
      });

      // Also refresh the Deploy button — its tooltip surfaces the current
      // layout mode so Richard knows what'll spawn before clicking. When a
      // running session exists, the suffix mirrors the pills so the same
      // "stop and redeploy" hint surfaces here too.
      const deployBtn = document.getElementById('deploy-btn');
      if (deployBtn) {
        let t = `Spawn selected agents in tmux (current layout: ${layoutMode.toUpperCase()})`;
        if (mismatch) {
          t += ` — session is in ${sessionLayout.toUpperCase()}; stop and redeploy to apply.`;
        }
        deployBtn.title = t;
      }
    }

    // Reflect session presence on the stop button. Running → enabled + warning
    // tooltip; not running → dimmed + "no session" tooltip. Clicks on the
    // disabled button are ignored.
    function applyStopButtonState() {
      const btn = document.getElementById('stop-session-btn');
      if (!btn) return;
      const running = sessionLayout && sessionLayout.length > 0;
      btn.classList.toggle('disabled', !running);
      if (!running) {
        btn.title = 'Tear down the chq tmux session (no session running)';
      } else if (sessionLayout === 'unknown') {
        btn.title = 'Tear down the chq tmux session';
      } else {
        btn.title = `Tear down the chq tmux session (${sessionLayout.toUpperCase()})`;
      }
    }

    // Wire the inline confirm + kill-session IPC on the stop-session button.
    // Pattern mirrors requestRadialConfirm but at button scale: click swaps
    // glyph for ✓✗ pair, ✓ fires IPC, ✗ or 4s timeout cancels. After kill we
    // optimistically blank sessionLayout so the next poll doesn't re-show the
    // mismatch hint mid-tear-down.
    let stopBtnConfirmTimer = null;
    function wireStopSessionButton() {
      const btn = document.getElementById('stop-session-btn');
      if (!btn) return;
      const ok = btn.querySelector('.confirm .ok');
      const no = btn.querySelector('.confirm .no');

      const cleanup = () => {
        btn.classList.remove('confirming');
        if (stopBtnConfirmTimer) { clearTimeout(stopBtnConfirmTimer); stopBtnConfirmTimer = null; }
      };

      btn.addEventListener('click', (ev) => {
        ev.stopPropagation();
        // Disabled (no session) → no-op. Hover tooltip already says why.
        if (btn.classList.contains('disabled')) return;
        // Already in confirm state → ignore the wrapper click; ✓/✗ have their
        // own handlers which fire via stopPropagation.
        if (btn.classList.contains('confirming')) return;
        btn.classList.add('confirming');
        if (stopBtnConfirmTimer) clearTimeout(stopBtnConfirmTimer);
        stopBtnConfirmTimer = setTimeout(cleanup, 4000);
      });

      ok.addEventListener('click', async (ev) => {
        ev.stopPropagation();
        cleanup();
        const result = await ipcRenderer.invoke('kill-session');
        if (!result || !result.ok) {
          // Surface failure on the button itself (red flash via title hint).
          btn.title = `Stop failed: ${(result && result.error) || 'unknown'}`;
          setTimeout(applyStopButtonState, 2200);
          return;
        }
        // Optimistic: clear local state so the UI reflects "no session" before
        // the next poll runs. pollStatusOnce will reconcile in 3s.
        sessionLayout = '';
        applyLayoutMismatchHint();
        applyStopButtonState();
        // Force a status repoll so the dock dots flip grey within one paint
        // rather than waiting for the next 3s tick.
        pollStatusOnce();
      });

      no.addEventListener('click', (ev) => {
        ev.stopPropagation();
        cleanup();
      });

      // Outside-click cancellation while in confirm state — keeps the pattern
      // consistent with the radial confirm.
      document.addEventListener('mousedown', (ev) => {
        if (!btn.classList.contains('confirming')) return;
        if (btn.contains(ev.target)) return;
        cleanup();
      }, true);
    }

    // ---------------------------------------------------------------------
    // Add / Remove agent
    // ---------------------------------------------------------------------
    function toggleAddForm() {

    let pickedAvatarPath = null;

    async function submitAdd() {

      document.getElementById('f-slash').value = '/gogo';

    async function doRemove(id, tileEl) {
      const result = await ipcRenderer.invoke('remove-agent', id);
      if (!result.ok) { flashTileError(tileEl, result.error); return; }
      await loadAndRender();
    }

    async function doRestart(id, tileEl) {
      const result = await ipcRenderer.invoke('restart-agent', id);
      if (!result.ok) { flashTileError(tileEl, result.error); return; }
      // SIGINT sent — restart loop respawns claude in ~3s. Status dot will
      // flicker grey then come back green on the next poll cycle.
    }

    // Flash success/error feedback on a detach button inside the settings
    // popover. Success: brief green border + console log of what happened.
    // Error: red border + flash the error string in the button's hint slot
    // for 2s before reverting. Keeps the popover open either way so Richard
    // can see the result without losing context.
    function flashDetachResult(btnEl, result, agentId) {
      const hintEl = btnEl.querySelector('.text .hint');
      const originalHint = hintEl ? hintEl.textContent : '';
      if (result && result.ok) {
        btnEl.classList.add('flash-ok');
        if (hintEl) {
          if (result.newWindow)      hintEl.textContent = `→ ${result.newWindow}`;
          else if (result.joinedTo)  hintEl.textContent = `→ ${result.joinedTo}`;
          else                       hintEl.textContent = 'done';
        }
        setTimeout(() => {
          btnEl.classList.remove('flash-ok');
          if (hintEl) hintEl.textContent = originalHint;
        }, 1800);
      } else {
        btnEl.classList.add('flash-err');
        if (hintEl) hintEl.textContent = String((result && result.error) || 'failed').slice(0, 36);
        // Also flash the agent tile so the failure registers even if the user's
        // eyes were on the dock rather than the popover.
        const tileBtn = document.getElementById(`btn-${agentId}`);
        if (tileBtn) flashTileError(tileBtn, (result && result.error) || 'failed');
        setTimeout(() => {
          btnEl.classList.remove('flash-err');
          if (hintEl) hintEl.textContent = originalHint;
        }, 2200);
      }
    }

    // Briefly flash an error tooltip beneath the tile when an action fails
    // (e.g. trying to restart an agent that isn't running). Avoids alert().
    function flashTileError(tileEl, msg) {
      const overlay = tileEl.querySelector('.confirm-overlay');
      if (!overlay) return;
      const label = overlay.querySelector('.label');
      const prev = label.textContent;
      label.textContent = String(msg || 'failed').slice(0, 28);
      label.style.color = '#ff7090';
      tileEl.classList.add('confirming');
      setTimeout(() => {
        tileEl.classList.remove('confirming');
        label.textContent = prev;
        label.style.color = '';
      }, 1800);
    }

    // Edit-mode toggle. Off by default. Clicking the pencil/Edit button puts
    // the panel into a configuration view where the destructive badges
    // (× remove, ⟳ restart) are visible. Tile-body clicks are inert in this
    // mode so a stray miss doesn't toggle selection. Click the button again
    // (or trigger an action that re-renders) to exit.
    function toggleEditMode() {
      const on = !document.body.classList.contains('editing');
      document.body.classList.toggle('editing', on);
      document.getElementById('edit-btn').classList.toggle('active', on);
      // Cancel any open confirm when leaving edit mode.
      if (!on) {
        document.querySelectorAll('.agent-btn.confirming').forEach(el => el.classList.remove('confirming'));
      }
    }

    // ---------------------------------------------------------------------
    // Status polling — updates the green/grey dot per agent
    // ---------------------------------------------------------------------
    async function pollStatusOnce() {
      try {
        const statuses = await ipcRenderer.invoke('pane-status');
        statuses.forEach(s => {
          if (!agents[s.id]) return;
          agents[s.id].running = s.running;
          agents[s.id].attached = !!s.attached;
          const dot = document.getElementById(`dot-${s.id}`);
          if (dot) {
            // Three states:
            //   - .on        running + at least one tmux client attached
            //   - .detached  running + zero clients attached (headless)
            //   - (neither)  not running
            // The classes are mutually exclusive so the CSS animations don't
            // stack. Build the class list from scratch each tick.
            dot.classList.remove('on', 'detached');
            if (s.running) {
              dot.classList.add(s.attached ? 'on' : 'detached');
            }
          }
        });
      } catch (err) {
        // Quiet: if tmux isn't running, all dots stay grey, nothing to do.
      }
      // After the dock-dot pass, refresh any open radial menu so newly-stopped
      // (or newly-started) agents have their orbs flipped to the right
      // disabled/enabled state without the user re-opening the menu.
      refreshOpenRadialDisabledState();
      // Refresh chat-overlay presence cluster on the same cadence — cheap (no
      // extra tmux calls; reads agents[].running/.attached we just updated).
      try {
        if (typeof renderChatPresence === 'function' && typeof isChatOverlayOpen === 'function' && isChatOverlayOpen()) {
          renderChatPresence();
        }
      } catch { /* no-op: chat module may not be initialized yet */ }
    }

    function startStatusPolling() {
      if (statusTimer) return;
      // Poll pane-status AND session-layout together so the layout-mismatch
      // hint and the stop-session button update on the same cadence as the
      // dock dots. Both are cheap (single tmux call each, no shell). Run
      // both immediately on startup so the panel doesn't show stale state
      // for the first 3s after launch.
      const tick = () => { pollStatusOnce(); pollSessionLayoutOnce(); };
      tick();
      statusTimer = setInterval(tick, 3000);
    }

    // ---------------------------------------------------------------------
    // Wire-up
    // ---------------------------------------------------------------------
    document.getElementById('send-btn').addEventListener('click', send);
    document.getElementById('chat-input').addEventListener('keypress', (e) => {
      if (e.key !== 'Enter' || e.shiftKey) return;
      e.preventDefault();
      send();
    });
    document.getElementById('edit-btn').addEventListener('click', toggleEditMode);
    document.getElementById('select-all-btn').addEventListener('click', selectAll);
    document.getElementById('deploy-btn').addEventListener('click', deploy);
    document.getElementById('f-cwd-pick').addEventListener('click', pickCwd);
    document.getElementById('f-avatar-pick').addEventListener('click', pickAvatar);
    document.getElementById('f-cancel').addEventListener('click', () => { document.body.classList.remove('adding'); syncWindowSize(); });
    document.getElementById('f-submit').addEventListener('click', submitAdd);

    // v2.5: wire the layout-mode segmented control. Reads localStorage on
    // boot for the persisted choice; clicks update layoutMode and persist.
    wireLayoutPills();
    // v2.6: wire the tear-down session button (✕ next to layout pills).
    wireStopSessionButton();

    loadAndRender().then(startStatusPolling);
    window.addEventListener('resize', syncWindowSize);

    // ---------------------------------------------------------------------
    // Cmd+1..9 → attach to the Nth agent in the dock display order.
    // ---------------------------------------------------------------------
    // Window-level (NOT globalShortcut) — Cmd+digit globally would clobber
    // browser-tab / IDE tab-switching shortcuts in every other app on the
    // machine. Here it only fires when AgentRemote has focus, which is the
    // intended scope (Richard already has Cmd+Shift+Space to summon focus).
    //
    // Index maps to dock position: Cmd+1 = leftmost tile, Cmd+9 = ninth.
    // Skip if a text input is focused so digits keep typing into chat / form
    // fields as expected. Skip when edit mode is on (matching dblclick gate).
    window.addEventListener('keydown', (ev) => {
      if (!ev.metaKey || ev.shiftKey || ev.altKey || ev.ctrlKey) return;
      if (ev.key < '1' || ev.key > '9') return;
      // Don't hijack digits typed into the chat input or the add-agent form.
      const t = ev.target;
      const tag = t && t.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA') return;
      if (document.body.classList.contains('editing')) return;
      const idx = Number(ev.key) - 1;
      if (idx < 0 || idx >= agentOrder.length) return;
      ev.preventDefault();
      const id = agentOrder[idx];
      const btn = document.getElementById(`btn-${id}`);
      doAttach(id, btn);
    });

    // ---------------------------------------------------------------------
    // F-key voice + select — F1..F5 mapped to dock display order.
    // ---------------------------------------------------------------------
    // Tap (press + release < 250ms) = toggle select for that tile (same as a
    // click on the avatar — calls toggleAgent).
    //
    // Hold (press > 250ms without release) = start voice recording targeting
    // ONLY that agent. Web Speech API for transcription, AnalyserNode for the
    // audio-level reactive ring. On release: send the final transcript via the
    // existing broadcast-message IPC with selectedAgents=[that one] and isAll
    // false. The current multi-select state is NOT touched by hold-recordings.
    //
    // Esc during hold = cancel without sending (audio + transcript discarded).
    // Mid-hold F-key = cancel the current recording, start a new one targeting
    // the new agent.
    //
    // Dead-agent gate: if agents[id].running is false at release time, the
    // tmux send is suppressed and an error toast surfaces ("X is offline —
    // message discarded"). The recording itself runs normally; only the send
    // is gated. This avoids mid-hold flickering on a stale running flag.
    //
    // Permission: getUserMedia is gated by macOS the first time. We surface a
    // "requesting mic access…" hint while the prompt is up, and a permanent
    // error toast if denied (hold-to-record disabled until next launch). Tap
    // toggle stays available either way.
    //
    // Constraints (from the dispatch brief):
    //   - No new dependencies; Web Speech + Web Audio are browser-builtin.
    //   - Reuse broadcast-message IPC; don't introduce a new send pipeline.
    //   - The keydown listener must NOT intercept F-keys when an INPUT or
    //     TEXTAREA is focused (so the user can still type Fn shortcuts into
    //     forms — none defined today, but the contract holds).
    //   - rAF loop for the analyser, stopped on key release; no 60fps poll
    //     while idle.

    const FKEY_HOLD_THRESHOLD_MS = 250;
    const FKEY_MAP = { F1: 0, F2: 1, F3: 2, F4: 3, F5: 4 };
    const FKEY_KEYCODES = ['F1', 'F2', 'F3', 'F4', 'F5'];

    // Single-instance state. A second F-key during an active hold cancels
    // the first and replaces it; no concurrency.
    const voiceRec = {
      // Lifecycle:
      //   idle           — no key pressed
      //   pending        — key down, threshold timer running, hasn't crossed yet
      //   recording      — threshold crossed; analyser running, recog active
      //   permission_denied — getUserMedia rejected; only tap-toggle remains
      state: 'idle',
      activeId: null,           // agent id of the held tile (null when idle)
      activeIdx: null,          // dock index, for the keycap depress animation
      pressedAt: 0,
      holdTimer: null,          // setTimeout firing on threshold cross
      keyDown: null,            // currently-held key code (F1..F5) — used to
                                // gate the keyup matcher when the user holds
                                // multiple keys (we only respond to release of
                                // the same key that started the hold)
      tapAlreadyToggled: false, // true once a key crossed threshold so the
                                // keyup handler doesn't fire toggleAgent
      // Audio:
      mediaStream: null,
      audioCtx: null,
      analyser: null,
      analyserBuf: null,
      rafId: null,
      // Speech:
      recog: null,
      finalTranscript: '',
      interimTranscript: '',
      // DOM caches for the active tile:
      btnEl: null,
      tileEl: null,
      transcriptEl: null
    };

    function fkeyAgentId(idx) {
      if (idx < 0 || idx >= agentOrder.length) return null;
      return agentOrder[idx];
    }

    // Web Speech API capability check. The constructor exists in Chromium
    // even on platforms where the underlying engine is absent — we'll find
    // out for sure at recog.start() time. Treat absence as a soft no-op:
    // taps still toggle, holds simply don't transcribe.
    const SpeechRecognitionCtor = window.SpeechRecognition || window.webkitSpeechRecognition;
    function isSpeechAvailable() { return !!SpeechRecognitionCtor; }

    // ---- Toast ----
    let voiceToastTimer = null;
    function showVoiceToast({ kind, target, snippet, ms = 2500 }) {
      let el = document.getElementById('voice-toast');
      if (!el) {
        el = document.createElement('div');
        el.id = 'voice-toast';
        el.className = 'voice-toast';
        document.body.appendChild(el);
      }
      el.classList.toggle('error', kind === 'error');
      const arrow = kind === 'error' ? '!' : '→';
      const safeTarget = escapeHtml(target || '');
      const safeSnippet = escapeHtml(String(snippet || '').slice(0, 60));
      el.innerHTML = `<span class="vt-arrow">${arrow}</span>` +
                     `<span class="vt-target-name">${safeTarget}</span>` +
                     (safeSnippet ? `<span class="vt-snippet">${safeSnippet}</span>` : '');
      requestAnimationFrame(() => el.classList.add('visible'));
      if (voiceToastTimer) clearTimeout(voiceToastTimer);
      voiceToastTimer = setTimeout(() => {
        el.classList.remove('visible');
        voiceToastTimer = null;
      }, ms);
    }

    // ---- Transcript bubble ----
    function ensureTranscriptEl() {
      let el = document.getElementById('voice-transcript');
      if (!el) {
        el = document.createElement('div');
        el.id = 'voice-transcript';
        el.className = 'voice-transcript';
        el.innerHTML = '<span class="vt-target"></span><span class="vt-text empty"></span>';
        document.body.appendChild(el);
      }
      return el;
    }
    function positionTranscriptBubble(tileEl) {
      const el = ensureTranscriptEl();
      const r = tileEl.getBoundingClientRect();
      // Anchor above the tile, centered. Clamp to viewport so a left-edge
      // tile doesn't push the bubble off-screen.
      const winW = window.innerWidth;
      const desiredW = Math.min(320, winW - 24);
      let left = r.left + r.width / 2 - desiredW / 2;
      left = Math.max(12, Math.min(left, winW - desiredW - 12));
      el.style.left = `${Math.round(left)}px`;
      el.style.maxWidth = `${desiredW}px`;
      // Place above the tile with an 8px gap; collapse to below if the bubble
      // would clip past the top of the window.
      const bubbleH = el.offsetHeight || 56;
      let top = r.top - bubbleH - 8;
      if (top < 8) {
        top = r.bottom + 8;
      }
      el.style.top = `${Math.round(top)}px`;
      return el;
    }
    function setTranscriptText({ targetName, finalText, interimText, hint, permissionPending }) {
      const el = ensureTranscriptEl();
      el.classList.toggle('permission-pending', !!permissionPending);
      const tgt = el.querySelector('.vt-target');
      const txt = el.querySelector('.vt-text');
      tgt.textContent = permissionPending
        ? 'requesting mic access'
        : `→ ${targetName || ''}`;
      const composed = (finalText || '') + (interimText || '');
      if (hint) {
        txt.classList.add('empty');
        txt.textContent = hint;
        return;
      }
      if (!composed) {
        txt.classList.add('empty');
        txt.innerHTML = 'listening…<span class="vt-cursor">&nbsp;</span>';
      } else {
        txt.classList.remove('empty');
        // Show final text in primary color, interim in muted italic so the
        // user can see what's still subject to revision. Cursor follows.
        const safeFinal = escapeHtml(finalText || '');
        const safeInterim = escapeHtml(interimText || '');
        txt.innerHTML =
          (safeFinal ? `<span>${safeFinal}</span>` : '') +
          (safeInterim
            ? `<span style="color: var(--text-muted); font-style: italic;">${safeFinal ? ' ' : ''}${safeInterim}</span>`
            : '') +
          '<span class="vt-cursor">&nbsp;</span>';
      }
    }
    function showTranscriptBubble(tileEl) {
      const el = positionTranscriptBubble(tileEl);
      requestAnimationFrame(() => el.classList.add('visible'));
    }
    function hideTranscriptBubble() {
      const el = document.getElementById('voice-transcript');
      if (!el) return;
      el.classList.remove('visible');
      // Leave element in DOM for re-use; cheap.
    }

    // ---- Audio analyser loop ----
    // Drives the --audio-level CSS var from getByteFrequencyData. Levels are
    // smoothed with a leaky integrator so the ring breathes rather than
    // flickering on every frame. The rAF id is stashed so cancelVoiceRec can
    // tear it down on release / cancel.
    function startAnalyserLoop() {
      const buf = voiceRec.analyserBuf;
      const analyser = voiceRec.analyser;
      const btn = voiceRec.btnEl;
      if (!buf || !analyser || !btn) return;
      let smoothed = 0;
      const tick = () => {
        if (!voiceRec.analyser || voiceRec.state !== 'recording') {
          voiceRec.rafId = null;
          return;
        }
        analyser.getByteFrequencyData(buf);
        // RMS-ish: average bin energy / 255 (already byte-scaled). Skipping
        // the actual sqrt because perceptual smoothing handles the curve.
        let sum = 0;
        for (let i = 0; i < buf.length; i++) sum += buf[i];
        const avg = sum / (buf.length * 255);   // 0..1
        // Leaky integrator: 0.7 prev + 0.3 new — fast enough to feel reactive
        // without strobing. Bump the floor a touch so the ring never sits
        // dead-flat even in silence (gives ambient breath).
        smoothed = smoothed * 0.7 + avg * 0.3;
        const level = Math.min(1, Math.max(0.04, smoothed * 2.0));
        btn.style.setProperty('--audio-level', level.toFixed(3));
        voiceRec.rafId = requestAnimationFrame(tick);
      };
      voiceRec.rafId = requestAnimationFrame(tick);
    }

    // ---- Recording lifecycle ----
    function applyRecordingClasses(idx, id) {
      const tile = document.querySelector(`.agent-tile[data-agent-id="${id}"]`);
      const btn = document.getElementById(`btn-${id}`);
      if (!tile || !btn) return null;
      // Strip any prior recording classes (defensive — should already be clean).
      document.querySelectorAll('.agent-tile.voice-recording-tile').forEach(t => t.classList.remove('voice-recording-tile'));
      document.querySelectorAll('.agent-btn.voice-recording').forEach(b => b.classList.remove('voice-recording'));
      tile.classList.add('voice-recording-tile');
      btn.classList.add('voice-recording');
      btn.style.setProperty('--audio-level', '0.04');
      document.body.classList.add('voice-recording');
      voiceRec.btnEl = btn;
      voiceRec.tileEl = tile;
      return { tile, btn };
    }
    function clearRecordingClasses() {
      if (voiceRec.btnEl) {
        voiceRec.btnEl.classList.remove('voice-recording');
        voiceRec.btnEl.style.removeProperty('--audio-level');
      }
      if (voiceRec.tileEl) voiceRec.tileEl.classList.remove('voice-recording-tile');
      document.body.classList.remove('voice-recording');
    }

    async function startVoiceRecording(idx, id) {
      const agent = agents[id];
      if (!agent) return;
      const targetName = labelTextFor(agent);

      const ui = applyRecordingClasses(idx, id);
      if (!ui) return;
      voiceRec.activeId = id;
      voiceRec.activeIdx = idx;
      voiceRec.finalTranscript = '';
      voiceRec.interimTranscript = '';
      // Show the bubble immediately in permission-pending state so the user
      // sees feedback even if getUserMedia takes a beat to resolve.
      setTranscriptText({ targetName, permissionPending: true });
      showTranscriptBubble(ui.tile);

      // Get the mic stream first; the analyser hangs off it. Permission denied
      // here aborts the recording but the recording-state UI still got a
      // momentary flash, which is fine — the user gets a clear error toast.
      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (err) {
        // Denied or device missing. State change → permission_denied so future
        // holds short-circuit (taps still work).
        clearRecordingClasses();
        hideTranscriptBubble();
        voiceRec.state = 'permission_denied';
        voiceRec.activeId = null;
        showVoiceToast({
          kind: 'error',
          target: 'Mic access denied',
          snippet: 'F-key voice disabled — grant in System Settings',
          ms: 4500
        });
        return;
      }
      voiceRec.mediaStream = stream;
      try {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        const ctx = new Ctx();
        const src = ctx.createMediaStreamSource(stream);
        const analyser = ctx.createAnalyser();
        analyser.fftSize = 256;          // small bin count → fast loop
        analyser.smoothingTimeConstant = 0.5;
        src.connect(analyser);
        voiceRec.audioCtx = ctx;
        voiceRec.analyser = analyser;
        voiceRec.analyserBuf = new Uint8Array(analyser.frequencyBinCount);
      } catch (err) {
        // AudioContext failure is rare on Electron but possible if the
        // session has been suspended. The recording can still proceed via
        // recog; the ring just won't react.
        console.warn('[voice] AudioContext init failed:', err && err.message);
      }

      // Drop permission-pending flag and start the bubble in active mode.
      setTranscriptText({ targetName, finalText: '', interimText: '' });

      // Speech recognition. Each recording gets a fresh recognizer — reusing
      // them is brittle on Chromium's webkitSpeechRecognition (the engine
      // sometimes refuses a re-start after stop()).
      if (isSpeechAvailable()) {
        try {
          const recog = new SpeechRecognitionCtor();
          recog.continuous = true;
          recog.interimResults = true;
          recog.lang = 'en-US';
          recog.onresult = (ev) => {
            // Walk all results from this session. Final results stack onto
            // finalTranscript; interim get re-rendered each tick.
            let interim = '';
            let finalAdded = '';
            for (let i = ev.resultIndex; i < ev.results.length; i++) {
              const r = ev.results[i];
              const txt = r[0] && r[0].transcript ? r[0].transcript : '';
              if (r.isFinal) finalAdded += txt;
              else interim += txt;
            }
            if (finalAdded) {
              voiceRec.finalTranscript = (voiceRec.finalTranscript + ' ' + finalAdded).replace(/\s+/g, ' ').trim();
            }
            voiceRec.interimTranscript = interim.trim();
            if (voiceRec.state === 'recording') {
              setTranscriptText({
                targetName,
                finalText: voiceRec.finalTranscript,
                interimText: voiceRec.interimTranscript
              });
            }
          };
          recog.onerror = (ev) => {
            const code = ev && ev.error;
            // 'aborted' fires on every clean stop; benign.
            if (code === 'aborted' || code === 'no-speech') return;
            console.warn('[voice] recog error:', code);
            if (voiceRec.state === 'recording' && code !== 'audio-capture') {
              setTranscriptText({
                targetName,
                hint: `(speech engine: ${code})`
              });
            }
          };
          recog.onend = () => { /* no-op; we drive lifecycle from key events */ };
          recog.start();
          voiceRec.recog = recog;
        } catch (err) {
          // Chromium occasionally complains "already started" on rapid hold/release
          // cycles. Surface as a hint but keep recording — the analyser ring
          // still works, just no transcript.
          console.warn('[voice] recog.start failed:', err && err.message);
          setTranscriptText({ targetName, hint: '(speech engine unavailable)' });
        }
      } else {
        setTranscriptText({ targetName, hint: '(speech recognition unavailable)' });
      }

      voiceRec.state = 'recording';
      startAnalyserLoop();
    }

    // Stop everything: recog, audio context, analyser loop. Returns the final
    // transcript (concatenation of finalTranscript + any pending interim that
    // we'll choose to send). Caller decides whether to fire the IPC.
    function stopRecordingResources() {
      if (voiceRec.rafId) {
        cancelAnimationFrame(voiceRec.rafId);
        voiceRec.rafId = null;
      }
      if (voiceRec.recog) {
        try { voiceRec.recog.stop(); } catch { /* ignore */ }
        voiceRec.recog = null;
      }
      if (voiceRec.mediaStream) {
        try { voiceRec.mediaStream.getTracks().forEach(t => t.stop()); } catch { /* ignore */ }
        voiceRec.mediaStream = null;
      }
      if (voiceRec.audioCtx) {
        try { voiceRec.audioCtx.close(); } catch { /* ignore */ }
        voiceRec.audioCtx = null;
      }
      voiceRec.analyser = null;
      voiceRec.analyserBuf = null;
    }

    // Cancel without sending: discard transcript, collapse UI with a shake.
    function cancelVoiceRecording({ shake = true } = {}) {
      const id = voiceRec.activeId;
      const tileEl = voiceRec.tileEl;
      stopRecordingResources();
      clearRecordingClasses();
      hideTranscriptBubble();
      if (shake && tileEl) {
        tileEl.classList.add('voice-cancel-shake');
        setTimeout(() => tileEl.classList.remove('voice-cancel-shake'), 320);
      }
      voiceRec.state = voiceRec.state === 'permission_denied' ? 'permission_denied' : 'idle';
      voiceRec.activeId = null;
      voiceRec.activeIdx = null;
      voiceRec.btnEl = null;
      voiceRec.tileEl = null;
      voiceRec.finalTranscript = '';
      voiceRec.interimTranscript = '';
      // Don't show a toast — the shake is the entire feedback.
      return id;
    }

    // Finish + send. Drains any in-flight interim into finalTranscript so
    // partial speech still ships if the user releases mid-sentence (Web Speech
    // usually finalizes on stop(), but the renderer hasn't necessarily seen
    // the final-flag result by the time we call stop()).
    function finishVoiceRecording() {
      const id = voiceRec.activeId;
      const agent = agents[id];
      const targetName = agent ? labelTextFor(agent) : (id || '');

      // Drain interim. We give recog 80ms to flush a final result before
      // tearing down — short enough not to feel sluggish, long enough that
      // a half-spoken word usually finalizes. If nothing arrives, we ship
      // the interim as-is (still better than dropping the speech).
      let composed = '';
      const drain = () => {
        composed = (voiceRec.finalTranscript + ' ' + voiceRec.interimTranscript).replace(/\s+/g, ' ').trim();
      };

      // Capture pre-teardown state we'll need post-stop.
      const tileEl = voiceRec.tileEl;

      // Try a short flush window for one last final result.
      try {
        if (voiceRec.recog) {
          // recog.stop() requests a final result; the onresult handler should
          // fire one more time with isFinal=true if there's pending audio.
          voiceRec.recog.stop();
        }
      } catch { /* ignore */ }
      setTimeout(() => {
        drain();
        const finalMsg = composed;
        // Now actually tear down the rest of the resources.
        stopRecordingResources();
        clearRecordingClasses();
        hideTranscriptBubble();

        const wasId = id;
        voiceRec.state = 'idle';
        voiceRec.activeId = null;
        voiceRec.activeIdx = null;
        voiceRec.btnEl = null;
        voiceRec.tileEl = null;
        voiceRec.finalTranscript = '';
        voiceRec.interimTranscript = '';

        if (!finalMsg) {
          // Nothing transcribed — silent no-op (no toast). User probably
          // changed their mind and just released without speaking.
          return;
        }
        // Dead-agent gate: if the agent isn't running, suppress the send and
        // surface an error toast. The recording state already tore down, so
        // the user just sees the toast.
        if (!agents[wasId] || !agents[wasId].running) {
          showVoiceToast({
            kind: 'error',
            target: `${targetName} is offline`,
            snippet: 'message discarded',
            ms: 3000
          });
          return;
        }
        // Send via the existing broadcast-message IPC. Single recipient.
        const payload = [{ id: wasId, tmuxTarget: agents[wasId].tmuxTarget }];
        ipcRenderer.send('broadcast-message', {
          message: finalMsg,
          selectedAgents: payload,
          isAll: false
        });
        showVoiceToast({
          kind: 'ok',
          target: targetName,
          snippet: finalMsg,
          ms: 2500
        });
      }, 80);
    }

    // ---- Keydown / keyup handlers ----
    window.addEventListener('keydown', (ev) => {
      const code = ev.code || ev.key;
      // Only trap F1..F5 with no modifier. Cmd / Ctrl / Alt / Shift + Fn passes through.
      if (!FKEY_KEYCODES.includes(code)) return;
      if (ev.metaKey || ev.ctrlKey || ev.altKey || ev.shiftKey) return;

      // Don't hijack F-keys when text input has focus — input forms / chat box.
      const t = ev.target;
      const tag = t && t.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA' || (t && t.isContentEditable)) return;

      // Always preventDefault so Chromium's default F-key behaviors (open dev
      // tools, fullscreen toggle, etc) don't fire when no modifier is held.
      ev.preventDefault();
      // Browsers fire keydown repeatedly while a key is held (autorepeat). We
      // only care about the first transition.
      if (ev.repeat) return;

      const idx = FKEY_MAP[code];
      const id = fkeyAgentId(idx);
      if (!id) return;     // F4/F5 with fewer agents in dock — no-op.

      // If permission was previously denied, fall back to a tap-only path:
      // every keypress just toggles select.
      if (voiceRec.state === 'permission_denied') {
        if (document.body.classList.contains('editing')) return;
        toggleAgent(id);
        return;
      }

      // Concurrent F-key during a hold → cancel current, start a new pending
      // for the new agent. The first hold is discarded (no send).
      if (voiceRec.state === 'recording' || voiceRec.state === 'pending') {
        // Only displace if it's a DIFFERENT key. Same-key keydowns from
        // weird OS / IME re-fires are filtered by ev.repeat above.
        if (voiceRec.keyDown !== code) {
          if (voiceRec.state === 'recording') {
            cancelVoiceRecording({ shake: true });
          } else if (voiceRec.holdTimer) {
            clearTimeout(voiceRec.holdTimer);
            voiceRec.holdTimer = null;
            voiceRec.state = 'idle';
          }
        } else {
          return;
        }
      }

      // Fresh press: arm the threshold timer. The key-as-a-tap path runs in
      // keyup if we never crossed the threshold.
      voiceRec.state = 'pending';
      voiceRec.activeId = id;
      voiceRec.activeIdx = idx;
      voiceRec.keyDown = code;
      voiceRec.pressedAt = Date.now();
      voiceRec.tapAlreadyToggled = false;
      voiceRec.holdTimer = setTimeout(() => {
        voiceRec.holdTimer = null;
        if (voiceRec.state !== 'pending') return;     // pre-empted
        if (voiceRec.keyDown !== code) return;        // displaced
        // Edit-mode gate: still allow the tap path, but don't enter the
        // recording state — matches the dblclick / Cmd+digit edit-mode gate.
        if (document.body.classList.contains('editing')) {
          voiceRec.state = 'idle';
          voiceRec.activeId = null;
          voiceRec.activeIdx = null;
          return;
        }
        startVoiceRecording(idx, id);
      }, FKEY_HOLD_THRESHOLD_MS);
    });

    window.addEventListener('keyup', (ev) => {
      const code = ev.code || ev.key;
      if (!FKEY_KEYCODES.includes(code)) return;

      // Only respond to the release of the same key that started the hold.
      if (voiceRec.keyDown && voiceRec.keyDown !== code) return;

      // Pre-threshold release → tap. Run toggleAgent on the held tile.
      if (voiceRec.state === 'pending' && voiceRec.holdTimer) {
        clearTimeout(voiceRec.holdTimer);
        voiceRec.holdTimer = null;
        const id = voiceRec.activeId;
        voiceRec.state = 'idle';
        voiceRec.activeId = null;
        voiceRec.activeIdx = null;
        voiceRec.keyDown = null;
        if (id && !document.body.classList.contains('editing')) {
          toggleAgent(id);
        }
        return;
      }

      // Post-threshold release → finish + send.
      if (voiceRec.state === 'recording') {
        voiceRec.keyDown = null;
        finishVoiceRecording();
        return;
      }

      // Stray release (e.g. permission_denied path).
      voiceRec.keyDown = null;
    });

    // Esc during a hold → cancel without sending. We listen alongside the
    // existing radial-menu / chat-overlay Esc handlers; when neither of those
    // is open, this branch wins. The radial / chat handlers add their own
    // listeners with capture on document — our listener is on window, fires
    // last in the bubble phase, so we don't preempt them.
    window.addEventListener('keydown', (ev) => {
      if (ev.key !== 'Escape') return;
      if (voiceRec.state !== 'recording' && voiceRec.state !== 'pending') return;
      // Don't compete with overlay / radial Esc handlers — they preventDefault
      // already if active. We only act when our state machine is engaged.
      if (voiceRec.holdTimer) {
        clearTimeout(voiceRec.holdTimer);
        voiceRec.holdTimer = null;
      }
      if (voiceRec.state === 'recording') {
        cancelVoiceRecording({ shake: true });
      } else {
        voiceRec.state = 'idle';
        voiceRec.activeId = null;
        voiceRec.activeIdx = null;
      }
      voiceRec.keyDown = null;
      // Don't preventDefault here — leaving it lets other Esc handlers
      // (chat-overlay close, radial-menu close) still fire if THEY were the
      // intended target.
    });

    // Window blur (Cmd+Tab away) mid-hold → cancel quietly. Without this, the
    // recording stays armed but the keyup never lands, leaking the
    // mediaStream / audioCtx and pinning the dock UI in recording state. No
    // shake feedback — the window isn't visible to show it.
    window.addEventListener('blur', () => {
      if (voiceRec.state !== 'recording' && voiceRec.state !== 'pending') return;
      if (voiceRec.holdTimer) {
        clearTimeout(voiceRec.holdTimer);
        voiceRec.holdTimer = null;
      }
      if (voiceRec.state === 'recording') {
        cancelVoiceRecording({ shake: false });
      } else {
        voiceRec.state = 'idle';
        voiceRec.activeId = null;
        voiceRec.activeIdx = null;
      }
      voiceRec.keyDown = null;
    });

    // ---------------------------------------------------------------------
    // Cmd+T → toggle team-chat overlay (native chat over messages.jsonl)
    // ---------------------------------------------------------------------
    // Window-level keybinding — only fires when AgentRemote has focus, which
    // is the intended scope. Cmd+T globally would collide with most browser
    // "new tab" shortcuts; localized here it only competes inside this app
    // (which has no concept of tabs, so it's free).
    //
    // Why keyboard-only and no visible button: the meta-row had a button
    // added by a prior dispatch and Richard reverted it (commit 6214b7c).
    // Adding any visible icon to the meta-row / util-buttons / dock would
    // compress existing affordances. Cmd+T is the cleanest path.
    //
    // The overlay is a fixed-position glass popover that renders a NATIVE
    // chat surface (no webview). It reads/writes
    // ~/.message-agent/channels/team/messages.jsonl directly through three
    // IPC handlers (chat-tail-init / chat-tail-read / chat-post). Live tail
    // is driven by main.js fs.watch with a 2s poll fallback for unreliable
    // FS events on macOS.

    // Min size for comfortable use — width fits a long composer line, height
    // shows ~10 message bubbles before the log scrolls.
    const CHAT_OVERLAY_MIN_W = 620;
    const CHAT_OVERLAY_MIN_H = 540;

    // Bare-name canonical identities. Substrate is migrating off the
    // `claude-` prefix per Richard 2026-05-03 — Hermes returns in a different
    // shape so the disambiguator no longer earns its keep. Normalization
    // below handles legacy `claude-*` and `overlordswarmy` for historical
    // JSONL display until those rows age out.
    const CHAT_FROM_COLORS = {
      richard: '#e07c4c',  // matches --accent (amber)
      lucius:  '#7fc7ff',
      xavier:  '#c79bff',
      gekko:   '#ff9b6a',
      swarmy:  '#5cd28a'
    };
    const CHAT_FROM_FALLBACK = 'var(--text-muted)';

    function chatNormalizeSender(from) {
      if (!from) return '';
      const f = String(from).toLowerCase();
      if (f === 'overlordswarmy') return 'swarmy';
      if (f.startsWith('claude-')) return f.slice(7);
      return f;
    }

    // Returns the agents.json id for avatar lookup; richard returns null
    // because self-bubbles right-align without an avatar.
    function chatAgentIdForFrom(from) {
      const id = chatNormalizeSender(from);
      return id === 'richard' ? null : id;
    }

    function chatColorFor(from) {
      return CHAT_FROM_COLORS[chatNormalizeSender(from)] || CHAT_FROM_FALLBACK;
    }

    let chatDismissCleanup = null;                // outside-click / Esc unbinder
    let chatPreOpenSize = null;                   // {w,h} captured on open
    let chatTailOffset = 0;
    let chatPollHandle = null;                    // heartbeat fallback if fs.watch goes silent
    let chatLastTailAt = 0;                       // ms timestamp of last successful tail-read
    let chatHistoryLoaded = false;
    let chatComposerInFlight = false;             // debounce: one send at a time

    // correlation_id → {bubbleEl, retryEnvelope, timer} for self-sent optimistic
    // bubbles awaiting fs.watch round-trip. Resolved → entry deleted; stale → retry.
    const chatPendingSelf = new Map();
    let chatLastGroupKey = null;                  // "from|YYYY-MM-DD" of last rendered group
    let chatLastDayKey = null;                    // "YYYY-MM-DD" of last day separator

    function chatOverlayEl()   { return document.getElementById('chat-overlay'); }
    function chatLogEl()       { return document.getElementById('chat-log'); }
    function chatTextareaEl()  { return document.getElementById('chat-textarea'); }
    function chatSendBtnEl()   { return document.getElementById('chat-send-btn'); }
    function chatErrorEl()     { return document.getElementById('chat-error'); }
    function chatComposerEl()  { return document.getElementById('chat-composer'); }
    function chatPresenceEl()  { return document.getElementById('chat-presence'); }

    function isChatOverlayOpen() {
      return chatOverlayEl().classList.contains('shown');
    }

    function pad2(n) { return String(n).padStart(2, '0'); }

    // Local HH:MM (no seconds — chat doesn't need that resolution).
    function formatLocalHM(iso) {
      try {
        const d = new Date(iso);
        if (isNaN(d.getTime())) return '';
        return `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
      } catch { return ''; }
    }

    // YYYY-MM-DD in LOCAL tz — used for grouping. JSONL timestamps are UTC,
    // but the user perceives "Today" as their wall-clock today.
    function localDayKey(iso) {
      try {
        const d = new Date(iso);
        if (isNaN(d.getTime())) return '';
        return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
      } catch { return ''; }
    }

    // Human-readable day label. "Today" / "Yesterday" / "Sat May 3"
    function formatDayLabel(iso) {
      try {
        const d = new Date(iso);
        if (isNaN(d.getTime())) return '';
        const now = new Date();
        const todayKey = `${now.getFullYear()}-${pad2(now.getMonth() + 1)}-${pad2(now.getDate())}`;
        const ydate = new Date(now);
        ydate.setDate(ydate.getDate() - 1);
        const yKey = `${ydate.getFullYear()}-${pad2(ydate.getMonth() + 1)}-${pad2(ydate.getDate())}`;
        const dKey = localDayKey(iso);
        if (dKey === todayKey) return 'Today';
        if (dKey === yKey) return 'Yesterday';
        // "Sat May 3" — short weekday + month + day-of-month.
        return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
      } catch { return ''; }
    }

    // Auto-scroll heuristic: are we within 60px of the bottom? Slightly more
    // generous than the v0.1 40px threshold because the new layout has more
    // breathing room and "stuck to bottom" should feel sticky.
    function chatIsNearBottom() {
      const log = chatLogEl();
      if (!log) return true;
      return (log.scrollHeight - log.scrollTop - log.clientHeight) < 60;
    }
    function chatScrollToBottom() {
      const log = chatLogEl();
      if (log) log.scrollTop = log.scrollHeight;
    }

    function chatShowError(msg) {
      const el = chatErrorEl();
      if (!el) return;
      el.textContent = msg;
      el.classList.add('visible');
      clearTimeout(el._clearTimer);
      el._clearTimer = setTimeout(() => {
        el.classList.remove('visible');
        el.textContent = '';
      }, 6000);
    }

    // ── Empty state ───────────────────────────────────────────────────────
    function chatClearEmptyState() {
      const log = chatLogEl();
      if (!log) return;
      const empty = log.querySelector('.chat-empty');
      if (empty) empty.remove();
    }
    function chatShowEmptyState() {
      const log = chatLogEl();
      if (!log || log.querySelector('.chat-empty')) return;
      const empty = document.createElement('div');
      empty.className = 'chat-empty';
      const circle = document.createElement('div');
      circle.className = 'glyph-circle';
      circle.textContent = '#';
      const title = document.createElement('div');
      title.className = 'empty-title';
      title.textContent = 'no messages yet';
      const sub = document.createElement('div');
      sub.className = 'empty-sub';
      sub.textContent = 'be the first to say hi';
      empty.appendChild(circle);
      empty.appendChild(title);
      empty.appendChild(sub);
      log.appendChild(empty);
    }

    // ── Avatar element factory ─────────────────────────────────────────────
    // Renders an <object> tag pointing at assets/<id>.svg when available;
    // falls back to a colored monogram disk. Used both in message groups
    // and in the presence cluster.
    function chatBuildAvatar(from, sizeClassName) {
      const wrap = document.createElement('div');
      wrap.className = sizeClassName;
      const agentId = chatAgentIdForFrom(from);
      // Prefer an avatar from the registry if known; otherwise monogram.
      let avatarFile = null;
      if (agentId && typeof agents !== 'undefined' && agents && agents[agentId] && agents[agentId].avatar) {
        avatarFile = agents[agentId].avatar;
      }
      if (avatarFile) {
        const obj = document.createElement('object');
        obj.setAttribute('data', `assets/${avatarFile}`);
        obj.setAttribute('type', 'image/svg+xml');
        // Click should fall through to the bubble row (no drag/drop on the
        // svg itself).
        obj.style.pointerEvents = 'none';
        wrap.appendChild(obj);
      } else {
        // Monogram: first letter of `from`, white on per-agent color.
        const ch = (from || '?').slice(0, 1).toUpperCase();
        wrap.textContent = ch;
        const c = chatColorFor(from);
        wrap.style.background = c.startsWith('var(') ? 'rgba(255,255,255,0.12)' : c;
      }
      return wrap;
    }

    // ── Group rendering ───────────────────────────────────────────────────
    // We append envelopes one at a time via chatAppendEnvelope(env, opts).
    // Inside, we either:
    //   1. Extend the current trailing group (same `from` AND same day) by
    //      inserting just a new bubble into its .stack;
    //   2. Or create a fresh group (with avatar + sender label).
    // Day separators are inserted whenever the day key changes.
    //
    // opts.animate (boolean) — apply .entering for fade-in. Used for deltas
    // after history load; suppressed during the seed render.
    // opts.optimistic (boolean) — mark the bubble with .sending and stash it
    // in chatPendingSelf so we can resolve it when fs.watch round-trips.
    function chatAppendEnvelope(env, opts = {}) {
      const log = chatLogEl();
      if (!log || !env || typeof env !== 'object') return null;

      const from = String(env.from || '').toLowerCase() || '?';
      const message = (env.message === undefined || env.message === null) ? '' : String(env.message);
      const ts = env.timestamp ? String(env.timestamp) : '';
      const correlationId = env.correlation_id ? String(env.correlation_id) : '';
      const isSelf = (from === 'richard');
      const dayKey = ts ? localDayKey(ts) : '';
      const groupKey = `${from}|${dayKey}`;
      const animate = !!opts.animate;
      const optimistic = !!opts.optimistic;

      chatClearEmptyState();

      // Day separator if we crossed midnight (or this is the first day rendered).
      if (dayKey && dayKey !== chatLastDayKey) {
        const sep = document.createElement('div');
        sep.className = 'chat-day-sep';
        sep.textContent = formatDayLabel(ts) || dayKey;
        log.appendChild(sep);
        chatLastDayKey = dayKey;
        // Force a fresh group after a day break so the same-sender across
        // days still gets a fresh avatar + label header.
        chatLastGroupKey = null;
      }

      // Locate or build the group.
      let groupEl;
      let stackEl;
      const sameGroup = (chatLastGroupKey === groupKey);
      if (sameGroup) {
        groupEl = log.lastElementChild;
        // Defensive: if the last element isn't a group (e.g. it's the empty
        // state we just removed and now somehow we hit this branch), bail to
        // the new-group path.
        if (!groupEl || !groupEl.classList || !groupEl.classList.contains('chat-group')) {
          groupEl = null;
        } else {
          stackEl = groupEl.querySelector('.stack');
          // Drop the .last-of-group marker on the previous tail bubble — it
          // was the bottom of the group when it was rendered, but now there's
          // a new bubble below it.
          const prevTail = stackEl.querySelector('.chat-bubble.last-of-group');
          if (prevTail) prevTail.classList.remove('last-of-group');
        }
      }

      if (!sameGroup || !groupEl) {
        groupEl = document.createElement('div');
        groupEl.className = 'chat-group' + (isSelf ? ' from-self' : '');
        if (animate) groupEl.classList.add('entering');

        // Avatar column (skipped for self via CSS).
        const avatar = chatBuildAvatar(from, 'avatar-col');
        groupEl.appendChild(avatar);

        stackEl = document.createElement('div');
        stackEl.className = 'stack';

        // Sender row — name + opening timestamp. Only on first message of a
        // group. Self groups skip the name (no point — right-align + amber
        // is the identity).
        if (!isSelf) {
          const senderRow = document.createElement('div');
          senderRow.className = 'sender-row';
          const name = document.createElement('span');
          name.className = 'name';
          name.textContent = from;
          name.style.color = chatColorFor(from);
          senderRow.appendChild(name);
          if (ts) {
            const headTime = document.createElement('span');
            headTime.className = 'head-time';
            headTime.textContent = formatLocalHM(ts);
            senderRow.appendChild(headTime);
          }
          stackEl.appendChild(senderRow);
        }
        groupEl.appendChild(stackEl);
        log.appendChild(groupEl);
        chatLastGroupKey = groupKey;
      }

      // The bubble.
      const bubble = document.createElement('div');
      bubble.className = 'chat-bubble first-of-group last-of-group';
      // If we're appending into an existing group, the prior tail just lost
      // its last-of-group; the new bubble keeps last-of-group but sheds
      // first-of-group (it isn't first anymore). Detect by checking if the
      // stack already has at least one bubble.
      if (sameGroup && stackEl.querySelector('.chat-bubble')) {
        bubble.classList.remove('first-of-group');
      }
      // Body. textContent for safety — never innerHTML.
      const body = document.createElement('span');
      body.textContent = message;
      bubble.appendChild(body);

      if (ts) {
        const stamp = document.createElement('span');
        stamp.className = 'stamp';
        stamp.textContent = formatLocalHM(ts);
        bubble.appendChild(stamp);
      }
      if (animate) bubble.classList.add('entering');
      if (optimistic) bubble.classList.add('sending');
      stackEl.appendChild(bubble);
      return bubble;
    }

    function chatRenderHistory(envelopes) {
      const log = chatLogEl();
      if (!log) return;
      log.innerHTML = '';
      chatLastGroupKey = null;
      chatLastDayKey = null;

      if (!envelopes.length) {
        chatShowEmptyState();
        return;
      }

      for (const env of envelopes) chatAppendEnvelope(env, { animate: false });
      chatScrollToBottom();
    }

    // ── First-open + tail refresh ─────────────────────────────────────────
    async function chatLoadHistory() {
      try {
        const res = await ipcRenderer.invoke('chat-tail-init');
        if (!res || !res.ok) {
          chatShowError(res && res.error ? `Could not read chat log: ${res.error}` : 'Could not read chat log.');
          return;
        }
        chatTailOffset = res.offset || 0;
        const envelopes = Array.isArray(res.envelopes) ? res.envelopes : [];
        chatRenderHistory(envelopes);
        chatHistoryLoaded = true;
      } catch (err) {
        chatShowError(`Could not read chat log: ${err && err.message ? err.message : err}`);
      }
    }

    async function chatTailRefresh() {
      if (!chatHistoryLoaded) return;
      try {
        const res = await ipcRenderer.invoke('chat-tail-read', { offset: chatTailOffset });
        if (!res || !res.ok) return;
        chatLastTailAt = Date.now();
        const newEnvelopes = Array.isArray(res.envelopes) ? res.envelopes : [];
        if (newEnvelopes.length === 0) {
          chatTailOffset = (typeof res.offset === 'number') ? res.offset : chatTailOffset;
          return;
        }
        const wasNearBottom = chatIsNearBottom();
        for (const env of newEnvelopes) {
          // Round-trip resolution: if this envelope corresponds to one of our
          // optimistic sends (matching correlation_id), un-pulse the existing
          // bubble instead of appending a new one. The bubble is already in
          // the DOM with the right text — we just need to clear .sending and
          // forget it from chatPendingSelf.
          const corr = env && env.correlation_id ? String(env.correlation_id) : '';
          if (corr && chatPendingSelf.has(corr)) {
            const pending = chatPendingSelf.get(corr);
            if (pending && pending.bubbleEl) {
              pending.bubbleEl.classList.remove('sending');
              pending.bubbleEl.classList.remove('failed');
            }
            if (pending && pending.timer) clearTimeout(pending.timer);
            chatPendingSelf.delete(corr);
            // Don't re-render the same envelope. Continue.
            continue;
          }
          chatAppendEnvelope(env, { animate: true });
        }
        chatTailOffset = (typeof res.offset === 'number') ? res.offset : chatTailOffset;
        if (wasNearBottom) chatScrollToBottom();
      } catch (err) {
        console.warn('[chat] tail refresh failed:', err && err.message ? err.message : err);
      }
    }

    // ── Send + optimistic insert ──────────────────────────────────────────
    async function chatSendMessage() {
      if (chatComposerInFlight) return;        // debounce double-fire
      const ta = chatTextareaEl();
      const btn = chatSendBtnEl();
      if (!ta || !btn) return;
      const raw = ta.value;
      const trimmed = raw.replace(/\s+$/g, '');
      if (!trimmed) return;

      chatComposerInFlight = true;
      btn.disabled = true;
      btn.classList.remove('armed');
      ta.value = '';
      chatAutoResizeTextarea();
      // Don't blur — Richard wants to type follow-ups immediately.
      ta.focus();

      // Generate a correlation ID so we can match the envelope when fs.watch
      // round-trips it back. crypto.randomUUID is available in Electron.
      let correlation_id;
      try { correlation_id = crypto.randomUUID(); }
      catch { correlation_id = 'r-' + Date.now() + '-' + Math.random().toString(36).slice(2, 10); }

      // Optimistic envelope. Use local now() for the timestamp; the server
      // will overwrite with its own when fs.watch reads back, but for the
      // brief window before that, this is what the user sees.
      const localIso = new Date().toISOString().replace(/\.\d{3}Z$/, 'Z');
      const optimisticEnv = {
        channel: 'team',
        correlation_id,
        from: 'richard',
        message: trimmed,
        timestamp: localIso,
        to: 'team',
        type: 'message'
      };
      const wasNearBottom = chatIsNearBottom();
      const bubbleEl = chatAppendEnvelope(optimisticEnv, { animate: true, optimistic: true });
      if (wasNearBottom) chatScrollToBottom();

      // Stash so we can mark .failed if 2s passes without round-trip and
      // wire click-to-retry.
      const failTimer = setTimeout(() => {
        const pending = chatPendingSelf.get(correlation_id);
        if (!pending || !pending.bubbleEl) return;
        pending.bubbleEl.classList.remove('sending');
        pending.bubbleEl.classList.add('failed');
        // Click on the failed bubble retries.
        const onRetry = (ev) => {
          ev.stopPropagation();
          pending.bubbleEl.removeEventListener('click', onRetry);
          // Restore the text in the composer for re-edit; user clicks Send
          // again. Cleaner than auto-resending blind — they get to confirm
          // / amend.
          chatPendingSelf.delete(correlation_id);
          pending.bubbleEl.remove();
          ta.value = trimmed;
          chatAutoResizeTextarea();
          ta.focus();
          // Place cursor at end.
          ta.setSelectionRange(ta.value.length, ta.value.length);
          chatComposerInFlight = false;
          btn.disabled = !ta.value.trim();
          btn.classList.toggle('armed', !!ta.value.trim());
        };
        pending.bubbleEl.addEventListener('click', onRetry);
      }, 2000);
      chatPendingSelf.set(correlation_id, { bubbleEl, retryEnvelope: optimisticEnv, timer: failTimer });

      try {
        const res = await ipcRenderer.invoke('chat-post', { message: trimmed, to: 'team' });
        if (!res || !res.ok) {
          // Promote bubble to .failed immediately and stash the original text.
          if (bubbleEl) {
            bubbleEl.classList.remove('sending');
            bubbleEl.classList.add('failed');
          }
          chatShowError(res && res.error ? `Send failed: ${res.error}` : 'Send failed.');
        } else {
          // chat-post wrote the file with main's own correlation_id (NOT the
          // one we generated here). The fs.watch round-trip will deliver an
          // Main rewrites correlation_id; re-key the pending entry so the
          // fs.watch round-trip lookup matches.
          const mainCorr = res.envelope && res.envelope.correlation_id;
          if (mainCorr && bubbleEl) {
            chatPendingSelf.delete(correlation_id);
            chatPendingSelf.set(mainCorr, { bubbleEl, retryEnvelope: res.envelope, timer: failTimer });
          }
        }
      } catch (err) {
        if (bubbleEl) {
          bubbleEl.classList.remove('sending');
          bubbleEl.classList.add('failed');
        }
        chatShowError(`Send failed: ${err && err.message ? err.message : err}`);
      } finally {
        chatComposerInFlight = false;
        btn.disabled = !chatTextareaEl().value.trim();
        btn.classList.toggle('armed', !!chatTextareaEl().value.trim());
      }
    }

    // Composer auto-resize: grow up to max-height (CSS-capped at 168px ≈ 8
    // lines). Resets to one row's height when empty.
    function chatAutoResizeTextarea() {
      const ta = chatTextareaEl();
      if (!ta) return;
      ta.style.height = 'auto';
      ta.style.height = Math.min(168, ta.scrollHeight) + 'px';
    }

    // Pip DOM is built once per agent and cached. Subsequent calls only
    // toggle live/detached classes + update the tooltip — no SVG refetch,
    // no DOM thrash on every 3s pane-status tick.
    const chatPresencePips = new Map();   // agentId → pip element
    let chatPresenceMembersEl = null;
    function renderChatPresence() {
      const host = chatPresenceEl();
      if (!host) return;
      const known = (typeof agents !== 'undefined' && agents) ? Object.values(agents) : [];

      if (chatPresencePips.size === 0) {
        host.innerHTML = '';
        for (const a of known) {
          const pip = document.createElement('div');
          pip.className = 'pip';
          const inner = chatBuildAvatar(a.id, '');
          while (inner.firstChild) pip.appendChild(inner.firstChild);
          if (inner.style.background) pip.style.background = inner.style.background;
          host.appendChild(pip);
          chatPresencePips.set(a.id, pip);
        }
        chatPresenceMembersEl = document.createElement('div');
        chatPresenceMembersEl.className = 'members';
        host.appendChild(chatPresenceMembersEl);
        const conn = document.createElement('div');
        conn.className = 'conn-dot';
        conn.title = 'team channel — connected';
        host.appendChild(conn);
      }

      for (const a of known) {
        const pip = chatPresencePips.get(a.id);
        if (!pip) continue;
        pip.classList.toggle('live', !!a.running);
        pip.classList.toggle('detached', !!a.running && a.attached === false);
        const status = !a.running ? 'offline'
          : (a.attached === false ? 'running, no client attached' : 'live');
        pip.title = `${a.displayName || a.id} — ${status}`;
      }
      if (chatPresenceMembersEl) chatPresenceMembersEl.textContent = `${known.length + 1} members`;
    }

    // ── Open / close ──────────────────────────────────────────────────────
    function openChatOverlay() {
      const overlay = chatOverlayEl();
      if (overlay.classList.contains('shown')) return;
      if (typeof radialOpenForId !== 'undefined' && radialOpenForId) {
        try { closeRadialMenu(); } catch { /* no-op */ }
      }

      chatPreOpenSize = { w: window.innerWidth, h: window.innerHeight };
      if (window.innerWidth < CHAT_OVERLAY_MIN_W || window.innerHeight < CHAT_OVERLAY_MIN_H) {
        const targetW = Math.max(window.innerWidth, CHAT_OVERLAY_MIN_W);
        const targetH = Math.max(window.innerHeight, CHAT_OVERLAY_MIN_H);
        ipcRenderer.send('resize-window', { width: targetW, height: targetH });
      }

      overlay.classList.add('shown');
      overlay.setAttribute('aria-hidden', 'false');
      requestAnimationFrame(() => requestAnimationFrame(() => {
        overlay.classList.add('visible');
      }));

      renderChatPresence();

      if (!chatHistoryLoaded) {
        chatLoadHistory();
      } else {
        chatTailRefresh();
      }
      // Heartbeat fallback: if fs.watch hasn't fired for 8s, do a manual
      // tail-read. Covers the edge case where macOS fs.watch goes silent
      // on certain filesystems (network mounts, SMB) without raising 'error'.
      if (!chatPollHandle) {
        chatPollHandle = setInterval(() => {
          if (Date.now() - chatLastTailAt > 8000) chatTailRefresh();
        }, 4000);
      }

      requestAnimationFrame(() => {
        const ta = chatTextareaEl();
        if (ta) ta.focus();
      });

      const onPointerDown = (ev) => {
        const ov = chatOverlayEl();
        if (!ov || !ov.contains(ev.target)) closeChatOverlay();
      };
      const onKey = (ev) => { if (ev.key === 'Escape') { ev.preventDefault(); closeChatOverlay(); } };
      document.addEventListener('mousedown', onPointerDown, true);
      document.addEventListener('keydown', onKey);
      chatDismissCleanup = () => {
        document.removeEventListener('mousedown', onPointerDown, true);
        document.removeEventListener('keydown', onKey);
      };
    }

    function closeChatOverlay() {
      const overlay = chatOverlayEl();
      if (!overlay.classList.contains('shown')) return;
      overlay.classList.remove('visible');
      overlay.setAttribute('aria-hidden', 'true');
      if (chatPollHandle) {
        clearInterval(chatPollHandle);
        chatPollHandle = null;
      }
      // Cancel any in-flight optimistic-send retry timers — otherwise they
      // fire after close and mutate detached / hidden bubble DOM.
      for (const pending of chatPendingSelf.values()) {
        if (pending && pending.timer) clearTimeout(pending.timer);
      }
      chatPendingSelf.clear();
      setTimeout(() => {
        if (!overlay.classList.contains('visible')) {
          overlay.classList.remove('shown');
          if (chatPreOpenSize) {
            ipcRenderer.send('resize-window', {
              width: chatPreOpenSize.w,
              height: chatPreOpenSize.h
            });
            chatPreOpenSize = null;
          }
        }
      }, 240);
      if (chatDismissCleanup) { chatDismissCleanup(); chatDismissCleanup = null; }
    }

    function toggleChatOverlay() {
      if (isChatOverlayOpen()) closeChatOverlay();
      else openChatOverlay();
    }

    (() => {
      const ta = chatTextareaEl();
      const btn = chatSendBtnEl();
      const composer = chatComposerEl();
      if (!ta || !btn) return;

      ta.addEventListener('input', () => {
        const armed = !!ta.value.trim();
        btn.disabled = !armed;
        btn.classList.toggle('armed', armed);
        chatAutoResizeTextarea();
      });
      ta.addEventListener('focus', () => { if (composer) composer.classList.add('focused'); });
      ta.addEventListener('blur', () => { if (composer) composer.classList.remove('focused'); });
      ta.addEventListener('keydown', (ev) => {
        if (ev.key !== 'Enter') return;
        if (ev.shiftKey || ev.metaKey || ev.ctrlKey || ev.altKey) return;
        ev.preventDefault();
        chatSendMessage();
      });
      btn.addEventListener('click', () => chatSendMessage());
    })();

    ipcRenderer.on('chat-tail-changed', () => {
      if (!isChatOverlayOpen()) return;
      chatTailRefresh();
    });

    window.addEventListener('keydown', (ev) => {
      if (!ev.metaKey || ev.shiftKey || ev.altKey || ev.ctrlKey) return;
      if (ev.key !== 't' && ev.key !== 'T') return;
      ev.preventDefault();
      toggleChatOverlay();
    });
  </script>
</body>
</html>
