<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AgentRemote</title>
<style>
  /* ============================================================
     AgentRemote — vanilla port of the Stitch design handoff
     (api.anthropic.com/v1/design/h/RBLAHn7a4TTO8b42kv0mWA).
     Wires the panel to existing main.js IPC: spawn-agents,
     broadcast-message, resize-window.

     Deferred from the design (flagged "SOON" in the bg grid):
       - fluid bg (WebGL canvas component)
       - holo bg (SVG/CSS pearlescent component)
       - audio reactivity driver (--audio-level)
       - custom media upload background
     The slots, presets, and persisted schema for these are kept
     intact so they can light up later without a settings reset.
     ============================================================ */
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; background: transparent; }
  body {
    font-family: 'Inter', -apple-system, 'SF Pro Text', system-ui, sans-serif;
    color: #e8eaf2;
    display: grid;
    place-items: center;
    -webkit-app-region: drag;
    -webkit-font-smoothing: antialiased;
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.12s !important;
    }
  }

  /* ============================================================
     Panel shell — the floating control surface
     ============================================================ */
  .panel-shell {
    position: relative;
    width: 780px;
    height: 246px;
    border-radius: 18px;
    overflow: visible;
    background: rgba(8, 8, 14, 0.95);
    box-shadow:
      0 40px 100px -30px rgba(0,0,0,0.85),
      0 0 0 1px rgba(255,255,255,0.05) inset,
      0 0 0 1px rgba(0,0,0,0.6);
    font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    color: #d8dae3;
    --bg-glass: rgba(20, 20, 30, 0.55);
    --bg-input: rgba(255, 255, 255, 0.04);
    --text-primary: #e8eaf2;
    --text-dim: #8a8d9e;
    --border-soft: rgba(255,255,255,0.07);
    --border-medium: rgba(255,255,255,0.14);
    --status-on: #34d058;
    --master-opacity: 1;
    --bg-opacity: 1;
    --glass-alpha: 0.42;
    --glass-blur: 28px;
    opacity: var(--master-opacity, 1);
  }

  .glass-fx {
    position: absolute; inset: 0; z-index: 1;
    pointer-events: none;
    border-radius: inherit;
    backdrop-filter: blur(var(--glass-blur, 28px)) saturate(160%);
    -webkit-backdrop-filter: blur(var(--glass-blur, 28px)) saturate(160%);
    background: rgba(10, 10, 16, var(--glass-alpha, 0.42));
  }
  .panel-shell.has-iri-rim .glass-fx { background: rgba(14, 14, 22, 0.96); }
  .panel-shell:has(.bg-iridescent) { --glass-alpha: 0.28; }

  .panel-content {
    position: absolute; inset: 0; z-index: 6;
    padding: 14px 16px 12px;
    display: flex; flex-direction: column; gap: 10px;
    opacity: var(--master-opacity, 1);
  }
  .bg-base {
    position: absolute; inset: 0; z-index: 0;
    overflow: hidden; border-radius: inherit;
    pointer-events: none;
    opacity: var(--bg-opacity, 1);
  }
  .texture-overlay {
    position: absolute; inset: 0; z-index: 3;
    pointer-events: none; overflow: hidden;
    border-radius: inherit;
  }

  .panel-shell::before {
    content: ''; position: absolute; inset: 0;
    border-radius: 18px;
    pointer-events: none; z-index: 5;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.10),
      inset 0 -1px 0 rgba(0,0,0,0.5),
      inset 1px 0 0 rgba(255,255,255,0.04),
      inset -1px 0 0 rgba(0,0,0,0.3);
    background:
      linear-gradient(180deg, rgba(255,255,255,0.06) 0%, transparent 8%, transparent 92%, rgba(0,0,0,0.25) 100%);
    mix-blend-mode: overlay;
    opacity: 0.9;
  }
  .panel-shell::after {
    content: ''; position: absolute; inset: -1px;
    border-radius: 19px;
    pointer-events: none; z-index: 4;
    border: 1px solid rgba(255,255,255,0.08);
  }

  /* ============================================================
     Dock — agent tiles + add tile
     ============================================================ */
  .dock { display: flex; align-items: flex-start; gap: 14px; padding: 4px 2px 0; -webkit-app-region: no-drag; }
  .agent-tile {
    position: relative; width: 64px;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    background: transparent; border: 0; padding: 0;
    cursor: pointer;
    font: inherit; color: inherit;
    -webkit-app-region: no-drag;
  }
  .agent-tile.selected .agent-avatar {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 0 14px var(--accent-glow);
  }
  .agent-tile.selected .agent-name { color: var(--accent); }
  .agent-tile.selected .agent-key { color: var(--accent); border-color: var(--accent); }
  .agent-key {
    position: absolute; top: -4px; left: 6px; z-index: 3;
    min-width: 16px; height: 14px; padding: 0 4px;
    border-radius: 4px;
    background: rgba(20, 22, 32, 0.92);
    border: 1px solid var(--border-medium);
    font: 600 9px/1 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    color: #a8acba;
    display: flex; align-items: center; justify-content: center;
    letter-spacing: 0.04em;
    pointer-events: none;
  }
  .agent-avatar {
    position: relative;
    width: 56px; height: 56px;
    border-radius: 12px;
    background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
    border: 1px solid var(--border-soft);
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    transition: transform 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
  }
  .agent-tile:hover .agent-avatar {
    transform: translateY(-2px);
    border-color: rgba(255,255,255,0.18);
  }
  .agent-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .status-dot {
    position: absolute; bottom: 4px; right: 4px;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--status-on);
    box-shadow: 0 0 8px rgba(52, 208, 88, 0.7);
    border: 1.5px solid rgba(8, 8, 14, 0.9);
  }
  .agent-name {
    font: 500 9px/1.15 'Inter', system-ui, sans-serif;
    letter-spacing: 0.06em;
    color: var(--text-dim); text-align: center;
    white-space: nowrap;
  }
  .add-tile {
    width: 56px; height: 56px; margin-top: 2px;
    border-radius: 12px;
    border: 1.5px dashed var(--accent);
    color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.15);
    cursor: pointer;
    transition: background 140ms ease;
    -webkit-app-region: no-drag;
    padding: 0;
  }
  .add-tile:hover { background: var(--accent-soft); }

  /* ============================================================
     Chat row
     ============================================================ */
  .chat-row { display: flex; gap: 10px; align-items: stretch; -webkit-app-region: no-drag; }
  .chat-wrap {
    flex: 1; height: 38px; border-radius: 10px;
    background: var(--bg-input);
    border: 1px solid var(--border-soft);
    display: flex; align-items: center; padding: 0 14px;
    transition: border-color 140ms ease, background 140ms ease;
  }
  .chat-wrap:focus-within {
    border-color: var(--accent);
    background: rgba(255,255,255,0.06);
  }
  .chat-input {
    flex: 1; min-width: 0;
    background: transparent; border: 0; outline: 0;
    color: var(--text-primary);
    font: 400 13px/1 'Inter', system-ui, sans-serif;
    padding: 0;
  }
  .chat-input::placeholder { color: var(--text-dim); }
  .send-btn {
    height: 38px; padding: 0 20px;
    border-radius: 10px;
    border: 1px solid var(--accent);
    background: var(--accent);
    color: #1a0608;
    font: 600 10px/1 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    letter-spacing: 0.14em;
    box-shadow: 0 0 14px var(--accent-glow);
    cursor: pointer;
    transition: filter 140ms ease, box-shadow 140ms ease, opacity 140ms ease;
  }
  .send-btn:hover:not(:disabled) {
    filter: brightness(1.08);
    box-shadow: 0 0 22px var(--accent-glow);
  }
  .send-btn:disabled {
    cursor: not-allowed;
    background: transparent;
    color: var(--accent);
    border-color: var(--accent);
    box-shadow: none;
    opacity: 0.85;
  }

  /* ============================================================
     Util row
     ============================================================ */
  .util-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; font-size: 10px;
    -webkit-app-region: no-drag;
  }
  .recipient-summary {
    color: var(--text-dim);
    font: 400 10px/1 'Inter', system-ui, sans-serif;
    letter-spacing: 0.04em;
  }
  .util-cluster { display: flex; align-items: center; gap: 6px; }
  .x-btn {
    width: 22px; height: 22px; border-radius: 6px;
    border: 1px solid var(--border-soft); background: transparent;
    color: var(--text-dim);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: color 140ms ease, border-color 140ms ease;
    padding: 0;
  }
  .x-btn:hover { color: var(--text-primary); border-color: var(--border-medium); }
  .layout-pills {
    display: flex;
    border: 1px solid var(--border-soft);
    border-radius: 6px;
    overflow: hidden;
    margin: 0 4px;
  }
  .layout-pill {
    padding: 5px 10px;
    background: transparent; border: 0;
    color: var(--text-dim);
    font: 600 9px/1 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    letter-spacing: 0.12em;
    cursor: pointer;
    border-right: 1px solid var(--border-soft);
    transition: color 140ms ease, background 140ms ease;
  }
  .layout-pill:last-child { border-right: 0; }
  .layout-pill:hover { color: var(--text-primary); }
  .layout-pill.active {
    color: var(--accent);
    background: var(--accent-soft);
  }
  .util-btn {
    height: 22px; padding: 0 9px; border-radius: 6px;
    border: 1px solid var(--border-soft); background: transparent;
    color: var(--text-dim);
    font: 600 9px/1 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: color 140ms ease, border-color 140ms ease, background 140ms ease;
  }
  .util-btn:hover { color: var(--text-primary); border-color: var(--border-medium); }
  .util-btn.active {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--accent-soft);
  }
  .util-btn.deploy { color: var(--accent); border-color: var(--accent); }
  .util-btn.deploy:hover { background: var(--accent-soft); }

  /* ============================================================
     Gear button
     ============================================================ */
  .gear-btn {
    position: absolute; top: 10px; right: 10px; z-index: 8;
    width: 24px; height: 24px; border-radius: 6px;
    border: 1px solid transparent;
    background: rgba(255,255,255,0.04);
    color: var(--text-dim);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: transform 220ms ease, color 140ms ease, background 140ms ease, border-color 140ms ease;
    -webkit-app-region: no-drag;
    padding: 0;
  }
  .gear-btn:hover {
    color: var(--accent);
    border-color: var(--border-soft);
    background: rgba(255,255,255,0.08);
  }
  .gear-btn.open {
    transform: rotate(60deg);
    color: var(--accent);
    border-color: var(--accent);
    background: var(--accent-soft);
  }

  /* ============================================================
     Deploy flash
     ============================================================ */
  .panel-shell.flash-deploy { animation: deployPulse 600ms ease; }
  @keyframes deployPulse {
    0%, 100% {
      box-shadow:
        0 40px 100px -30px rgba(0,0,0,0.85),
        0 0 0 1px rgba(255,255,255,0.05) inset,
        0 0 0 1px rgba(0,0,0,0.6);
    }
    40% {
      box-shadow:
        0 40px 100px -30px rgba(0,0,0,0.85),
        0 0 0 1px var(--accent) inset,
        0 0 0 2px var(--accent),
        0 0 32px var(--accent-glow);
    }
  }

  /* ============================================================
     Background treatments
     ============================================================ */
  .bg-flat { background: #08080e; }

  .bg-mesh { background: #08080e; }
  .bg-mesh::before, .bg-mesh::after, .bg-mesh > .blob {
    content: ''; position: absolute; border-radius: 50%;
  }
  .bg-mesh::before {
    width: 700px; height: 700px; left: -25%; top: -120%;
    background: radial-gradient(circle, var(--accent) 0%, var(--accent-soft) 35%, transparent 70%);
    animation: meshDriftA 14s ease-in-out infinite alternate;
  }
  .bg-mesh::after {
    width: 640px; height: 640px; right: -25%; top: -50%;
    background: radial-gradient(circle, #8a6cff 0%, rgba(108,76,242,0.4) 35%, transparent 70%);
    animation: meshDriftB 18s ease-in-out infinite alternate;
    opacity: 0.85;
  }
  .bg-mesh .blob {
    width: 600px; height: 600px; left: 20%; bottom: -200%;
    background: radial-gradient(circle, #4cd6e0 0%, rgba(44,198,214,0.4) 35%, transparent 70%);
    animation: meshDriftC 16s ease-in-out infinite alternate;
    opacity: 0.7;
  }
  @keyframes meshDriftA { 0%{transform:translate(0,0) scale(1);} 100%{transform:translate(120px,90px) scale(1.15);} }
  @keyframes meshDriftB { 0%{transform:translate(0,0) scale(1);} 100%{transform:translate(-100px,60px) scale(1.1);} }
  @keyframes meshDriftC { 0%{transform:translate(-60px,0) scale(0.95);} 100%{transform:translate(80px,-40px) scale(1.15);} }

  .bg-aurora { background: #07070d; }
  .bg-aurora::before, .bg-aurora::after {
    content: ''; position: absolute; inset: -50%;
    animation: auroraSway 12s ease-in-out infinite alternate;
  }
  .bg-aurora::before {
    background:
      radial-gradient(50% 60% at 25% 35%, var(--accent) 0%, var(--accent-soft) 35%, transparent 65%),
      radial-gradient(40% 50% at 80% 75%, var(--accent) 0%, transparent 60%),
      radial-gradient(55% 45% at 60% 110%, var(--accent-glow) 0%, transparent 60%);
    opacity: 0.95;
  }
  .bg-aurora::after {
    background:
      radial-gradient(35% 55% at 70% 20%, #ff9a6a 0%, transparent 60%),
      radial-gradient(50% 40% at 10% 80%, #b85a30 0%, transparent 60%);
    animation-duration: 16s; animation-direction: alternate-reverse;
    mix-blend-mode: screen; opacity: 0.75;
  }
  @keyframes auroraSway { 0%{transform:translate(0,0) scale(1);} 100%{transform:translate(-60px,30px) scale(1.12);} }

  .bg-particles { background: radial-gradient(circle at 50% 50%, #0e0e18, #06060c 80%); }
  .tex-particles { width: 100%; height: 100%; position: relative; }
  .tex-particles .dot {
    position: absolute; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px 2px var(--accent-glow);
    opacity: 0.85;
  }
  @keyframes dotFloat {
    0%   { transform: translate(0,0); opacity: 0.5; }
    50%  { opacity: 0.85; }
    100% { transform: translate(var(--dx,30px), var(--dy,-20px)); opacity: 0.4; }
  }

  .bg-bands { background: #08080e; }
  .bg-bands::before {
    content: ''; position: absolute; inset: -50% -50%;
    background: linear-gradient(100deg,
      transparent 20%, var(--accent-glow) 42%, var(--accent) 50%,
      var(--accent-glow) 58%, transparent 80%);
    animation: bandsSweep 14s ease-in-out infinite;
    opacity: 0.85;
  }
  .bg-bands::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(8,8,14,0) 0%, rgba(8,8,14,0.55) 100%);
  }
  @keyframes bandsSweep {
    0% { transform: translateX(-15%); }
    50% { transform: translateX(15%); }
    100% { transform: translateX(-15%); }
  }

  .bg-noir { background: linear-gradient(180deg, #0a0a12 0%, #050509 100%); }
  .bg-noir::after {
    content: ''; position: absolute;
    width: 110%; height: 160%; left: -25%; top: 0;
    background: radial-gradient(circle, var(--accent) 0%, var(--accent-soft) 35%, transparent 65%);
    animation: emberPulse 9s ease-in-out infinite alternate;
    opacity: 0.85;
  }
  .tex-noir {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.10) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.10) 1px, transparent 1px);
    background-size: 32px 32px;
    mask-image: radial-gradient(ellipse 90% 80% at 50% 50%, black 30%, transparent 95%);
    -webkit-mask-image: radial-gradient(ellipse 90% 80% at 50% 50%, black 30%, transparent 95%);
  }
  @keyframes emberPulse {
    0%   { opacity: 0.55; transform: translate(0,0); }
    100% { opacity: 0.85; transform: translate(20px,-10px); }
  }

  .bg-topo { background: #07070d; }
  .bg-topo .topo-glow {
    position: absolute; inset: -30%;
    background: radial-gradient(50% 60% at 30% 60%, var(--accent) 0%, var(--accent-soft) 40%, transparent 70%);
    animation: emberPulse 12s ease-in-out infinite alternate;
    opacity: 0.85;
  }
  .tex-topo { position: absolute; inset: 0; }
  .tex-topo svg { width: 100%; height: 100%; display: block; }

  /* IRIDESCENT — full conic gradient + dark veil OR border-only mask */
  @property --iri-angle { syntax: '<angle>'; inherits: false; initial-value: 0deg; }
  .bg-iridescent { background: #07070d; }
  .bg-iridescent::before {
    content: ''; position: absolute; inset: 0;
    background: conic-gradient(from var(--iri-angle, 0deg),
      #4a8fff 0%, #b96cff 14%, #ff5cd6 28%, #ff8b5c 42%,
      #ffd86c 56%, #6cffae 70%, #5ce0ff 84%, #4a8fff 100%);
    filter: saturate(var(--iri-sat, 1.3)) blur(2px);
    animation: iridAngle var(--iri-speed, 12s) linear infinite;
    opacity: var(--iri-opacity, 0.95);
  }
  .bg-iridescent::after {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 80% at 50% 50%, rgba(8,8,14,0.85) 0%, rgba(8,8,14,0.45) 55%, transparent 80%);
    pointer-events: none;
  }
  @keyframes iridAngle { 0%{--iri-angle:0deg;} 100%{--iri-angle:360deg;} }
  @supports not (background: paint(_)) {
    .bg-iridescent::before { animation: iridSpin var(--iri-speed, 12s) linear infinite; }
  }
  @keyframes iridSpin { 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }

  /* Iridescent rim — outset conic blurred behind the dark glass veil so
     only the perimeter glow peeks out. Two stacked layers: static halo
     + traveling highlight. */
  .rim-layer {
    position: absolute; inset: -2px; z-index: 0;
    pointer-events: none;
    border-radius: 20px;
  }
  .tex-iri-rim {
    position: absolute; inset: 0;
    border-radius: inherit;
    background: conic-gradient(from 0deg,
      #4a8fff, #b96cff, #ff5cd6, #ff8b5c,
      #ffd86c, #6cffae, #5ce0ff, #4a8fff);
    filter: saturate(var(--iri-sat, 1.4)) blur(2.5px);
    opacity: var(--iri-opacity, 1);
    pointer-events: none;
  }
  .tex-iri-light {
    position: absolute; inset: 0;
    border-radius: inherit;
    --iri-angle: 0deg;
    background: conic-gradient(from var(--iri-angle),
      transparent 0%,
      transparent 55%,
      rgba(255,240,220,0.7) 78%,
      #ffffff 88%,
      rgba(255,240,220,0.7) 98%,
      transparent 100%);
    filter: blur(3px) brightness(calc(1 + var(--iri-peak, 0.8) * 0.4));
    opacity: var(--iri-opacity, 1);
    animation: iriLightSpin var(--iri-speed, 12s) linear infinite;
    pointer-events: none;
    mix-blend-mode: screen;
  }
  @keyframes iriLightSpin { 0%{--iri-angle:0deg;} 100%{--iri-angle:360deg;} }

  /* PLASMA */
  .bg-plasma { background: #06060c; }
  .bg-plasma::before {
    content: ''; position: absolute; inset: -80%;
    background:
      radial-gradient(closest-side at 25% 35%, var(--c1, var(--accent)) 0%, transparent 55%),
      radial-gradient(closest-side at 75% 65%, var(--c2, #6c4cf2) 0%, transparent 55%),
      radial-gradient(closest-side at 50% 100%, var(--c3, #2cc6d6) 0%, transparent 55%);
    animation: plasmaDrift var(--plasma-speed, 14s) ease-in-out infinite alternate;
    filter: saturate(1.2);
    opacity: var(--plasma-opacity, 1);
  }
  .bg-plasma::after {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(circle at 30% 30%, rgba(255,255,255,0.06), transparent 50%),
      linear-gradient(180deg, rgba(6,6,12,0) 0%, rgba(6,6,12,0.5) 100%);
  }
  @keyframes plasmaDrift {
    0%   { transform: translate(0,0) scale(1) rotate(0deg); }
    50%  { transform: translate(40px,-20px) scale(1.1) rotate(15deg); }
    100% { transform: translate(-30px,30px) scale(1.05) rotate(-10deg); }
  }

  /* CHROME */
  .bg-chrome { background: #08080e; }
  .bg-chrome::before {
    content: ''; position: absolute; inset: -30%;
    background: linear-gradient(var(--chrome-angle, 110deg),
      #2a2a32 0%,
      var(--cm1, #a8a8b8) 18%, var(--cm2, #f0f0f6) 28%,
      var(--cm3, #d8c47a) 40%, var(--cm4, #e8a85c) 50%,
      var(--cm3, #d8c47a) 60%, var(--cm2, #f0f0f6) 72%,
      var(--cm1, #a8a8b8) 82%, #2a2a32 100%);
    background-size: 300% 100%;
    animation: chromeShine var(--chrome-speed, 10s) linear infinite;
    opacity: var(--chrome-opacity, 0.85);
  }
  .bg-chrome::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(8,8,14,0.45) 0%, rgba(8,8,14,0.65) 100%);
  }
  @keyframes chromeShine { 0%{background-position:0% 50%;} 100%{background-position:300% 50%;} }

  @media (prefers-reduced-motion: reduce) {
    .bg-mesh::before, .bg-mesh::after, .bg-mesh .blob,
    .bg-aurora::before, .bg-aurora::after,
    .bg-bands::before, .bg-noir::after,
    .bg-particles .dot, .bg-topo .topo-glow,
    .bg-iridescent::before, .bg-plasma::before, .bg-chrome::before,
    .tex-iri-light {
      animation: none !important;
    }
  }
  .panel-shell.motion-off .bg-base *,
  .panel-shell.motion-off .bg-base::before,
  .panel-shell.motion-off .bg-base::after,
  .panel-shell.motion-off .rim-layer * {
    animation-play-state: paused !important;
  }

  /* ============================================================
     Action toast
     ============================================================ */
  .action-toast {
    position: fixed; top: 28px; left: 50%;
    transform: translateX(-50%) translateY(-6px);
    z-index: 100;
    padding: 8px 16px; border-radius: 100px;
    background: rgba(20,20,28,0.92);
    border: 1px solid var(--accent);
    color: var(--accent);
    font: 600 10px/1 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    letter-spacing: 0.14em;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5), 0 0 14px var(--accent-glow);
    pointer-events: none; opacity: 0;
    transition: opacity 220ms ease, transform 220ms ease;
  }
  .action-toast.show {
    opacity: 1; transform: translateX(-50%) translateY(0);
  }

  /* ============================================================
     Settings drawer + backdrop
     ============================================================ */
  .settings-backdrop {
    position: fixed; inset: 0; z-index: 50;
    pointer-events: none;
  }
  .settings-backdrop.open { pointer-events: auto; }
  .settings-panel {
    position: fixed;
    top: 0; left: 0;
    width: 360px;
    max-height: 70vh;
    z-index: 51;
    background: rgba(10, 10, 16, 0.94);
    backdrop-filter: blur(40px) saturate(150%);
    -webkit-backdrop-filter: blur(40px) saturate(150%);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    box-shadow: 0 30px 80px -20px rgba(0,0,0,0.7), 0 0 0 1px rgba(0,0,0,0.4);
    display: flex; flex-direction: column;
    font-family: 'Inter', system-ui, sans-serif;
    opacity: 0; pointer-events: none;
    transform: scale(0.96) translateY(-4px);
    transform-origin: var(--anchor-x, 100%) var(--anchor-y, 0%);
    transition: opacity 160ms ease, transform 180ms cubic-bezier(0.2, 0.8, 0.2, 1);
    -webkit-app-region: no-drag;
  }
  .settings-panel.open {
    opacity: 1; pointer-events: auto;
    transform: scale(1) translateY(0);
  }
  .settings-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 18px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .settings-head h2 {
    margin: 0;
    font: 600 12px/1 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #fff;
  }
  .settings-head-actions { display: flex; align-items: center; gap: 8px; }
  .settings-reset, .settings-close {
    height: 24px; border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.08);
    background: transparent;
    color: #a8acba;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: color 140ms ease, border-color 140ms ease;
  }
  .settings-reset {
    padding: 0 10px;
    font: 600 9px/1 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    letter-spacing: 0.14em;
  }
  .settings-close { width: 24px; padding: 0; }
  .settings-reset:hover, .settings-close:hover {
    color: #fff; border-color: rgba(255,255,255,0.2);
  }
  .settings-body { overflow-y: auto; padding: 4px 0 8px; }
  .settings-body::-webkit-scrollbar { width: 8px; }
  .settings-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
  .settings-body::-webkit-scrollbar-track { background: transparent; }
  .settings-section { padding: 14px 18px 4px; }
  .settings-section + .settings-section { border-top: 1px solid rgba(255,255,255,0.05); }
  .settings-section h3 {
    margin: 0 0 10px;
    font: 600 10px/1 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #8a8d9e;
  }

  .theme-rail { display: flex; gap: 8px; flex-wrap: wrap; }
  .theme-chip-wrap { position: relative; margin-bottom: 22px; }
  .theme-chip {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.08);
    background: var(--chip-color);
    cursor: pointer;
    transition: transform 140ms ease, border-color 140ms ease;
    padding: 0;
  }
  .theme-chip:hover { transform: scale(1.06); }
  .theme-chip.selected {
    border-color: #fff;
    box-shadow: 0 0 0 2px rgba(0,0,0,0.6), 0 0 16px var(--chip-color);
  }
  .theme-chip-label {
    position: absolute;
    top: calc(100% + 4px); left: 50%;
    transform: translateX(-50%);
    font: 500 9px/1 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    letter-spacing: 0.06em;
    color: #8a8d9e;
    white-space: nowrap;
    pointer-events: none;
  }

  .bg-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .bg-swatch {
    position: relative;
    aspect-ratio: 16/9;
    border-radius: 8px;
    border: 1.5px solid rgba(255,255,255,0.06);
    overflow: hidden;
    cursor: pointer;
    background: #08080e;
    transition: border-color 140ms ease, transform 140ms ease;
    padding: 0;
  }
  .bg-swatch:hover { transform: translateY(-1px); border-color: rgba(255,255,255,0.16); }
  .bg-swatch.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 0 14px var(--accent-glow);
  }
  .bg-swatch.disabled {
    opacity: 0.45; cursor: not-allowed;
  }
  .bg-swatch.disabled:hover { transform: none; border-color: rgba(255,255,255,0.06); }
  .bg-swatch .swatch-fill { position: absolute; inset: 0; pointer-events: none; }
  .bg-swatch .swatch-label {
    position: absolute; bottom: 4px; left: 6px; right: 6px;
    font: 500 9px/1 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    letter-spacing: 0.08em;
    color: #d8dae3;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    pointer-events: none;
  }
  .bg-swatch.selected .swatch-label { color: var(--accent); }
  .bg-swatch .swatch-soon {
    position: absolute; top: 4px; right: 4px;
    background: rgba(0,0,0,0.6);
    color: #d8dae3;
    font: 600 7px/1 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    letter-spacing: 0.1em;
    padding: 3px 5px; border-radius: 3px;
    pointer-events: none;
  }

  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0; font-size: 12px; color: #d8dae3;
    gap: 12px;
  }
  .toggle-row .label-sub {
    display: block; font-size: 10px; color: #8a8d9e;
    margin-top: 2px;
    font-family: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
  }
  .toggle {
    flex: none; width: 36px; height: 20px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.05);
    position: relative; cursor: pointer;
    transition: background 140ms ease, border-color 140ms ease;
  }
  .toggle::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 14px; height: 14px; border-radius: 50%;
    background: #d8dae3;
    transition: left 180ms cubic-bezier(0.2,0.8,0.2,1), background 140ms ease;
  }
  .toggle.on { background: var(--accent-soft); border-color: var(--accent); }
  .toggle.on::after { left: 18px; background: var(--accent); }

  .slider-row { padding: 6px 0; }
  .slider-row .slider-head {
    display: flex; justify-content: space-between;
    font-size: 11px; color: #d8dae3; margin-bottom: 6px;
  }
  .slider-row .slider-head .num {
    font: 500 11px/1 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    color: var(--accent);
  }
  .slider-row input[type=range] {
    -webkit-appearance: none;
    width: 100%; height: 4px; border-radius: 2px;
    background: rgba(255,255,255,0.08);
    outline: none;

  .slider-row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent);
    border: 2px solid #08080e;
    cursor: pointer;
    box-shadow: 0 0 8px var(--accent-glow);
  }

  .color-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 0;
    font-size: 11px; color: #a8acbb;
  }
  .color-row-controls { display: flex; align-items: center; gap: 8px; }
  .color-row input[type=color] {
    width: 28px; height: 22px; padding: 0;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 5px;
    background: transparent; cursor: pointer;
  }
  .color-row input[type=color]::-webkit-color-swatch-wrapper { padding: 1px; }
  .color-row input[type=color]::-webkit-color-swatch { border: none; border-radius: 3px; }
  .color-hex {
    font: 500 10px/1 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    color: #d8dae4;
    letter-spacing: 0.05em;
    min-width: 62px; text-align: right;
  }

  .saved-flash {
    position: absolute; top: 10px; left: 50%;
    transform: translateX(-50%);
    font: 600 9px/1 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    letter-spacing: 0.14em;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 4px 10px; border-radius: 6px;
    border: 1px solid var(--accent);
    opacity: 0;
    transition: opacity 220ms ease, transform 220ms ease;
    pointer-events: none;
  }
  .saved-flash.show {
    opacity: 1;
    transform: translateX(-50%) translateY(2px);
  }

  /* ============================================================
     Per-tile radial popover — right-click on an agent tile to
     surface CWD / KILL / RESTART / ATTACH actions. Same accent
     vars as the main panel so theme switching applies for free.
     ============================================================ */
  .tile-popover {
    position: fixed;
    z-index: 60;
    min-width: 168px;
    background: rgba(10, 10, 16, 0.96);
    backdrop-filter: blur(40px) saturate(150%);
    -webkit-backdrop-filter: blur(40px) saturate(150%);
    border: 1px solid var(--border-medium, rgba(255,255,255,0.14));
    border-radius: 12px;
    box-shadow: 0 24px 60px -16px rgba(0,0,0,0.7), 0 0 0 1px rgba(0,0,0,0.4);
    padding: 6px;
    display: flex; flex-direction: column; gap: 2px;
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-app-region: no-drag;
    opacity: 0; pointer-events: none;
    transform: scale(0.94) translateY(-4px);
    transform-origin: var(--tp-anchor-x, 50%) var(--tp-anchor-y, 0%);
    transition: opacity 140ms ease, transform 160ms cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .tile-popover.open {
    opacity: 1; pointer-events: auto;
    transform: scale(1) translateY(0);
  }
  .tile-popover-head {
    padding: 4px 10px 2px;
    font: 600 9px/1 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    letter-spacing: 0.14em;
    color: var(--accent, #e07c4c);
    text-transform: uppercase;
  }
  .tile-popover-action {
    display: flex; align-items: center; gap: 8px;
    height: 26px;
    padding: 0 10px;
    border: 1px solid transparent;
    border-radius: 8px;
    background: transparent;
    color: #d8dae4;
    font: 500 11px/1 'Inter', system-ui, sans-serif;
    letter-spacing: 0.04em;
    cursor: pointer;
    text-align: left;
    transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
  }
  .tile-popover-action:hover {
    background: var(--accent-soft, rgba(224,124,76,0.18));
    border-color: var(--accent, #e07c4c);
    color: #fff;
  }
  .tile-popover-action.danger:hover {
    background: rgba(227, 93, 106, 0.22);
    border-color: #e35d6a;
    color: #fff;
  }
  .tile-popover-action svg {
    width: 12px; height: 12px;
    stroke: currentColor; fill: none;
    stroke-width: 1.6;
    flex: 0 0 12px;
  }
  .tile-popover-divider {
    height: 1px; margin: 3px 6px;
    background: rgba(255,255,255,0.06);
  }
</style>

<body>
  <div id="root"></div>
  <div class="action-toast" id="action-toast" aria-live="polite" aria-atomic="true"></div>
  <div class="settings-backdrop" id="settings-backdrop" aria-hidden="true"></div>

  <script>
    const { ipcRenderer } = require('electron');

    const AGENTS = [
      { key: '1', id: 'xavier',  name: 'XAVIER',         label: 'XAVIER',          src: 'assets/xavier.svg' },
      { key: '2', id: 'lucius',  name: 'LUCIUS',         label: 'LUCIUS',          src: 'assets/lucius.svg' },
      { key: '3', id: 'gekko',   name: 'GEKKO',          label: 'GEKKO',           src: 'assets/gekko.svg' },
      { key: '4', id: 'swarmy',  name: 'OVERLORDSWARMY', label: 'OVERLORD SWARMY', src: 'assets/swarmy.svg' },
      { key: '5', id: 'claude',  name: 'TMUX-MASTA',     label: 'TMUX-MASTA',      src: 'assets/claude.svg' },
    ];
    const THEMES = {
      orange: { hex: '#e07c4c', name: 'Orange' },
      amber:  { hex: '#f0a14a', name: 'Amber' },
      rose:   { hex: '#e35d6a', name: 'Rose' },
      cyan:   { hex: '#5cc8d6', name: 'Cyan' },
      violet: { hex: '#9d7cf2', name: 'Violet' },
      lime:   { hex: '#bdd962', name: 'Lime' },
    };
    const BACKGROUNDS = [
      { id: 'aurora',     name: 'Aurora' },
      { id: 'mesh',       name: 'Mesh' },
      { id: 'iridescent', name: 'Iridescent' },
      { id: 'plasma',     name: 'Plasma' },
      { id: 'chrome',     name: 'Chrome' },
      { id: 'particles',  name: 'Particles' },
      { id: 'bands',      name: 'Bands' },
      { id: 'noir',       name: 'Noir' },
      { id: 'topo',       name: 'Topo' },
      { id: 'flat',       name: 'Flat' },
      { id: 'fluid',      name: 'Fluid',  disabled: true },
      { id: 'holo',       name: 'Holo',   disabled: true },
      { id: 'custom',     name: 'Custom', disabled: true },
    ];
    const STORAGE_KEY = 'agentremote.theme.v3';
    const DEFAULTS = {
      theme: 'orange',
      background: 'iridescent',
      motion: true,
      intensity: 0.6,
      speed: 1,
      blurAmount: 28,
      masterOpacity: 1,
      bgOpacity: 1,
      fluidResolution: 1,
      audioReactive: true,
      audioSens: 1.2,
      audioPulse: true,
      plasma: { c1: '#e07c4c', c2: '#7a4cff', c3: '#1ec4d6' },
      iridescent: { speed: 14, sat: 1.4, opacity: 0.95, edge: 14, bordered: true },
      chrome: { c1: '#9a9aab', c2: '#e8e8f0', c3: '#d4b86a', c4: '#d68a4a', speed: 14, opacity: 0.7, angle: 100 },
      fluid: { secondary: '#5b8cff', tertiary: '#2cc6d6' },
      custom: null,
      layout: 'panes',
      multiOn: false,
    };
    const BG_PRESETS = {
      iridescent: { intensity: 0.6, speed: 1.0, blurAmount: 28,
                    iridescent: { speed: 14, sat: 1.4, opacity: 0.95, edge: 14, bordered: true } },
      plasma:     { intensity: 0.7, speed: 0.7, blurAmount: 30 },
      chrome:     { intensity: 0.5, speed: 0.8, blurAmount: 22 },
      particles:  { intensity: 0.7, speed: 1.0, blurAmount: 26 },
      topo:       { intensity: 0.55, speed: 0.6, blurAmount: 24 },
      noir:       { intensity: 0.5, speed: 0.5, blurAmount: 22 },
      mesh:       { intensity: 0.5, speed: 0.7, blurAmount: 30 },
      aurora:     { intensity: 0.7, speed: 0.7, blurAmount: 30 },
      flat:       { intensity: 0.6, speed: 1.0, blurAmount: 28 },
    };

    function hexToRgba(hex, a) {
      const h = hex.replace('#', '');
      const r = parseInt(h.slice(0,2), 16);
      const g = parseInt(h.slice(2,4), 16);
      const b = parseInt(h.slice(4,6), 16);
      return `rgba(${r}, ${g}, ${b}, ${a})`;
    }
    function loadSettings() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return { ...DEFAULTS };
        const stored = JSON.parse(raw);
        const merged = { ...DEFAULTS, ...stored };
        for (const k of ['plasma', 'iridescent', 'chrome', 'fluid']) {
          merged[k] = { ...DEFAULTS[k], ...(stored[k] || {}) };
        }
        return merged;
      } catch (_) { return { ...DEFAULTS }; }
    }
    function saveSettings(s) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch (_) {}
    }

    const state = {
      settings: loadSettings(),
      selectedAgents: [],
      draft: '',
      editOn: false,
      gearOpen: false,
    };

    const root = document.getElementById('root');
    const toastEl = document.getElementById('action-toast');
    const backdropEl = document.getElementById('settings-backdrop');

    function el(tag, props, ...children) {
      const e = document.createElement(tag);
      if (props) {
        for (const [k, v] of Object.entries(props)) {
          if (v == null || v === false) continue;
          if (k === 'class') e.className = v;
          else if (k === 'html') e.innerHTML = v;
          else if (k === 'style') Object.assign(e.style, v);
          else if (k === 'dataset') Object.assign(e.dataset, v);
          else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2).toLowerCase(), v);
          else e.setAttribute(k, v);
        }
      }
      for (const c of children) {
        if (c == null || c === false) continue;
        e.appendChild(typeof c === 'string' || typeof c === 'number' ? document.createTextNode(String(c)) : c);
      }
      return e;
    }
    function svgPath(d, opts = {}) {
      const ns = 'http://www.w3.org/2000/svg';
      const s = document.createElementNS(ns, 'svg');
      s.setAttribute('viewBox', opts.viewBox || '0 0 24 24');
      if (opts.width) s.setAttribute('width', opts.width);
      if (opts.height) s.setAttribute('height', opts.height);
      s.setAttribute('fill', 'none');
      const p = document.createElementNS(ns, 'path');
      p.setAttribute('d', d);
      p.setAttribute('stroke', 'currentColor');
      p.setAttribute('stroke-width', opts.strokeWidth || '1.5');
      p.setAttribute('stroke-linecap', 'round');
      if (opts.linejoin) p.setAttribute('stroke-linejoin', opts.linejoin);
      s.appendChild(p);
      return s;
    }
    function gearSvg() {
      const ns = 'http://www.w3.org/2000/svg';
      const s = document.createElementNS(ns, 'svg');
      s.setAttribute('viewBox', '0 0 24 24'); s.setAttribute('width', '14'); s.setAttribute('height', '14');
      s.setAttribute('fill', 'none');
      const p = document.createElementNS(ns, 'path');
      p.setAttribute('d', 'M19.4 13a1.7 1.7 0 0 1 0-2L21 9.3l-2-3.5-2.2.7a1.7 1.7 0 0 1-1.7-1L14.4 3h-4l-.7 2.5a1.7 1.7 0 0 1-1.7 1l-2.2-.7-2 3.5L4.6 11a1.7 1.7 0 0 1 0 2L3 14.7l2 3.5 2.2-.7a1.7 1.7 0 0 1 1.7 1l.7 2.5h4l.7-2.5a1.7 1.7 0 0 1 1.7-1l2.2.7 2-3.5L19.4 13Z');
      p.setAttribute('stroke', 'currentColor'); p.setAttribute('stroke-width', '1.6'); p.setAttribute('stroke-linejoin', 'round');
      const c = document.createElementNS(ns, 'circle');
      c.setAttribute('cx','12'); c.setAttribute('cy','12'); c.setAttribute('r','2.6');
      c.setAttribute('stroke','currentColor'); c.setAttribute('stroke-width','1.6');
      s.appendChild(p); s.appendChild(c);
      return s;
    }

    let toastTimer = null;
    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1600);
    }

    function applyToPanel(panel) {
      const s = state.settings;
      const hex = THEMES[s.theme]?.hex || THEMES.orange.hex;
      panel.style.setProperty('--accent', hex);
      panel.style.setProperty('--accent-glow', hexToRgba(hex, 0.55));
      panel.style.setProperty('--accent-soft', hexToRgba(hex, 0.18));
      panel.style.setProperty('--master-opacity', s.masterOpacity);
      panel.style.setProperty('--bg-opacity', s.bgOpacity);
      panel.style.setProperty('--glass-blur', s.blurAmount + 'px');
      panel.classList.toggle('motion-off', !s.motion);
      panel.classList.toggle('has-iri-rim', s.background === 'iridescent' && s.iridescent.bordered);
    }

    function paintBackground(bgBase, texOverlay) {
      const s = state.settings;
      const id = s.background;
      bgBase.className = 'bg-base';
      bgBase.innerHTML = '';
      bgBase.style.cssText = '';
      texOverlay.innerHTML = '';
      // Rim layer is the iridescent bordered case — it's a sibling of bgBase
      // inside panel-shell at z:0 (below the glass veil at z:1). Clean up any
      // prior rim before repainting.
      if (panelEl) {
        Array.from(panelEl.querySelectorAll(':scope > .rim-layer')).forEach(n => n.remove());
      }
      const speedMul = s.motion ? (1 / Math.max(0.1, s.speed)) : 0;

      if (id === 'flat')   { bgBase.classList.add('bg-flat'); return; }
      if (id === 'mesh')   { bgBase.classList.add('bg-mesh'); bgBase.appendChild(el('span', { class: 'blob' })); return; }
      if (id === 'aurora') { bgBase.classList.add('bg-aurora'); return; }
      if (id === 'particles') {
        bgBase.classList.add('bg-particles');
        const tex = el('div', { class: 'tex-particles' });
        const seeds = Array.from({ length: 14 }, (_, i) => {
          const r1 = ((i * 9301 + 49297) % 233280) / 233280;
          const r2 = ((i * 7919 + 12345) % 233280) / 233280;
          const r3 = ((i * 31337 + 17) % 233280) / 233280;
          return {
            left: 5 + r1 * 90, top: 5 + r2 * 85,
            size: 6 + r3 * 10, delay: -r1 * 8, dur: 6 + r2 * 6,
            dx: (r3 - 0.5) * 80, dy: (r1 - 0.5) * 60,
            opacity: 0.55 + r2 * 0.4,
          };
        });
        for (const p of seeds) {
          const dot = el('span', { class: 'dot' });
          dot.style.cssText = `left:${p.left}%; top:${p.top}%; width:${p.size}px; height:${p.size}px; opacity:${p.opacity}; --dx:${p.dx}px; --dy:${p.dy}px; animation: dotFloat ${p.dur}s ease-in-out ${p.delay}s infinite alternate;`;
          tex.appendChild(dot);
        }
        texOverlay.appendChild(tex);
        return;
      }
      if (id === 'bands')  { bgBase.classList.add('bg-bands'); return; }
      if (id === 'noir')   { bgBase.classList.add('bg-noir'); texOverlay.appendChild(el('div', { class: 'tex-noir' })); return; }
      if (id === 'topo') {
        bgBase.classList.add('bg-topo');
        bgBase.appendChild(el('div', { class: 'topo-glow' }));
        const ns = 'http://www.w3.org/2000/svg';
        const wrap = el('div', { class: 'tex-topo' });
        const s2 = document.createElementNS(ns, 'svg');
        s2.setAttribute('viewBox', '0 0 780 246'); s2.setAttribute('preserveAspectRatio','none');
        const g = document.createElementNS(ns, 'g');
        g.setAttribute('stroke','var(--accent)'); g.setAttribute('fill','none');
        g.setAttribute('stroke-width','1.4'); g.setAttribute('opacity','0.55');
        [40, 70, 100, 130, 160, 190, 220].forEach((r, i) => {
          const e = document.createElementNS(ns, 'ellipse');
          e.setAttribute('cx', String(250 + i * 5));
          e.setAttribute('cy', '140');
          e.setAttribute('rx', String(r * 1.55));
          e.setAttribute('ry', String(r * 0.82));
          e.style.animation = `emberPulse ${10 + i}s ease-in-out ${-i * 0.7}s infinite alternate`;
          g.appendChild(e);
        });
        s2.appendChild(g); wrap.appendChild(s2); texOverlay.appendChild(wrap);
        return;
      }
      if (id === 'iridescent') {
        // Bordered: rainbow rim painted at z:0 (sibling of bgBase, below the
        // glass veil at z:1). The dark glass covers the center so only the
        // perimeter glow peeks out. .has-iri-rim class on panel-shell pushes
        // glass-fx alpha to ~0.96 so the cover is near-opaque.
        // Non-bordered: bg-iridescent fills the panel with the conic + radial veil.
        if (s.iridescent.bordered) {
          bgBase.classList.add('bg-flat');
          bgBase.style.background = '#07070d';
          const peak = 0.4 + (s.iridescent.edge / 60) * 1.2;
          const rim = el('div', { class: 'rim-layer' });
          const r1 = el('div', { class: 'tex-iri-rim' });
          r1.style.setProperty('--iri-sat', s.iridescent.sat);
          r1.style.setProperty('--iri-opacity', s.iridescent.opacity);
          const r2 = el('div', { class: 'tex-iri-light' });
          r2.style.setProperty('--iri-speed', (s.iridescent.speed * speedMul) + 's');
          r2.style.setProperty('--iri-peak', peak);
          r2.style.setProperty('--iri-opacity', s.iridescent.opacity);
          rim.appendChild(r1); rim.appendChild(r2);
          // Insert rim as the FIRST child of panelEl so it sits at z:0 with
          // bgBase, below the glass veil at z:1. The has-iri-rim class on
          // panel-shell makes glass-fx near-opaque so the rainbow is hidden
          // in the center, leaving only the soft outset glow on the edges.
          if (panelEl) panelEl.insertBefore(rim, panelEl.firstChild);
        } else {
          bgBase.classList.add('bg-iridescent');
          bgBase.style.setProperty('--iri-speed', (s.iridescent.speed * speedMul) + 's');
          bgBase.style.setProperty('--iri-sat', s.iridescent.sat);
          bgBase.style.setProperty('--iri-opacity', s.iridescent.opacity);
        }
        return;
      }
      if (id === 'plasma') {
        bgBase.classList.add('bg-plasma');
        bgBase.style.setProperty('--c1', s.plasma.c1);
        bgBase.style.setProperty('--c2', s.plasma.c2);
        bgBase.style.setProperty('--c3', s.plasma.c3);
        bgBase.style.setProperty('--plasma-speed', (14 * speedMul) + 's');
        bgBase.style.setProperty('--plasma-opacity', s.intensity * 1.3);
        return;
      }
      if (id === 'chrome') {
        bgBase.classList.add('bg-chrome');
        bgBase.style.setProperty('--cm1', s.chrome.c1);
        bgBase.style.setProperty('--cm2', s.chrome.c2);
        bgBase.style.setProperty('--cm3', s.chrome.c3);
        bgBase.style.setProperty('--cm4', s.chrome.c4);
        bgBase.style.setProperty('--chrome-speed', (s.chrome.speed * speedMul) + 's');
        bgBase.style.setProperty('--chrome-opacity', s.chrome.opacity);
        bgBase.style.setProperty('--chrome-angle', s.chrome.angle + 'deg');
        return;
      }
      // fluid / holo / custom — deferred. Fall back to flat.
      bgBase.classList.add('bg-flat');
    }

    function recipientText() {
      if (state.selectedAgents.length === 0) return 'no recipients';
      if (state.selectedAgents.length === AGENTS.length) return `all ${AGENTS.length} agents`;
      return state.selectedAgents
        .map(k => AGENTS.find(a => a.key === k)?.name)
        .filter(Boolean).join(' · ');
    }

    let panelEl, dockEl, chatInputEl, sendBtnEl, recipientEl, gearBtnEl,
        bgBaseEl, texOverlayEl, layoutPillEls, multiBtnEl, editBtnEl,
        allBtnEl, deployBtnEl, xBtnEl;

    function buildPanel() {
      bgBaseEl = el('div', { class: 'bg-base', 'aria-hidden': 'true' });

      layoutPillEls = {};
      for (const id of ['panes', 'windows']) {

      }, 'MULTI');

      editBtnEl = el('button', {
        class: 'util-btn' + (state.editOn ? ' active' : ''), type: 'button',
        title: 'Edit mode (placeholder — registry editing not wired in this build)',
        onClick: () => { state.editOn = !state.editOn; editBtnEl.classList.toggle('active', state.editOn); },
      }, 'EDIT');
      allBtnEl = el('button', {

    function buildAgentTile(a) {
      const key = el('div', { class: 'agent-key' }, a.key);
      const img = el('img', { src: a.src, alt: a.name });
      img.onerror = () => { img.style.display = 'none'; };
      const dot = el('span', { class: 'status-dot' });
      const av = el('div', { class: 'agent-avatar' }, img, dot);
      const name = el('div', { class: 'agent-name' }, a.label);
      const tile = el('button', {
        class: 'agent-tile' + (state.selectedAgents.includes(a.key) ? ' selected' : ''),
        type: 'button',
        'aria-pressed': state.selectedAgents.includes(a.key) ? 'true' : 'false',
        dataset: { key: a.key },
        onClick: () => toggleAgent(a.key),
        onContextmenu: (e) => {
          e.preventDefault();
          // Tell main.js to suppress its native Reload/Quit context menu.
          // 250ms grace window matches main.js's lastTileRightClickAt check.
          ipcRenderer.send('tile-rightclick-suppress');
          openTilePopover(a, tile);
        },
      }, key, av, name);
      return tile;
    }
    function buildAddTile() {
      return el('button', {
        class: 'add-tile', type: 'button',
        'aria-label': 'Add agent (coming soon)',
        title: 'Add agent — registry editing deferred for this build',
        onClick: () => showToast('ADD AGENT — SOON'),
      }, svgPath('M7 1.5v11M1.5 7h11', { viewBox: '0 0 14 14', width: 14, height: 14 }));
    }

    function toggleAgent(key) {
      const idx = state.selectedAgents.indexOf(key);
      if (idx >= 0) state.selectedAgents.splice(idx, 1);
      else state.selectedAgents.push(key);
      refreshAgentTiles();
      refreshRecipientSummary();
      refreshAllSelected();
      updateSendDisabled();
    }
    function refreshAgentTiles() {
      Array.from(dockEl.children).forEach((tile) => {
        if (!tile.dataset || !tile.dataset.key) return;
        const sel = state.selectedAgents.includes(tile.dataset.key);
        tile.classList.toggle('selected', sel);
        tile.setAttribute('aria-pressed', sel ? 'true' : 'false');
      });
    }
    function refreshRecipientSummary() {
      recipientEl.textContent = recipientText();
      const n = state.selectedAgents.length;
      chatInputEl.placeholder = n === 0
        ? 'Pick agents above, then type a message…'
        : `Message ${n} ${n === 1 ? 'agent' : 'agents'}…`;
    }
    function refreshAllSelected() {
      const all = state.selectedAgents.length === AGENTS.length;
      allBtnEl.classList.toggle('active', all);
    }
    function refreshLayoutPills() {
      for (const [id, b] of Object.entries(layoutPillEls)) {
        b.classList.toggle('active', state.settings.layout === id);
      }
      multiBtnEl.classList.toggle('active', state.settings.multiOn);
    }
    function updateSendDisabled() {
      const ok = state.draft.trim().length > 0 && state.selectedAgents.length > 0;
      sendBtnEl.disabled = !ok;
    }
    function doToggleAll() {
      if (state.selectedAgents.length === AGENTS.length) state.selectedAgents = [];
      else state.selectedAgents = AGENTS.map(a => a.key);
      refreshAgentTiles();
      refreshRecipientSummary();
      refreshAllSelected();
      updateSendDisabled();
    }
    function doClear() {
      state.selectedAgents = [];
      state.draft = '';
      chatInputEl.value = '';
      refreshAgentTiles();
      refreshRecipientSummary();
      refreshAllSelected();
      updateSendDisabled();
    }

    /* IPC: layout map → main.js's layout names.
       PANES + multi=off → 'panes'    PANES + multi=on → 'tiled'
       WINDOWS + multi=off → 'windows' WINDOWS + multi=on → 'ittab' */
    function effectiveLayout() {
      const { layout, multiOn } = state.settings;
      if (layout === 'windows') return multiOn ? 'ittab' : 'windows';
      return multiOn ? 'tiled' : 'panes';
    }
    function doSend() {
      if (sendBtnEl.disabled) return;
      const msg = state.draft.trim();
      if (!msg) return;
      const ids = state.selectedAgents.map(k => AGENTS.find(a => a.key === k)?.id).filter(Boolean);
      if (!ids.length) return;
      const isAll = ids.length === AGENTS.length;
      // tmuxTarget mirrors the agent's lowercased pane title — same substring
      // rule main.js uses to resolve panes (`title.toLowerCase().includes(needle)`).
      // The id IS the lowercase target for every agent in the static list.
      const payload = ids.map(id => ({ id, tmuxTarget: id }));
      ipcRenderer.send('broadcast-message', { message: msg, selectedAgents: payload, isAll });
      showToast(`SENT → ${ids.length} ${ids.length === 1 ? 'AGENT' : 'AGENTS'}`);
      state.draft = '';
      chatInputEl.value = '';
      updateSendDisabled();
    }
    function doDeploy() {
      const ids = state.selectedAgents.length
        ? state.selectedAgents.map(k => AGENTS.find(a => a.key === k)?.id).filter(Boolean)
        : AGENTS.map(a => a.id);
      ipcRenderer.send('spawn-agents', { agents: ids, layout: effectiveLayout() });
      panelEl.classList.remove('flash-deploy');
      void panelEl.offsetWidth;
      panelEl.classList.add('flash-deploy');
      setTimeout(() => panelEl.classList.remove('flash-deploy'), 700);
      showToast('DEPLOYED');
    }

    /* ============================================================
       Per-tile right-click popover. CWD / KILL / RESTART / ATTACH —
       four IPC handlers that already exist in main.js. Single shared
       popover element, lazy-built on first open, repositioned each
       time. Closes on outside click, Escape, or scroll.
       ============================================================ */
    let tilePopoverEl = null;
    let tilePopoverAgent = null;
    let tilePopoverTile = null;

    function ensureTilePopover() {
      if (tilePopoverEl) return tilePopoverEl;
      tilePopoverEl = el('div', {
        class: 'tile-popover',
        role: 'menu',
        'aria-hidden': 'true',
        // Stop the document mousedown handler from immediately closing it.
        onMousedown: (e) => e.stopPropagation(),
      });
      document.body.appendChild(tilePopoverEl);
      return tilePopoverEl;
    }

    function openTilePopover(agent, tileEl) {
      const pop = ensureTilePopover();
      tilePopoverAgent = agent;
      tilePopoverTile = tileEl;
      pop.innerHTML = '';

      const head = el('div', { class: 'tile-popover-head' }, agent.label);
      pop.appendChild(head);
      pop.appendChild(buildPopAction({
        label: 'CWD',
        icon: 'M1 4l3-3h6l3 3v8a1 1 0 01-1 1H2a1 1 0 01-1-1V4z',
        onClick: () => tileActionCwd(agent),
      }));
      pop.appendChild(buildPopAction({
        label: 'ATTACH',
        icon: 'M3 11l4-4 4 4M7 7v6M2 2h10',
        onClick: () => tileActionAttach(agent),
      }));
      pop.appendChild(buildPopAction({
        label: 'RESTART',
        icon: 'M3 7a4 4 0 117 2.5M11 4v3h-3',
        onClick: () => tileActionRestart(agent),
      }));
      pop.appendChild(el('div', { class: 'tile-popover-divider' }));
      pop.appendChild(buildPopAction({
        label: 'KILL PANE',
        icon: 'M3 3l8 8M11 3l-8 8',
        danger: true,
        onClick: () => tileActionKill(agent),
      }));

      // Position relative to the tile. Anchor below by default; flip
      // above if there's not enough room. Keep within viewport horizontally.
      pop.classList.remove('open');
      pop.style.left = '0px';
      pop.style.top  = '0px';
      pop.style.setProperty('--tp-anchor-x', '50%');
      pop.style.setProperty('--tp-anchor-y', '0%');
      // Force a layout so the next frame's transition kicks in.
      void pop.offsetWidth;

      const tr = tileEl.getBoundingClientRect();
      const popW = pop.offsetWidth || 180;
      const popH = pop.offsetHeight || 160;
      const margin = 6;
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      let left = Math.round(tr.left + (tr.width - popW) / 2);
      left = Math.max(8, Math.min(vw - popW - 8, left));
      // Prefer below the tile. Flip above if no room. If neither side fits
      // (small window), fall back to below + clip to the viewport bottom so
      // the popover never lands off-screen.
      let top = Math.round(tr.bottom + margin);
      let anchorY = '0%';
      if (top + popH > vh - 8) {
        const flipped = Math.round(tr.top - popH - margin);
        if (flipped >= 8) {
          top = flipped;
          anchorY = '100%';
        } else {
          top = Math.max(8, vh - popH - 8);
        }
      }
      pop.style.left = left + 'px';
      pop.style.top  = top  + 'px';
      pop.style.setProperty('--tp-anchor-y', anchorY);
      pop.setAttribute('aria-hidden', 'false');
      requestAnimationFrame(() => pop.classList.add('open'));
    }

    function closeTilePopover() {
      if (!tilePopoverEl) return;
      tilePopoverEl.classList.remove('open');
      tilePopoverEl.setAttribute('aria-hidden', 'true');
      tilePopoverAgent = null;
      tilePopoverTile = null;
    }

    function buildPopAction({ label, icon, onClick, danger }) {
      const svg = svgPath(icon, { viewBox: '0 0 14 14', width: 12, height: 12, strokeWidth: 1.6 });
      const btn = el('button', {
        class: 'tile-popover-action' + (danger ? ' danger' : ''),
        type: 'button',
        role: 'menuitem',
        onClick: () => { closeTilePopover(); onClick(); },
      }, svg, el('span', null, label));
      return btn;
    }

    async function tileActionCwd(agent) {
      const picked = await ipcRenderer.invoke('pick-cwd');
      if (!picked) return;
      const res = await ipcRenderer.invoke('update-agent-cwd', { id: agent.id, cwd: picked });
      if (res && res.ok) showToast(`${agent.label} CWD → ${res.cwd}`);
      else showToast(`CWD UPDATE FAILED${res?.error ? ' — ' + res.error : ''}`);
    }
    async function tileActionAttach(agent) {
      const res = await ipcRenderer.invoke('attach-pane', agent.id);
      if (res && res.ok) showToast(`ATTACHED → ${agent.label}`);
      else showToast(res?.error ? `ATTACH: ${res.error.toUpperCase()}` : 'ATTACH FAILED');
    }
    async function tileActionRestart(agent) {
      const res = await ipcRenderer.invoke('restart-agent', agent.id);
      if (res && res.ok) showToast(`RESTARTING → ${agent.label}`);
      else showToast(res?.error ? `RESTART: ${res.error.toUpperCase()}` : 'RESTART FAILED');
    }
    async function tileActionKill(agent) {
      const res = await ipcRenderer.invoke('kill-pane', agent.id);
      if (res && res.ok) showToast(`KILLED → ${agent.label}`);
      else showToast(res?.error ? `KILL: ${res.error.toUpperCase()}` : 'KILL FAILED');
    }

    let drawerEl, drawerBodyEl, savedFlashEl;
    function buildDrawer() {
      savedFlashEl = el('div', { class: 'saved-flash' }, 'SAVED');
      const closeBtn = el('button', {
        class: 'settings-close', type: 'button',
        'aria-label': 'Close', title: 'Close (Esc)',
        onClick: closeGear,
      }, svgPath('M1 1l8 8M9 1l-8 8', { viewBox: '0 0 10 10', width: 10, height: 10, strokeWidth: 1.5 }));
      const resetBtn = el('button', {
        class: 'settings-reset', type: 'button',
        title: 'Reset all appearance settings', onClick: resetAppearance,
      }, 'RESET');
      const head = el('div', { class: 'settings-head' },
        el('h2', null, 'Appearance'),
        el('div', { class: 'settings-head-actions' }, resetBtn, closeBtn));
      drawerBodyEl = el('div', { class: 'settings-body' });
      drawerEl = el('aside', {
        class: 'settings-panel', role: 'dialog', 'aria-label': 'Appearance', 'aria-hidden': 'true',
      }, savedFlashEl, head, drawerBodyEl);

    }
    function renderDrawerBody() {
      drawerBodyEl.innerHTML = '';
      drawerBodyEl.appendChild(sectionAccent());
      drawerBodyEl.appendChild(sectionBackground());
      const perBg = sectionPerBackground();
      if (perBg) drawerBodyEl.appendChild(perBg);
      drawerBodyEl.appendChild(sectionMotion());
      drawerBodyEl.appendChild(sectionAppOpacity());
    }
    function sectionAccent() {
      const rail = el('div', { class: 'theme-rail' });
      for (const [key, t] of Object.entries(THEMES)) {
        const wrap = el('div', { class: 'theme-chip-wrap' });
        const chip = el('button', {
          class: 'theme-chip' + (state.settings.theme === key ? ' selected' : ''),
          'aria-label': t.name, type: 'button',
          style: { '--chip-color': t.hex },
          onClick: () => updateSetting({ theme: key }),
        });
        const label = el('div', { class: 'theme-chip-label' }, t.name);
        wrap.appendChild(chip); wrap.appendChild(label);
        rail.appendChild(wrap);
      }
      return el('div', { class: 'settings-section' }, el('h3', null, 'Accent color'), rail);
    }
    function sectionBackground() {
      const grid = el('div', { class: 'bg-grid' });
      for (const b of BACKGROUNDS) {
        const cls = 'bg-swatch'
          + (state.settings.background === b.id ? ' selected' : '')
          + (b.disabled ? ' disabled' : '');
        const fill = el('div', { class: 'swatch-fill', style: { background: bgPreviewCss(b.id) } });
        const lab = el('div', { class: 'swatch-label' }, b.name);
        const swatch = el('button', {
          class: cls, type: 'button',
          title: b.disabled ? `${b.name} — coming in a later iteration` : b.name,
          onClick: b.disabled ? null : () => updateSetting({ background: b.id, ...(BG_PRESETS[b.id] || {}) }),
        }, fill, lab);
        if (b.disabled) swatch.appendChild(el('div', { class: 'swatch-soon' }, 'SOON'));
        grid.appendChild(swatch);
      }
      return el('div', { class: 'settings-section' }, el('h3', null, 'Background'), grid);
    }
    function sectionPerBackground() {
      const id = state.settings.background;
      if (id === 'iridescent') {
        const sec = el('div', { class: 'settings-section' }, el('h3', null, 'Iridescent · controls'));
        sec.appendChild(slider('Speed', state.settings.iridescent.speed, 4, 30, 0.5, 's',
          (v) => updateSetting({ iridescent: { ...state.settings.iridescent, speed: v } })));
        sec.appendChild(slider('Saturation', state.settings.iridescent.sat, 0.5, 2.5, 0.05, '',
          (v) => updateSetting({ iridescent: { ...state.settings.iridescent, sat: v } })));
        sec.appendChild(slider('Opacity', state.settings.iridescent.opacity, 0.2, 1, 0.05, '',
          (v) => updateSetting({ iridescent: { ...state.settings.iridescent, opacity: v } })));
        sec.appendChild(slider('Rim thickness', state.settings.iridescent.edge, 4, 60, 1, '%',
          (v) => updateSetting({ iridescent: { ...state.settings.iridescent, edge: v } })));
        sec.appendChild(toggleRow('Border-only mask', 'Carves a dark center',
          state.settings.iridescent.bordered,
          () => updateSetting({ iridescent: { ...state.settings.iridescent, bordered: !state.settings.iridescent.bordered } })));
        return sec;
      }
      if (id === 'plasma') {
        const sec = el('div', { class: 'settings-section' }, el('h3', null, 'Plasma · color stops'));
        sec.appendChild(colorRow('Stop 1', state.settings.plasma.c1, (v) => updateSetting({ plasma: { ...state.settings.plasma, c1: v } })));
        sec.appendChild(colorRow('Stop 2', state.settings.plasma.c2, (v) => updateSetting({ plasma: { ...state.settings.plasma, c2: v } })));
        sec.appendChild(colorRow('Stop 3', state.settings.plasma.c3, (v) => updateSetting({ plasma: { ...state.settings.plasma, c3: v } })));
        return sec;
      }
      if (id === 'chrome') {
        const sec = el('div', { class: 'settings-section' }, el('h3', null, 'Chrome · metals'));
        sec.appendChild(colorRow('Steel', state.settings.chrome.c1, (v) => updateSetting({ chrome: { ...state.settings.chrome, c1: v } })));
        sec.appendChild(colorRow('Highlight', state.settings.chrome.c2, (v) => updateSetting({ chrome: { ...state.settings.chrome, c2: v } })));
        sec.appendChild(colorRow('Gold', state.settings.chrome.c3, (v) => updateSetting({ chrome: { ...state.settings.chrome, c3: v } })));
        sec.appendChild(colorRow('Amber', state.settings.chrome.c4, (v) => updateSetting({ chrome: { ...state.settings.chrome, c4: v } })));
        sec.appendChild(slider('Speed', state.settings.chrome.speed, 3, 25, 0.5, 's',
          (v) => updateSetting({ chrome: { ...state.settings.chrome, speed: v } })));
        sec.appendChild(slider('Angle', state.settings.chrome.angle, 0, 180, 1, '°',
          (v) => updateSetting({ chrome: { ...state.settings.chrome, angle: v } })));
        sec.appendChild(slider('Opacity', state.settings.chrome.opacity, 0.2, 1, 0.05, '',
          (v) => updateSetting({ chrome: { ...state.settings.chrome, opacity: v } })));
        return sec;
      }
      return null;
    }
    function sectionMotion() {
      const sec = el('div', { class: 'settings-section' }, el('h3', null, 'Motion & atmosphere'));
      sec.appendChild(slider('Speed', state.settings.speed, 0.25, 3, 0.05, '×', (v) => updateSetting({ speed: v })));
      sec.appendChild(slider('Intensity', state.settings.intensity, 0.2, 1.5, 0.05, '', (v) => updateSetting({ intensity: v })));
      sec.appendChild(slider('Glass blur', state.settings.blurAmount, 0, 60, 1, 'px', (v) => updateSetting({ blurAmount: v })));
      sec.appendChild(toggleRow('Animate background', 'Honors prefers-reduced-motion',
        state.settings.motion, () => updateSetting({ motion: !state.settings.motion })));
      return sec;
    }
    function sectionAppOpacity() {
      const sec = el('div', { class: 'settings-section' }, el('h3', null, 'App opacity'));
      sec.appendChild(slider('Master', state.settings.masterOpacity, 0.2, 1, 0.01, '', (v) => updateSetting({ masterOpacity: v })));
      sec.appendChild(slider('Background layer', state.settings.bgOpacity, 0, 1, 0.01, '', (v) => updateSetting({ bgOpacity: v })));
      return sec;
    }
    function slider(label, value, min, max, step, suffix, onChange) {
      const num = el('span', { class: 'num' }, formatNum(value, step) + suffix);
      const head = el('div', { class: 'slider-head' }, el('span', null, label), num);
      const input = el('input', { type: 'range', min, max, step, value });
      input.addEventListener('input', () => {
        const v = +input.value;
        num.textContent = formatNum(v, step) + suffix;
        onChange(v);
      });
      return el('div', { class: 'slider-row' }, head, input);
    }
    function toggleRow(label, sub, on, onClick) {
      const lab = el('div', null, label, sub ? el('span', { class: 'label-sub' }, sub) : null);
      const tog = el('div', {
        class: 'toggle' + (on ? ' on' : ''),
        role: 'switch', 'aria-checked': on ? 'true' : 'false',
        onClick,
      });
      return el('div', { class: 'toggle-row' }, lab, tog);
    }
    function colorRow(label, value, onChange) {
      const hex = el('span', { class: 'color-hex' }, value.toUpperCase());
      const inp = el('input', { type: 'color', value });
      inp.addEventListener('input', () => {
        hex.textContent = inp.value.toUpperCase();
        onChange(inp.value);
      });
      const ctrls = el('div', { class: 'color-row-controls' }, inp, hex);
      return el('div', { class: 'color-row' }, el('span', null, label), ctrls);
    }
    function formatNum(v, step) {
      if (step >= 1) return String(Math.round(v));
      if (step >= 0.1) return v.toFixed(1);
      return v.toFixed(2);
    }

    function updateSetting(patch) {
      const prev = state.settings;
      state.settings = { ...prev, ...patch };
      for (const k of ['plasma', 'iridescent', 'chrome', 'fluid']) {
        if (patch[k]) state.settings[k] = { ...prev[k], ...patch[k] };
      }
      saveSettings(state.settings);
      applyToPanel(panelEl);
      paintBackground(bgBaseEl, texOverlayEl);
      if ('theme' in patch || 'background' in patch) renderDrawerBody();
      flashSaved();
    }
    function resetAppearance() {
      const layout = state.settings.layout;
      const multi = state.settings.multiOn;
      state.settings = { ...DEFAULTS, layout, multiOn: multi };
      saveSettings(state.settings);
      applyToPanel(panelEl);
      paintBackground(bgBaseEl, texOverlayEl);
      renderDrawerBody();
      flashSaved();
    }
    function flashSaved() {
      if (!savedFlashEl) return;
      savedFlashEl.classList.add('show');
      setTimeout(() => savedFlashEl.classList.remove('show'), 900);
    }

    function toggleGear() {
      if (state.gearOpen) closeGear(); else openGear();
    }
    function openGear() {
      const rect = gearBtnEl.getBoundingClientRect();
      const PANEL_W = 360;
      const PANEL_MAX_H = Math.round(window.innerHeight * 0.7);
      const margin = 12;
      let left = rect.right - PANEL_W;
      if (left < margin) left = margin;
      if (left + PANEL_W > window.innerWidth - margin) left = window.innerWidth - PANEL_W - margin;
      let top = rect.bottom + 8;
      if (top + PANEL_MAX_H > window.innerHeight - margin) {
        top = Math.max(margin, rect.top - PANEL_MAX_H - 8);
      }
      const anchorX = (rect.left + rect.width / 2) - left;
      drawerEl.style.left = left + 'px';
      drawerEl.style.top = top + 'px';
      drawerEl.style.setProperty('--anchor-x', anchorX + 'px');
      drawerEl.style.setProperty('--anchor-y', '0%');
      drawerEl.classList.add('open');
      drawerEl.setAttribute('aria-hidden', 'false');
      backdropEl.classList.add('open');
      backdropEl.setAttribute('aria-hidden', 'false');
      gearBtnEl.classList.add('open');
      state.gearOpen = true;
      ensureWindowSizeFor('drawer');
    }
    function closeGear() {
      drawerEl.classList.remove('open');
      drawerEl.setAttribute('aria-hidden', 'true');
      backdropEl.classList.remove('open');
      backdropEl.setAttribute('aria-hidden', 'true');
      gearBtnEl.classList.remove('open');
      state.gearOpen = false;
      ensureWindowSizeFor('panel');
    }

    function ensureWindowSizeFor(mode) {
      const PANEL_W = 780, PANEL_H = 246;
      const PAD = 24;
      if (mode === 'drawer') {
        ipcRenderer.send('resize-window', { width: PANEL_W + PAD, height: PANEL_H + PAD + 520 });
      } else {
        ipcRenderer.send('resize-window', { width: PANEL_W + PAD, height: PANEL_H + PAD });
      }
    }

    function bgPreviewCss(id) {
      const accent = THEMES[state.settings.theme].hex;
      const glow = hexToRgba(accent, 0.55);
      const soft = hexToRgba(accent, 0.18);
      switch (id) {
        case 'flat':       return '#08080e';
        case 'mesh':       return `radial-gradient(circle at 20% 30%, ${accent}, transparent 60%), radial-gradient(circle at 80% 70%, #6c4cf2aa, transparent 60%), #08080e`;
        case 'aurora':     return `radial-gradient(60% 80% at 20% 30%, ${glow}, transparent 60%), radial-gradient(50% 60% at 85% 70%, ${soft}, transparent 65%), #07070d`;
        case 'iridescent': return `conic-gradient(from 0deg, #4a8fff, #b96cff, #ff5cd6, #ff8b5c, #ffd86c, #6cffae, #5ce0ff, #4a8fff)`;
        case 'plasma':     return `radial-gradient(closest-side at 25% 30%, ${accent}, transparent 55%), radial-gradient(closest-side at 75% 70%, #6c4cf2, transparent 55%), radial-gradient(closest-side at 50% 100%, #2cc6d6, transparent 55%), #06060c`;
        case 'chrome':     return `linear-gradient(110deg, #2a2a32 0%, #a8a8b8 18%, #f0f0f6 28%, #d8c47a 40%, #e8a85c 50%, #d8c47a 60%, #f0f0f6 72%, #a8a8b8 82%, #2a2a32 100%)`;
        case 'particles':  return `radial-gradient(circle at 50% 50%, #0e0e18, #06060c 80%)`;
        case 'bands':      return `linear-gradient(100deg, transparent 30%, ${soft} 45%, ${glow} 50%, ${soft} 55%, transparent 70%), #08080e`;
        case 'noir':       return `radial-gradient(circle at 25% 60%, ${glow}, transparent 60%), linear-gradient(180deg, #0a0a12, #050509)`;
        case 'topo':       return `radial-gradient(circle at 30% 60%, ${glow}, transparent 60%), #07070d`;
        case 'fluid':      return `radial-gradient(ellipse 70% 90% at 30% 40%, ${accent}, transparent 60%), radial-gradient(ellipse 60% 70% at 75% 65%, #6c4cf2cc, transparent 55%), #06060c`;
        case 'holo':       return `conic-gradient(from 90deg at 30% 50%, #ff6cd6, #ffa56c, #ffe26c, #6cffa5, #6cd6ff, #a56cff, #ff6cd6)`;
        case 'custom':     return '#08080e';
        default:           return '#08080e';
      }
    }

    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (tilePopoverEl && tilePopoverEl.classList.contains('open')) {
          closeTilePopover();
          return;
        }
        if (state.gearOpen) { closeGear(); return; }
      }
      if (document.activeElement === chatInputEl) return;
      if (/^[1-5]$/.test(e.key)) toggleAgent(e.key);
    });
    document.addEventListener('mousedown', (e) => {
      // Tile popover — close on any mousedown outside the popover itself
      // (the popover stops propagation on its own mousedown so this only
      // fires for genuinely-outside clicks).
      if (tilePopoverEl && tilePopoverEl.classList.contains('open')) {
        if (!tilePopoverEl.contains(e.target)) closeTilePopover();
      }
      if (!state.gearOpen) return;
      if (drawerEl && drawerEl.contains(e.target)) return;
      if (gearBtnEl && gearBtnEl.contains(e.target)) return;
      closeGear();
    });
    // Window scroll/resize → close popover so it doesn't drift away from
    // its tile. Cheap close, easy reopen.
    window.addEventListener('blur', () => closeTilePopover());
    window.addEventListener('resize', () => closeTilePopover());
    backdropEl.addEventListener('click', closeGear);

    ipcRenderer.on('focus-chat-input', () => {
      setTimeout(() => chatInputEl?.focus(), 0);
    });

    buildPanel();
    buildDrawer();
    ensureWindowSizeFor('panel');
  </script>
</body>
</html>
