<!DOCTYPE html>
<html>
<head>
  <style>
    :root {
      --bg: rgba(12, 12, 18, 0.96);
      --glass-border: rgba(255, 255, 255, 0.15);
      --accent: #00f2ff;
      --xavier: #00f2ff;
      --lucius: #ffaa00;
      --gekko: #00ff88;
      --swarmy: #ff77cc;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: 'JetBrains Mono', monospace;
      -webkit-app-region: drag;
      background: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 180px;
    }

    .remote-container {
      width: 560px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .dashboard-container {
      width: 100%;
      position: relative;
      background: var(--bg);
      backdrop-filter: blur(40px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      height: 68px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
      transition: all 0.5s var(--ease);
      z-index: 10;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      -webkit-app-region: no-drag;
    }

    .agent-btn {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.03);
      padding: 0;
      cursor: pointer;
      transition: all 0.3s var(--ease);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .agent-btn:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-2px); }
    .agent-btn object { width: 100%; height: 100%; pointer-events: none; }

    .agent-btn.active.xavier { border-color: var(--xavier); box-shadow: 0 0 20px var(--xavier); }
    .agent-btn.active.lucius { border-color: var(--lucius); box-shadow: 0 0 20px var(--lucius); }
    .agent-btn.active.gekko  { border-color: var(--gekko);  box-shadow: 0 0 20px var(--gekko); }
    .agent-btn.active.swarmy { border-color: var(--swarmy); box-shadow: 0 0 20px var(--swarmy); }
    .agent-btn.active object { transform: scale(1.1); filter: brightness(1.4); }

    body.command-mode .agent-btn:not(.active) { opacity: 0.3; filter: grayscale(1); }

    .control-group {
      display: flex;
      gap: 8px;
      margin-left: 10px;
      -webkit-app-region: no-drag;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s var(--ease);
    }
    .icon-btn:hover { background: var(--accent); border-color: var(--accent); }
    .icon-btn svg { width: 18px; height: 18px; color: #fff; }
    .icon-btn.active { background: #fff; border-color: #fff; }
    .icon-btn.active svg { color: #000; }

    /* Hidden until Command Mode */
    .select-all-btn { display: none; }
    body.command-mode .select-all-btn { display: flex; }

    .input-wrapper {
      width: 550px;
      height: 0;
      opacity: 0;
      overflow: hidden;
      transition: all 0.5s var(--ease);
      background: rgba(15, 15, 25, 0.8);
      backdrop-filter: blur(50px);
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      padding: 0 15px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.5);
      margin-bottom: 8px;
      -webkit-app-region: no-drag;
    }

    body.command-mode .input-wrapper { height: 50px; opacity: 1; margin-top: 5px; }

    #broadcast-input {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
    }

    .spawn-btn {
      margin-left: auto;
      background: #ffffff;
      color: #000;
      border: none;
      padding: 0 20px;
      height: 42px;
      border-radius: 14px;
      font-weight: 900;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      cursor: pointer;
      -webkit-app-region: no-drag;
      transition: all 0.2s;
    }
    .spawn-btn:hover { background: var(--accent); color: #fff; box-shadow: 0 0 25px var(--accent); }
  </style>
</head>
<body>
  <div class="remote-container">
    <div class="input-wrapper">
      <input type="text" id="broadcast-input" placeholder="Broadcast command to selected agents..." />
    </div>

    <div class="dashboard-container">
      <div class="btn-group" id="agent-buttons">
        <!-- Buttons rendered from agents.json by the script below. -->
      </div>

      <div class="control-group">
        <!-- Trigger Icon -->
        <div class="icon-btn command-trigger" id="mode-trigger" onclick="toggleCommandMode()" title="Broadcast Mode">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 17l6-6-6-6M12 19h8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <!-- Select All Icon -->
        <div class="icon-btn select-all-btn" onclick="toggleSelectAll()" title="Select All Agents">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 13l3 3 7-7M7 6l3 3 7-7" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>

      <button class="spawn-btn" id="main-action-btn" onclick="executeMainAction()">Deploy</button>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    // agents object — populated from main.js's get-agents IPC handler at boot.
    // Shape: { [id]: { id, displayName, tmuxTarget, color, selected } }.
    let agents = {};
    let commandMode = false;

    async function init() {
      let registry = [];
      try {
        registry = await ipcRenderer.invoke('get-agents');
      } catch (err) {
        console.error('failed to load registry:', err);
      }
      if (!registry || registry.length === 0) {
        // Fallback: hardcoded list so the dashboard isn't empty if registry
        // load fails. Matches the canonical five.
        registry = [
          { id: 'xavier', displayName: 'Xavier', tmuxTarget: 'xavier' },
          { id: 'lucius', displayName: 'Lucius', tmuxTarget: 'lucius' },
          { id: 'gekko',  displayName: 'Gekko',  tmuxTarget: 'gekko' },
          { id: 'swarmy', displayName: 'Swarmy', tmuxTarget: 'overlordswarmy' },
          { id: 'claude', displayName: 'Claude', tmuxTarget: 'claude' }
        ];
      }

      const container = document.getElementById('agent-buttons');
      container.innerHTML = '';
      registry.forEach(a => {
        agents[a.id] = { ...a, selected: false };
        const btn = document.createElement('button');
        btn.className = `agent-btn ${a.id}`;
        btn.id = `btn-${a.id}`;
        btn.title = a.displayName;
        btn.addEventListener('click', () => agentClick(a.id, btn));
        const obj = document.createElement('object');
        obj.setAttribute('data', `assets/${a.id}.svg`);
        obj.setAttribute('type', 'image/svg+xml');
        btn.appendChild(obj);
        container.appendChild(btn);
      });
    }

    function toggleCommandMode() {
      commandMode = !commandMode;
      document.body.classList.toggle('command-mode', commandMode);
      document.getElementById('mode-trigger').classList.toggle('active', commandMode);
      document.getElementById('main-action-btn').innerText = commandMode ? 'Broadcast' : 'Deploy';
      if (commandMode) document.getElementById('broadcast-input').focus();
      else resetSelection();
    }

    function toggleSelectAll() {
      const allSelected = Object.values(agents).every(a => a.selected);
      Object.keys(agents).forEach(id => {
        agents[id].selected = !allSelected;
        const el = document.getElementById(`btn-${id}`);
        if (el) el.classList.toggle('active', !allSelected);
      });
    }

    function agentClick(id, btn) {
      agents[id].selected = !agents[id].selected;
      btn.classList.toggle('active', agents[id].selected);
    }

    function resetSelection() {
      Object.values(agents).forEach(a => a.selected = false);
      document.querySelectorAll('.agent-btn').forEach(b => b.classList.remove('active'));
    }

    function executeMainAction() {
      if (commandMode) broadcast();
      else {
        // Pass canonical registry ids straight through — chq-tmux.sh now
        // reads the same registry, so no per-id rewrites needed.
        const selectedIds = Object.values(agents).filter(a => a.selected).map(a => a.id);
        if (selectedIds.length > 0) { ipcRenderer.send('spawn-agents', selectedIds); resetSelection(); }
      }
    }

    function broadcast() {
      const msg = document.getElementById('broadcast-input').value;
      const selectedAgents = Object.values(agents).filter(a => a.selected);
      if (!msg || selectedAgents.length === 0) return;
      // "isAll" = every agent in the registry is selected. main.js fans out
      // to every pane in every tmux session in that case.
      const isAll = selectedAgents.length === Object.keys(agents).length;
      // Strip the metadata keys main.js doesn't need so we don't leak DOM
      // refs across the IPC boundary.
      const payload = selectedAgents.map(a => ({ id: a.id, tmuxTarget: a.tmuxTarget }));
      ipcRenderer.send('broadcast-message', { message: msg, selectedAgents: payload, isAll });
      document.getElementById('broadcast-input').value = '';
      toggleCommandMode();
    }

    document.getElementById('broadcast-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') broadcast();
    });

    init();
  </script>
</body>
</html>
