      // newer call bumps this token and we bail before mutating the DOM.
      const openToken = ++radialOpenToken;

      // Per-agent palette — orbs colour-match the right-clicked tile so the
      // menu reads as "this menu belongs to that tile".
      const palette = paletteForAgent(id);

      // Tile center (viewport coords) = mercury origin. All orbs spawn here.
      // v2.4: window grows DOWNWARD only (top-left fixed), so the panel's
      // viewport position is invariant — no pre/post-resize coord split,
      // no `delta` adjustment needed. tileCx and tileCy are the values used
      // throughout.
      const r = tileBtn.getBoundingClientRect();
      const tileCx = r.left + r.width / 2;
      const tileCy = r.top + r.height / 2;

      // Anchor the arc BELOW the right-clicked TILE. The cluster blooms into
      // the transparent dead space below the panel — orbs cascade down with
      // the OUTER orbs' top edges sitting CLUSTER_TILE_GAP px below the
      // tile's bottom edge. Reads as a Bebber FAB dropping straight out of
      // the source avatar.
      //
      // Math: outer orb has Y_OFFSET = RADIAL_Y_OFFSETS[0]; its TOP edge
      // sits at arcBaseY + Y_OFFSET[0] - ORB_SIZE/2. Setting that equal to
      // (r.bottom + CLUSTER_TILE_GAP) and solving for arcBaseY:
      //   arcBaseY = r.bottom + CLUSTER_TILE_GAP - Y_OFFSET[0] + 22
      //            = r.bottom + CLUSTER_TILE_GAP - 46 + 22
      //            = r.bottom + CLUSTER_TILE_GAP - 24
      // (with current Y_OFFSETS[0] = +46). Express via the formula so a
      // future Y_OFFSETS tweak doesn't desync the anchor.
      const CLUSTER_TILE_GAP = 10;          // px between outer-orb-top and tile-bottom
      const arcBaseY = r.bottom + CLUSTER_TILE_GAP - RADIAL_Y_OFFSETS[0] + 22;

      // Verbs are SHORT (single word where possible) so they fit the 120px
      // hover-label width comfortably above each 44px orb. Long detail
      // strings (cwd path) ellipsis.
      // requiresRunning: true marks orbs that need a live chq pane to operate
      // on. When agent.running is false, these orbs render disabled (dimmed,
      // click no-ops with a friendly flash). CWD + Settings are always live —
      // they edit the registry, not the pane. v2.6.
      const cwdDisplay = truncatePath(tildeCollapse(agent.cwd || ''), 18);
      const items = [
        {
          icon: '📁',
          verb: 'CWD',
          detail: cwdDisplay || '(unset)',
          action: () => doChangeCwd(id),
          danger: false,
          requiresRunning: false,
          title: 'Change working directory'
        },
        {
          icon: '⏹',
          verb: 'Close',
          detail: '',
          action: (orbEl, labelEl) => requestRadialConfirm(orbEl, labelEl, 'kill?', () => doKillPane(id, tileBtn)),
          danger: true,
          keepOpenOnClick: true,
          requiresRunning: true,
          title: 'Close (kill) tmux pane'
        },
        {
          icon: '⟳',
          verb: 'Restart',
          detail: '',
          action: () => doRestart(id, tileBtn),
          danger: false,
          requiresRunning: true,
          title: 'SIGINT — pane respawns automatically'
        },
        {
          icon: '↗',
          verb: 'Attach',
          detail: 'iTerm',
          action: () => doAttach(id, tileBtn),
          danger: false,
          requiresRunning: true,
          title: 'Open iTerm tab attached to this pane'
        },
        {
          icon: '⚙',
          verb: 'Settings',
          detail: '',
          // Toggle the inline panel; keep the radial open while it's up.
          action: (orbEl) => toggleSettingsPanel(id, orbEl),
          danger: false,
          settings: true,
          keepOpenOnClick: true,
          title: 'Auto-restart toggle + startup commands'
        }
      ];

      const ORB_SIZE = 44;                  // matches .radial-orb width/height
      const LABEL_W = 120;                  // matches .radial-label width (hover-only, only one visible)
      const LABEL_GAP_BELOW = 6;            // vertical gap from orb-bottom → label-top
      const LABEL_BLOCK_H = 32;             // approx 2-line text-block height (verb + detail)
      const MARGIN = 12;                    // viewport-edge clamp

      // Center the arc on the tile, then shift left/right to keep all orbs
      // (and the hover-revealed label of the leftmost / rightmost orb) inside
      // the viewport. Even though only one label shows at a time, the LEFTMOST
      // orb's label could overflow left (or RIGHTMOST overflow right) when
      // hovered, so we clamp using `orbCx ± LABEL_W/2` for the outer slots.
      const groupCx = tileCx;
      const minRequired = groupCx + Math.min(...RADIAL_X_OFFSETS) - LABEL_W / 2;
      const maxRequired = groupCx + Math.max(...RADIAL_X_OFFSETS) + LABEL_W / 2;
      let shiftX = 0;
      if (minRequired < MARGIN) shiftX = MARGIN - minRequired;
      else if (maxRequired > window.innerWidth - MARGIN) shiftX = (window.innerWidth - MARGIN) - maxRequired;

      // Compute final positions directly. v2.4: panel doesn't move (window
      // grows downward only), so there's no pre/post-resize coord split.
      // Each orb's center sits at (groupCx + X_OFFSET + shiftX, arcBaseY +
      // Y_OFFSET). Labels sit BELOW each orb, anchored at orb-bottom + gap.
      const positions = items.map((_, idx) => {
        const cx = groupCx + RADIAL_X_OFFSETS[idx] + shiftX;
        const cy = arcBaseY + RADIAL_Y_OFFSETS[idx];
        return {
          orbX: cx - ORB_SIZE / 2,
          orbY: cy - ORB_SIZE / 2,
          // Label block sits BELOW the orb (hover-only, so adjacent-column
          // collision is impossible). CSS uses translate3d(-50%, ...) so
          // passing orb-center-x for labelX is correct; labelY is the
          // label-block's TOP edge = orb-bottom + gap.
          labelX: cx,
          labelY: cy + ORB_SIZE / 2 + LABEL_GAP_BELOW,
          orbCx: cx,
          orbCy: cy
        };
      });

      // Window growth — DOWNWARD only. Compute the lowest pixel any visible
      // surface might occupy:
      //   - lowest orb-bottom = max(positions[].orbCy + ORB_SIZE/2)
      //   - hover-label of that lowest orb extends LABEL_GAP_BELOW +
      //     LABEL_BLOCK_H further down
      //   - + MARGIN viewport-edge breathing room
      // main caps this to display.workArea.bottom; if the request exceeds
      // the display, main grows as far as it can. Width clamp uses the
      // hover-label-extended outer slots (same as the X clamp above).
      const lowestOrbBottom = Math.max(...positions.map(p => p.orbCy + ORB_SIZE / 2));
      const lowestLabelBottom = lowestOrbBottom + LABEL_GAP_BELOW + LABEL_BLOCK_H;
      const neededWidth = Math.max(window.innerWidth, Math.ceil(maxRequired + shiftX + MARGIN));
      const neededHeight = Math.max(window.innerHeight, Math.ceil(lowestLabelBottom + MARGIN));

      // Capture pre-open height so close can shrink back to it. Only on the
      // first grow per open arc — subsequent regrows (e.g. settings popover
      // opening) shouldn't overwrite the original height.
      if (radialPreOpenHeight === null) {
        radialPreOpenHeight = window.innerHeight;
      }

      if (neededWidth > window.innerWidth || neededHeight > window.innerHeight) {
        // Fire-and-forget — main caps to display.workArea bottom (no anchor
        // dance needed since top-left stays fixed). Race-guard the open
        // token after a microtask so a stale open doesn't paint orbs into
        // a window the user already dismissed.
        ipcRenderer.send('resize-window', { width: neededWidth, height: neededHeight });
      }

      // Race-guard before mutating the DOM. If the user fired another open
      // (rapid right-click-spam), bail before we paint stale orbs.
      if (radialOpenToken !== openToken) return;

      items.forEach((item, idx) => {
        // The orb itself — solid colored circle, gooey-merge candidate.
        const orb = document.createElement('div');
        // requiresRunning + agent.running drives the .disabled class. We mark
        // it inert if the agent isn't currently in a chq pane (the action
        // would error with "isn't running in chq" anyway). Stashed on the
        // orb so refreshOpenRadialDisabledState() can flip it on poll.
        const isDisabled = !!item.requiresRunning && !agents[id].running;
        orb.className = 'radial-orb'
          + (item.danger ? ' danger' : '')
          + (item.settings ? ' settings' : '')
          + (isDisabled ? ' disabled' : '')
          + ` ${id}`;        // tag with agent id for any future per-agent tweaks
        orb.title = isDisabled
          ? `${agent.displayName || id} isn't running in chq — Deploy it first`
          : (item.title || item.verb);
        orb.innerHTML = `
          <span class="orb-icon">${item.icon}</span>
          <div class="confirm">
            <span class="ok">✓</span>
            <span class="no">✗</span>
          </div>
        `;
        // Per-agent palette — applied as inline CSS variables. Danger and
        // settings orbs override these via their own selectors so their CSS
        // wins regardless of the agent.
        if (!item.danger && !item.settings) {
          orb.style.setProperty('--orb-light', palette.light);
          orb.style.setProperty('--orb-mid',   palette.mid);
          orb.style.setProperty('--orb-deep',  palette.deep);
          orb.style.setProperty('--orb-glow',  palette.glow);
        }
        // Label-text color tracks the orb. Use the LIGHTEST stop of the palette
        // (or the danger pink / settings grey for those overrides) so type
        // pops against the dark glass + text-shadow halo.
        let labelColor;
        if (item.danger)        labelColor = '#ff8a9c';   // matches .radial-orb.danger --orb-light
        else if (item.settings) labelColor = '#e0e4ee';   // a touch brighter than .radial-orb.settings --orb-light for readable type
        else                    labelColor = palette.light;
        // Stagger so orbs leave the tile in sequence — the goo filter then
        // smears them into a single blob that splits as it travels.
        orb.style.transitionDelay = `${idx * RADIAL_STAGGER_MS}ms`;

        const p = positions[idx];
        orb.style.setProperty('--x', `${p.orbX}px`);
        orb.style.setProperty('--y', `${p.orbY}px`);
        // Mercury origin = tile center. v2.4: panel doesn't move during open
        // (window grows downward only), so tileCx/tileCy from r.{left,top}
        // are valid throughout — no pre/post-resize delta to apply.
        orb.style.setProperty('--start-x', `${tileCx - ORB_SIZE / 2}px`);
        orb.style.setProperty('--start-y', `${tileCy - ORB_SIZE / 2}px`);

        // The matching label block — separate DOM node, not filtered. Lives
        // directly under the orb (CSS centers it on labelX via translate-X).
        const label = document.createElement('div');
        label.className = 'radial-label'
          + (item.danger ? ' danger' : '')
          + (isDisabled ? ' disabled' : '');
        // When disabled, swap the per-orb detail for a "(not running)" hint so
        // the hover label explains why the action is inert. Otherwise use the
        // item's normal detail (cwd path, "iTerm", etc).
        const effectiveDetail = isDisabled ? '(not running)' : item.detail;
        const detailHtml = effectiveDetail ? `<span class="detail">${escapeHtml(effectiveDetail)}</span>` : '';
        label.innerHTML = `
          <span class="verb">${escapeHtml(item.verb)}</span>
          ${detailHtml}
        `;
        label.style.setProperty('--lx', `${p.labelX}px`);
        label.style.setProperty('--ly', `${p.labelY}px`);
        // Color matches the orb's lightest palette stop (or danger/settings
        // override) so the orb-and-label read as one unit.
        label.style.setProperty('--label-color', labelColor);
        // Stagger label fade-in slightly so they appear left-to-right after
        // their respective orbs land.
        label.style.transitionDelay = `${idx * 40}ms`;

        // Click on either the orb OR its label fires the action. Both nodes
        // share the same handler so users can hit the bigger label area too.
        // Disabled gating reads the LIVE class list (not the captured
        // isDisabled at construction) so refreshOpenRadialDisabledState() can
        // re-enable an orb on a poll tick without rebinding handlers.
        const fire = (ev) => {
          ev.stopPropagation();
          if (orb.classList.contains('disabled')) {
            // Friendly flash on the source tile so Richard sees the reason
            // the click was a no-op rather than wondering if it registered.
            flashTileError(tileBtn, `${agent.displayName || id} isn't running — Deploy it first`);
            return;
          }
          item.action(orb, label);
          if (!item.keepOpenOnClick) closeRadialMenu();
        };
        orb.addEventListener('click', fire);
        label.addEventListener('click', fire);

        // Hover-gated label reveal — the Bebber-tight spacing means we can't
        // show all labels at once, so hovering an orb (or its already-revealed
        // label) reveals THAT label. Gate on .radial-orbs.settled so labels
        // can't appear mid-emergence (would race with the goo-merge animation).
        // Pointer-events on the label switch to `auto` while .visible so the
        // user can move the cursor onto the label without losing the reveal.
        const hoverOn = () => {
          if (!orbsLayer.classList.contains('settled')) return;
          orb.classList.add('hover');
          label.classList.add('hover', 'visible');
          label.style.pointerEvents = 'auto';
        };
        const hoverOff = () => {
          orb.classList.remove('hover');
          label.classList.remove('hover', 'visible');
          label.style.pointerEvents = 'none';
        };
        orb.addEventListener('mouseenter', hoverOn);
        orb.addEventListener('mouseleave', hoverOff);
        label.addEventListener('mouseenter', hoverOn);
        label.addEventListener('mouseleave', hoverOff);

        // Stash the label on the orb for confirm-mode toggling.
        orb._labelEl = label;
        // Stash the resting orb-center too, so the settings panel can position
        // itself off the gear orb without depending on getBoundingClientRect
        // (which would return an interpolated mid-animation position if the
        // user clicked during emergence).
        orb._restCenter = { x: p.orbCx, y: p.orbCy };
        // Stash item flags + original verb/detail/title so the poll-tick
        // refresh can flip disabled state without rebuilding the entire menu.
        orb._requiresRunning = !!item.requiresRunning;
        orb._origVerb = item.verb;
        orb._origDetail = item.detail || '';
        orb._origTitle = item.title || item.verb;
        orb._agentId = id;

        orbsLayer.appendChild(orb);
        labelsLayer.appendChild(label);
      });

      // Defer .open until after the next paint so the (fire-and-forget)
      // resize-window IPC has propagated — Chromium needs a beat to
      // recompute layout after the window grows. Two rAF tics are belt-
      // and-suspenders: one for layout, one for paint. v2.4: panel doesn't
      // move during open (window grows downward only), so this is purely
      // about waiting for the resize to settle, not for any anchor flip.
      radialOpenForId = id;
      const launchOpen = () => {
        // Re-check we weren't already closed in the meantime (rapid
        // open-close-open pattern).
        if (radialOpenForId !== id) return;
        void menu.offsetWidth;
        menu.classList.add('open');

        // Settle timer marks emergence as complete. Hover handlers gate label
        // reveal on this class so labels can't appear mid-emergence and race
        // the mercury-merge animation. Bulk label-reveal removed — labels
        // are hover-only now (Bebber-tight spacing forces it).
        const totalEmergeMs = RADIAL_SETTLE_DELAY_MS + (items.length - 1) * RADIAL_STAGGER_MS;
        radialSettleTimer = setTimeout(() => {
          orbsLayer.classList.add('settled');
        }, totalEmergeMs);
      };
      requestAnimationFrame(() => requestAnimationFrame(launchOpen));

      // Dismiss handlers: outside click, Escape, scroll, window blur.
      const onPointerDown = (ev) => {
        if (!menu.contains(ev.target)) closeRadialMenu();
      };
      const onKey = (ev) => { if (ev.key === 'Escape') closeRadialMenu(); };
      const onScroll = () => closeRadialMenu();
      const onBlur = () => closeRadialMenu();
      document.addEventListener('mousedown', onPointerDown, true);
      document.addEventListener('keydown', onKey);
      window.addEventListener('scroll', onScroll, true);
      window.addEventListener('blur', onBlur);
      radialDismissCleanup = () => {
        document.removeEventListener('mousedown', onPointerDown, true);
        document.removeEventListener('keydown', onKey);
        window.removeEventListener('scroll', onScroll, true);
        window.removeEventListener('blur', onBlur);
      };
    }

    // Re-evaluate disabled state on every open orb when the status poll comes
    // back. Lets the menu stay open across a state change (e.g. user spawns
    // the agent in a separate terminal while the menu is up). For each orb
    // tagged with requiresRunning: flip .disabled based on agents[id].running,
    // rewrite the hover label's detail line, and update the title attribute.
    // Also runs on the settings popover's detach buttons since they share the
    // same constraint. v2.6.
    function refreshOpenRadialDisabledState() {
      if (!radialOpenForId) return;
      const orbsLayer = document.getElementById('radial-orbs');
      if (!orbsLayer) return;
      const orbs = orbsLayer.querySelectorAll('.radial-orb');
      orbs.forEach(orb => {
        if (!orb._requiresRunning) return;
        const id = orb._agentId;
        const agent = agents[id];
        if (!agent) return;
        const shouldDisable = !agent.running;
        const isDisabled = orb.classList.contains('disabled');
        if (shouldDisable === isDisabled) return;          // no-op
        orb.classList.toggle('disabled', shouldDisable);
        orb.title = shouldDisable
          ? `${agent.displayName || id} isn't running in chq — Deploy it first`
          : orb._origTitle;
        const label = orb._labelEl;
        if (label) {
          label.classList.toggle('disabled', shouldDisable);
          // Don't clobber the confirming-state HTML if a destructive confirm
          // is mid-flight on this orb; the cleanup() inside requestRadialConfirm
          // restores the original markup, so let it own the detail until then.
          if (!orb.classList.contains('confirming')) {
            const effectiveDetail = shouldDisable ? '(not running)' : orb._origDetail;
            const detailHtml = effectiveDetail
              ? `<span class="detail">${escapeHtml(effectiveDetail)}</span>`
              : '';
            label.innerHTML = `<span class="verb">${escapeHtml(orb._origVerb)}</span>${detailHtml}`;
          }
        }
      });
      // Settings popover's detach buttons — same gate, same source.
      const settingsLayer = document.getElementById('radial-settings');
      if (settingsLayer && settingsLayer.classList.contains('visible')) {
        const id = settingsLayer.dataset.agentId;
        const agent = agents[id];
        if (agent) {
          const shouldDisable = !agent.running;
          ['detach-window', 'detach-split'].forEach(btnId => {
            const btn = settingsLayer.querySelector(`#${btnId}`);
            if (!btn) return;
            btn.disabled = shouldDisable;
            btn.title = shouldDisable
              ? `${agent.displayName || id} isn't running in chq — Deploy it first`
              : btn.dataset.origTitle || btn.title;
          });
        }
      }
    }

    function closeRadialMenu() {
      const menu = document.getElementById('radial-menu');
      const orbsLayer = document.getElementById('radial-orbs');
      const settingsLayer = document.getElementById('radial-settings');
      menu.classList.remove('open');
      orbsLayer.classList.remove('settled');
      settingsLayer.classList.remove('visible');
      radialOpenForId = null;
      if (radialSettleTimer) { clearTimeout(radialSettleTimer); radialSettleTimer = null; }
      if (radialLabelTimer)  { clearTimeout(radialLabelTimer);  radialLabelTimer  = null; }
      if (radialDismissCleanup) { radialDismissCleanup(); radialDismissCleanup = null; }
      // Hide the container after the closing animation finishes and shrink
      // the window back to the panel's natural size. v2.4: panel never
      // moved during open (window grew downward only), so close just needs
      // to drop the extra height — no anchor-release IPC, no body-class
      // flip, no captured-bounds restore.
      setTimeout(() => {
        if (!menu.classList.contains('open')) {
          orbsLayer.innerHTML = '';
          document.getElementById('radial-labels').innerHTML = '';
          settingsLayer.innerHTML = '';
          // Restore the pre-open height. syncWindowSize would also do this
          // by remeasuring the panel, but using the captured value avoids a
          // re-layout dependency. Reset the capture so the next open arc
          // re-captures fresh.
          if (radialPreOpenHeight !== null) {
            ipcRenderer.send('resize-window', {
              width: window.innerWidth,
              height: radialPreOpenHeight
            });
            radialPreOpenHeight = null;
          }
          // Belt-and-suspenders: renormalise in case anything drifted (e.g.
          // add-form was opened across the radial cycle and changed the
          // natural height while the radial was up).
          syncWindowSize();
        }
      }, 320);
    }

    // ---------------------------------------------------------------------
    // Inline settings panel — opens off the gear orb. Hosts the auto_restart
    // toggle + 3 startup-command text fields (color, rename_to, startup_slash).
    //
    // Save semantics:
    //   - toggle  → fire IPC immediately on change
    //   - inputs  → fire IPC on blur AND on Enter (and only if value differs
    //               from last-saved). Lightweight invalid-tint on garbage,
    //               doesn't block save (user might genuinely want a custom
    //               value the renderer doesn't recognise).
    //
    // Each save is a partial PATCH against /update-agent. On success we mutate
    // the local agents[id] object so the UI stays in sync without a full reload
    // (a reload would yank focus from the input the user just edited).
    // ---------------------------------------------------------------------
    function toggleSettingsPanel(id, gearOrbEl) {
      const layer = document.getElementById('radial-settings');
      // Already open for THIS gear → close.
      if (layer.classList.contains('visible') && layer.dataset.agentId === id) {
        layer.classList.remove('visible');
        gearOrbEl.classList.remove('open');
        return;
      }
      // Otherwise (re)open with current agent data.
      gearOrbEl.classList.add('open');
      renderSettingsPanel(id, gearOrbEl);
    }

    function renderSettingsPanel(id, gearOrbEl) {
      const agent = agents[id];
      if (!agent) return;
      const layer = document.getElementById('radial-settings');
      layer.dataset.agentId = id;
      layer.innerHTML = `
        <div class="settings-title">${escapeHtml(agent.displayName || id)} · settings</div>
        <div class="toggle-row">
          <div class="toggle-meta">
            <div class="verb">Auto-restart</div>
            <div class="hint">Re-launch when the agent exits</div>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="set-autorestart" ${agent.autoRestart ? 'checked' : ''} />
            <span class="track"></span>
            <span class="knob"></span>
          </label>
        </div>
        <div class="detach-section">
          <button class="detach-btn" id="detach-window" title="Move pane into its own tmux window (Ctrl-b !)">
            <span class="glyph">↗</span>
            <span class="text">
              <span class="verb">Detach to new window</span>
              <span class="hint">Break pane out of current window</span>
            </span>
          </button>
          <button class="detach-btn" id="detach-split" title="Move pane into another window as a horizontal split">
            <span class="glyph">↔</span>
            <span class="text">
              <span class="verb">Detach to split</span>
              <span class="hint">Move pane into another window as split</span>
            </span>
          </button>
        </div>
        <div class="settings-row">
          <label for="set-color">Color</label>
          <input type="text" id="set-color" value="${escapeHtml(agent.color || '')}"
                 placeholder="orange" autocomplete="off" spellcheck="false" />
        </div>
        <div class="settings-row">
          <label for="set-rename">Rename to</label>
          <input type="text" id="set-rename" value="${escapeHtml(agent.renameTo || '')}"
                 placeholder="${escapeHtml((agent.displayName || id).toUpperCase())}"
                 autocomplete="off" spellcheck="false" />
        </div>
        <div class="settings-row">
          <label for="set-slash">Startup</label>
          <input type="text" id="set-slash" value="${escapeHtml(agent.startupSlash || '')}"
                 placeholder="/gogo (empty = none)" autocomplete="off" spellcheck="false" />
        </div>
      `;

      // Position the panel to the LEFT of the gear orb, vertically centered
      // on the orb. If there's not enough room on the left (e.g. gear was
      // shifted near the left edge of the screen by clamp logic), flip to
      // the right side. Use the orb's RESTING center (stashed at create-time)
      // rather than getBoundingClientRect() — the latter returns interpolated
      // coords if the user clicked mid-emergence-animation.
      const PANEL_W = 280;
      const PANEL_GAP = 14;
      const ORB_HALF = 22;
      const center = gearOrbEl._restCenter || {
        x: gearOrbEl.getBoundingClientRect().left + ORB_HALF,
        y: gearOrbEl.getBoundingClientRect().top  + ORB_HALF
      };
      const tryLeftX = center.x - ORB_HALF - PANEL_GAP - PANEL_W;
      const flipRightX = center.x + ORB_HALF + PANEL_GAP;
      const sx = tryLeftX >= 12 ? tryLeftX : Math.min(flipRightX, window.innerWidth - PANEL_W - 12);
      // Vertically clamp so the panel doesn't poke off the top/bottom of the
      // viewport. The popover's height varies with content (auto-restart row +
      // detach section + 3 text inputs + gaps + padding) — the v2.5 hardcoded
      // PANEL_HALF_H = 145 undersized once the detach-section landed and the
      // STARTUP row clipped at the bottom on Richard's display.
      //
      // Fix: measure the actual rendered height BEFORE applying transforms,
      // derive PANEL_HALF_H from that, then ask main to grow the window
      // enough to fit it. main caps at the display's workArea bottom; if we
      // hit that cap, the inner clamp below shifts the popover's center up
      // so the bottom edge stays in-frame, and the v2.7 max-height +
      // overflow-y on .radial-settings catches whatever still doesn't fit
      // by letting the user scroll inside the popover.
      //
      // Why measure pre-visible: the .visible class triggers a scale + opacity
      // transition; we need natural height, which requires the element to be
      // laid out (display:flex with content) but unscaled. The .radial-settings
      // base CSS uses `transform: ... scale(0.92)` and `opacity: 0` but the
      // bounding-rect ignores transforms and reports the layout box, so
      // measuring here is correct.
      //
      // v2.7: use scrollHeight (the unconstrained content height) instead of
      // getBoundingClientRect().height. scrollHeight ignores the new
      // `max-height: calc(100vh - 80px)` cap, so we still see the natural
      // content size and ask main to grow accordingly. Without this swap, on
      // a fresh launch where window.innerHeight is small, max-height would
      // pre-clamp the measured value and we'd never request a grow.
      // Position offscreen first to allow measurement without a flash.
      layer.style.setProperty('--sx', `-9999px`);
      layer.style.setProperty('--sy', `-9999px`);
      // Force a reflow so the rect is current after innerHTML replacement.
      void layer.offsetHeight;
      const measuredH = layer.scrollHeight || layer.getBoundingClientRect().height || 290;
      const PANEL_HALF_H = Math.ceil(measuredH / 2) + 4;   // +4 for safety pad
      const wantedY = center.y;
      // If the popover (centered at wantedY, half-height = PANEL_HALF_H)
      // would extend below the current window bottom, grow the window down
      // to fit. main caps at workArea.bottom — if we hit that, the inner
      // clamp below moves the popover up to fit whatever room main granted
      // us. Same applies if it would extend above the current window top:
      // we can't grow the window upward (top-left fixed), so the clamp
      // alone handles that side by snapping the popover down.
      // The popover's vertical center clamps to max(wantedY, 12+PANEL_HALF_H)
      // so its top stays >= 12 in-frame. That means when wantedY is small
      // (gear orb sits high in the window — common: the orb's at y=105ish
      // and the popover is ~330px tall), the popover effectively centers at
      // lo = 12 + PANEL_HALF_H and its bottom lands at lo + PANEL_HALF_H + 12
      // = 2*PANEL_HALF_H + 24 = ~measuredH + 24. Previously this code asked
      // main to grow to wantedY + PANEL_HALF_H + 12, which is short by exactly
      // (lo - wantedY) when wantedY < lo — and the bottom of the popover then
      // poked off the window. Compute the post-clamp bottom and grow to that.
      const lo = 12 + PANEL_HALF_H;
      const popoverCenterAfterClamp = Math.max(wantedY, lo);
      const popoverBottomNeeded = popoverCenterAfterClamp + PANEL_HALF_H + 12;
      if (popoverBottomNeeded > window.innerHeight) {
        ipcRenderer.send('resize-window', {
          width: window.innerWidth,
          height: Math.ceil(popoverBottomNeeded)
        });
      }
      // Enable the slide-in transition on the next frame so it actually
      // animates rather than appearing instantly. Two rAF passes — one for
      // the resize-window IPC to land + lay out, one for the new
      // window.innerHeight to be readable. This ensures the clamp uses the
      // grown size, not the pre-grow size (otherwise the popover snaps up
      // even after we asked for more room).
      requestAnimationFrame(() => requestAnimationFrame(() => {
        const sy = Math.max(12 + PANEL_HALF_H, Math.min(window.innerHeight - 12 - PANEL_HALF_H, wantedY));
        layer.style.setProperty('--sx', `${sx}px`);
        layer.style.setProperty('--sy', `${sy}px`);
        layer.classList.add('visible');
      }));

      // ---- Wire up the toggle ----
      const toggle = layer.querySelector('#set-autorestart');
      toggle.addEventListener('change', async () => {
        const next = toggle.checked;
        // Optimistic update — flip local state immediately, roll back on err.
        const prev = agent.autoRestart;
        agent.autoRestart = next;
        const res = await ipcRenderer.invoke('update-agent', { id, patch: { auto_restart: next } });
        if (!res.ok) {
          agent.autoRestart = prev;
          toggle.checked = prev;
          flashTileError(document.getElementById(`btn-${id}`), res.error || 'save failed');
        }
      });

      // ---- Wire up the detach action buttons (v2.5) ----
      // Both invoke main IPCs and flash success/error feedback on the button
      // itself rather than yanking attention to the agent tile. The radial
      // menu stays open so Richard can chain follow-up actions.
      // v2.6: detach actions need a live chq pane to operate on. When the
      // agent isn't running, render the buttons disabled with a tooltip
      // explaining why. Click handlers also gate on .disabled so a poll-tick
      // refresh that re-enables works without rebinding.
      const detachWindowBtn = layer.querySelector('#detach-window');
      const detachSplitBtn = layer.querySelector('#detach-split');
      // Stash original tooltips so refreshOpenRadialDisabledState can restore
      // them when the agent comes back up.
      detachWindowBtn.dataset.origTitle = detachWindowBtn.title;
      detachSplitBtn.dataset.origTitle  = detachSplitBtn.title;
      const initiallyDisabled = !agent.running;
      detachWindowBtn.disabled = initiallyDisabled;
      detachSplitBtn.disabled  = initiallyDisabled;
      if (initiallyDisabled) {
        const msg = `${agent.displayName || id} isn't running in chq — Deploy it first`;
        detachWindowBtn.title = msg;
        detachSplitBtn.title  = msg;
      }
      detachWindowBtn.addEventListener('click', async () => {
        if (detachWindowBtn.disabled) return;
        detachWindowBtn.disabled = true;
        const r = await ipcRenderer.invoke('detach-pane-to-window', id);
        // Re-evaluate against current running state — the IPC may have failed
        // because the agent died between poll and click; respect that, not
        // the optimistic re-enable.
        detachWindowBtn.disabled = !agent.running;
        flashDetachResult(detachWindowBtn, r, id);
      });
      detachSplitBtn.addEventListener('click', async () => {
        if (detachSplitBtn.disabled) return;
        detachSplitBtn.disabled = true;
        const r = await ipcRenderer.invoke('detach-pane-to-split', { id });
        detachSplitBtn.disabled = !agent.running;
        flashDetachResult(detachSplitBtn, r, id);
      });

      // ---- Wire up the three text inputs ----
      // Map renderer-input-id → registry-field name + agent local field name.
      const inputs = [
        { el: layer.querySelector('#set-color'),  patchKey: 'color',         localKey: 'color' },
        { el: layer.querySelector('#set-rename'), patchKey: 'rename_to',     localKey: 'renameTo' },
        { el: layer.querySelector('#set-slash'),  patchKey: 'startup_slash', localKey: 'startupSlash' }
      ];
      inputs.forEach(({ el, patchKey, localKey }) => {
        // Track the last-saved value so we can skip identical re-saves.
        el.dataset.savedValue = el.value;

        const validate = () => {
          // Light validation only — tint border red on obvious garbage,
          // never block save. The user might know something the renderer
          // doesn't.
          let bad = false;
          const v = el.value.trim();
          if (patchKey === 'startup_slash' && v && !/^\/[a-zA-Z][a-zA-Z0-9_-]*/.test(v)) bad = true;
          if (patchKey === 'rename_to' && v && /\s/.test(v)) bad = true;
          el.classList.toggle('invalid', bad);
        };

        const save = async () => {
          const v = el.value.trim();
          if (v === el.dataset.savedValue) return;
          const res = await ipcRenderer.invoke('update-agent', { id, patch: { [patchKey]: v } });
          if (res.ok) {
            el.dataset.savedValue = v;
            // main.js coerces (trim, lowercase for color) and writes the
            // value verbatim to the registry; the returned entry mirrors
            // what's now on disk. Use it so local state matches saved.
            const returned = (res.entry && res.entry[patchKey] !== undefined) ? res.entry[patchKey] : v;
            agent[localKey] = returned;

            // v2.7: when rename_to changes, refresh the dock-label DOM
            // immediately so Richard sees the new label without waiting for
            // a full re-render. labelTextFor() honors any non-empty value
            // (so editing to "XAVIER" really does flip "Xavier" → "XAVIER")
            // and falls back to displayLabelFor() only when the field is
            // cleared.
            if (patchKey === 'rename_to') {
              agent.renameTo = returned;
              const labelEl = document.getElementById(`label-${id}`);
              if (labelEl) labelEl.textContent = labelTextFor(agent);
            }
            // Brief green pulse to confirm the save landed.
            el.classList.add('saved');
            setTimeout(() => el.classList.remove('saved'), 700);
          } else {
            flashTileError(document.getElementById(`btn-${id}`), res.error || 'save failed');
          }
        };

        el.addEventListener('input', validate);
        el.addEventListener('blur', save);
        el.addEventListener('keydown', (ev) => {
          if (ev.key === 'Enter') {
            ev.preventDefault();
            ev.stopPropagation();
            save();
            el.blur();
          }
          if (ev.key === 'Escape') {
            // Revert to last-saved + blur — but DON'T close the radial menu.
            // stopPropagation prevents the document-level Escape handler
            // (which would dismiss the entire menu) from firing.
            ev.preventDefault();
            ev.stopPropagation();
            el.value = el.dataset.savedValue;
            el.classList.remove('invalid');
            el.blur();
          }
        });
      });
    }

    // Inline confirm inside a radial orb — used by the destructive "Close
    // session" action. Morphs the orb wider, swaps the icon for a ✓ ✗ pair,
    // and rewrites the label to "KILL?". Auto-cancels after 4s.
    function requestRadialConfirm(orbEl, labelEl, prompt, onConfirm) {
      orbEl.classList.add('confirming');
      labelEl.classList.add('confirming');
      // Snapshot original label content so we can restore on cancel.
      const originalLabelHtml = labelEl.innerHTML;
      labelEl.innerHTML = `<span class="verb">${escapeHtml(prompt)}</span>`;

      const ok = orbEl.querySelector('.confirm .ok');
      const no = orbEl.querySelector('.confirm .no');
      let cancelled = false;
      const cleanup = () => {
        cancelled = true;
        orbEl.classList.remove('confirming');
        labelEl.classList.remove('confirming');
        labelEl.innerHTML = originalLabelHtml;
        ok.removeEventListener('click', okHandler);
        no.removeEventListener('click', noHandler);
      };
      const okHandler = (ev) => { ev.stopPropagation(); cleanup(); onConfirm(); closeRadialMenu(); };
      const noHandler = (ev) => { ev.stopPropagation(); cleanup(); };
      ok.addEventListener('click', okHandler);
      no.addEventListener('click', noHandler);
      setTimeout(() => { if (!cancelled) cleanup(); }, 4000);
    }

    // ---------------------------------------------------------------------
    // Right-click action implementations
    // ---------------------------------------------------------------------
    async function doChangeCwd(id) {
      const dir = await ipcRenderer.invoke('pick-cwd');
      if (!dir) return;
      const result = await ipcRenderer.invoke('update-agent-cwd', { id, cwd: dir });
      if (!result.ok) {
        const tile = document.getElementById(`btn-${id}`);
        if (tile) flashTileError(tile, result.error);
        return;
      }
      // Refresh so the next radial-menu open shows the updated cwd, and any
      // subsequent Deploy uses the new path.
      await loadAndRender();

      const result = await ipcRenderer.invoke('kill-pane', id);
      if (!result.ok) { flashTileError(tileEl, result.error); return; }
      // Status dot will flip grey on the next 3s poll. Pane is gone — until
      // re-Deploy.
    }

    async function doAttach(id, tileEl) {
      const result = await ipcRenderer.invoke('attach-pane', id);
      if (!result.ok) { flashTileError(tileEl, result.error); return; }

    function toggleAgent(id) {
      agents[id].selected = !agents[id].selected;
      document.getElementById(`btn-${id}`).classList.toggle('active', agents[id].selected);
      updateRecipientSummary();
    }

    function selectAll() {
      const allOn = Object.values(agents).every(a => a.selected);
      Object.values(agents).forEach(a => {
        a.selected = !allOn;
        const btn = document.getElementById(`btn-${a.id}`);
        if (btn) btn.classList.toggle('active', a.selected);
      });
      updateRecipientSummary();
    }

    function updateRecipientSummary() {
      const selected = Object.values(agents).filter(a => a.selected);
      const total = Object.keys(agents).length;
      const summary = document.getElementById('recipient-summary');
      summary.classList.remove('broadcast');

      if (selected.length === 0) {
        summary.innerHTML = '<span class="pill">no recipients</span>';
        document.getElementById('chat-input').placeholder = 'Type a message — pick agents above to send';
      } else if (selected.length === total) {
        summary.classList.add('broadcast');
        summary.innerHTML = '<span class="pill">broadcast → all</span>';
        document.getElementById('chat-input').placeholder = 'Broadcast to every running pane';
      } else {
        summary.innerHTML = selected.map(a => `<span class="pill">${a.displayName}</span>`).join('');
        document.getElementById('chat-input').placeholder = `Message to ${selected.map(a => a.displayName).join(', ')}`;
      }
    }

    // ---------------------------------------------------------------------
    // Send + Deploy
    // ---------------------------------------------------------------------
    function send() {
      const input = document.getElementById('chat-input');
      const msg = input.value;
      if (!msg) return;
      const selected = Object.values(agents).filter(a => a.selected);
      if (selected.length === 0) return;
      const isAll = selected.length === Object.keys(agents).length;
      const payload = selected.map(a => ({ id: a.id, tmuxTarget: a.tmuxTarget }));
      ipcRenderer.send('broadcast-message', { message: msg, selectedAgents: payload, isAll });
      input.value = '';
      // Keep selection so consecutive messages don't require re-clicking. Power-user feel.
    }

    function deploy() {
      const ids = Object.values(agents).filter(a => a.selected).map(a => a.id);
      if (ids.length === 0) return;
      // v2.5: ride the layout-mode along as the `layout` field. main.js
      // whitelists the value to one of LAYOUT_MODES before passing it through
      // to chq-tmux.sh as CHQ_LAYOUT.
      ipcRenderer.send('spawn-agents', { agents: ids, layout: layoutMode });
    }

    // Wire the layout-mode segmented control. Click → set as active, persist,
    // and update layoutMode for the next Deploy. No IPC fired here — the value
    // is only consumed when Deploy runs. After a click we also re-evaluate the
    // mismatch hint so the visual feedback updates immediately (without waiting
    // for the next 3s poll).
    function wireLayoutPills() {
      const pills = document.querySelectorAll('.layout-pill');
      // Initial render: mark the persisted layoutMode as active.
      pills.forEach(p => p.classList.toggle('active', p.dataset.layout === layoutMode));
      pills.forEach(p => {
        p.addEventListener('click', () => {
          const next = p.dataset.layout;
          if (!LAYOUT_MODES.includes(next)) return;
          layoutMode = next;
          try { localStorage.setItem('agentRemoteLayoutMode', next); } catch { /* sandboxed */ }
          pills.forEach(o => o.classList.toggle('active', o.dataset.layout === next));
          applyLayoutMismatchHint();
        });
      });
      // v2.7: prime per-pill / Deploy tooltips at boot so a hover during
      // the first 3s (before pollSessionLayoutOnce returns) still shows the
      // base explainer with no stale text.
      applyLayoutMismatchHint();
    }

    // ---------------------------------------------------------------------
    // Session-layout tracking + tear-down button (Issue 2)
    // ---------------------------------------------------------------------
    // chq-tmux.sh stashes the chosen layout in a tmux session option
    // @chq_layout at start time, and cmd_add reads it back on every Deploy.
    // So once a session is up in (e.g.) `panes` mode, flipping the WINDOWS
    // pill in the panel and re-Deploying re-uses the existing session under
    // the OLD layout — confusing. Surface that with:
    //
    //   1. A tooltip / amber border on .layout-pills when the active pill
    //      differs from the session's @chq_layout (and a session is running).
    //   2. A small ✕ "stop session" button next to the pills that runs
    //      `tmux kill-session -t chq` after an inline ✓✗ confirm.
    //
    // sessionLayout is refreshed on each pollStatusOnce() tick (3s) via the
    // get-session-layout IPC. Empty string = no session.
    let sessionLayout = '';

    async function pollSessionLayoutOnce() {
      try {
        const v = await ipcRenderer.invoke('get-session-layout');
        sessionLayout = String(v || '').trim();
      } catch {
        sessionLayout = '';
      }
      applyLayoutMismatchHint();
      applyStopButtonState();
    }

    // Toggle the .mismatch class on .layout-pills when chq is running AND the
    // active pill differs from the session's stashed layout. When that's true,
    // also set a tooltip on the wrapper explaining why the pill choice isn't
    // taking effect. When chq isn't running or the layouts agree, strip both.
    // Special case: sessionLayout === 'unknown' means the session exists but
    // its layout wasn't stashed (legacy or external session) — we can't tell
    // if there's a mismatch, so don't show the hint.
    //
    // v2.7: ALSO refresh per-pill tooltips here (they live in data-base-title)
    // so each pill keeps its own explainer + a running-state suffix when
    // applicable. Same poll tick that flips the .mismatch class also rewrites
    // the per-pill .title — Richard hovers PANES and sees "Horizontal split-
    // panes…" plus the suffix "Session running in PANES mode" when it applies.
    function applyLayoutMismatchHint() {
      const pills = document.getElementById('layout-pills');
      if (!pills) return;
      const running = sessionLayout && sessionLayout.length > 0;
      const known = running && sessionLayout !== 'unknown';
      const mismatch = known && sessionLayout !== layoutMode;
      pills.classList.toggle('mismatch', mismatch);
      if (mismatch) {
        pills.title = `Session running in ${sessionLayout.toUpperCase()} mode. Stop the session and redeploy to apply ${layoutMode.toUpperCase()}.`;
      } else if (known) {
        pills.title = `Session running in ${sessionLayout.toUpperCase()} mode.`;
      } else if (running) {
        pills.title = 'Session running (layout unknown — started outside AgentRemote).';
      } else {
        pills.title = '';
      }

      // Per-pill tooltips. Suffix added only when chq is running so the
      // base explainer reads cleanly when there's no session yet. Spec
      // wording: "${baseTooltip} | Session running in ${runningLayout} mode
      // — stop and redeploy to apply." Only the active pill gets the
      // "stop and redeploy" hint when there's a mismatch — the inactive
      // pills get a simpler "Session running in X mode" suffix.
      const pillEls = pills.querySelectorAll('.layout-pill');
      pillEls.forEach(p => {
        const base = p.dataset.baseTitle || p.title || '';
        let suffix = '';
        if (known) {
          if (mismatch && p.classList.contains('active')) {
            suffix = ` | Session running in ${sessionLayout.toUpperCase()} mode — stop and redeploy to apply.`;
          } else {
            suffix = ` | Session running in ${sessionLayout.toUpperCase()} mode.`;
          }
        } else if (running) {
          suffix = ' | Session running (layout unknown — started outside AgentRemote).';
        }
        p.title = base + suffix;
      });

      // Also refresh the Deploy button — its tooltip surfaces the current
      // layout mode so Richard knows what'll spawn before clicking. When a
      // running session exists, the suffix mirrors the pills so the same
      // "stop and redeploy" hint surfaces here too.
      const deployBtn = document.getElementById('deploy-btn');
      if (deployBtn) {
        let t = `Spawn selected agents in tmux (current layout: ${layoutMode.toUpperCase()})`;
        if (mismatch) {
          t += ` — session is in ${sessionLayout.toUpperCase()}; stop and redeploy to apply.`;
        }
        deployBtn.title = t;
      }
    }

    // Reflect session presence on the stop button. Running → enabled + warning
    // tooltip; not running → dimmed + "no session" tooltip. Clicks on the
    // disabled button are ignored.
    function applyStopButtonState() {
      const btn = document.getElementById('stop-session-btn');
      if (!btn) return;
      const running = sessionLayout && sessionLayout.length > 0;
      btn.classList.toggle('disabled', !running);
      if (!running) {
        btn.title = 'Tear down the chq tmux session (no session running)';
      } else if (sessionLayout === 'unknown') {
        btn.title = 'Tear down the chq tmux session';
      } else {
        btn.title = `Tear down the chq tmux session (${sessionLayout.toUpperCase()})`;
      }
    }

    // Wire the inline confirm + kill-session IPC on the stop-session button.
    // Pattern mirrors requestRadialConfirm but at button scale: click swaps
    // glyph for ✓✗ pair, ✓ fires IPC, ✗ or 4s timeout cancels. After kill we
    // optimistically blank sessionLayout so the next poll doesn't re-show the
    // mismatch hint mid-tear-down.
    let stopBtnConfirmTimer = null;
    function wireStopSessionButton() {
      const btn = document.getElementById('stop-session-btn');
      if (!btn) return;
      const ok = btn.querySelector('.confirm .ok');
      const no = btn.querySelector('.confirm .no');

      const cleanup = () => {
        btn.classList.remove('confirming');
        if (stopBtnConfirmTimer) { clearTimeout(stopBtnConfirmTimer); stopBtnConfirmTimer = null; }
      };

      btn.addEventListener('click', (ev) => {
        ev.stopPropagation();
        // Disabled (no session) → no-op. Hover tooltip already says why.
        if (btn.classList.contains('disabled')) return;
        // Already in confirm state → ignore the wrapper click; ✓/✗ have their
        // own handlers which fire via stopPropagation.
        if (btn.classList.contains('confirming')) return;
        btn.classList.add('confirming');
        if (stopBtnConfirmTimer) clearTimeout(stopBtnConfirmTimer);
        stopBtnConfirmTimer = setTimeout(cleanup, 4000);
      });

      ok.addEventListener('click', async (ev) => {
        ev.stopPropagation();
        cleanup();
        const result = await ipcRenderer.invoke('kill-session');
        if (!result || !result.ok) {
          // Surface failure on the button itself (red flash via title hint).
          btn.title = `Stop failed: ${(result && result.error) || 'unknown'}`;
          setTimeout(applyStopButtonState, 2200);
          return;
        }
        // Optimistic: clear local state so the UI reflects "no session" before
        // the next poll runs. pollStatusOnce will reconcile in 3s.
        sessionLayout = '';
        applyLayoutMismatchHint();
        applyStopButtonState();
        // Force a status repoll so the dock dots flip grey within one paint
        // rather than waiting for the next 3s tick.
        pollStatusOnce();
      });

      no.addEventListener('click', (ev) => {
        ev.stopPropagation();
        cleanup();
      });

      // Outside-click cancellation while in confirm state — keeps the pattern
      // consistent with the radial confirm.
      document.addEventListener('mousedown', (ev) => {
        if (!btn.classList.contains('confirming')) return;
        if (btn.contains(ev.target)) return;
        cleanup();
      }, true);
    }

    function toggleAddForm() {

        document.getElementById('f-id').focus();

    let pickedAvatarPath = null;
    async function pickAvatar() {
      const file = await ipcRenderer.invoke('pick-svg');
      if (file) {
        pickedAvatarPath = file;
        const parts = file.split('/');
        document.getElementById('f-avatar').value = parts[parts.length - 1];
      }
    }

    async function submitAdd() {
      const errEl = document.getElementById('f-error');
      errEl.textContent = '';
      const payload = {
        id: document.getElementById('f-id').value.trim(),
        displayName: document.getElementById('f-name').value.trim(),
        cwd: document.getElementById('f-cwd').value.trim(),
        color: document.getElementById('f-color').value,
        startupSlash: document.getElementById('f-slash').value.trim(),
        avatarSrc: pickedAvatarPath
      };
      const result = await ipcRenderer.invoke('add-agent', payload);
      if (!result.ok) { errEl.textContent = result.error || 'unknown error'; return; }
      // Reset form, close, reload.
      ['f-id', 'f-name', 'f-cwd', 'f-avatar'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('f-slash').value = '/gogo';
      pickedAvatarPath = null;
      document.body.classList.remove('adding');
      await loadAndRender();
    }

    async function doRemove(id, tileEl) {
      const result = await ipcRenderer.invoke('remove-agent', id);
      if (!result.ok) { flashTileError(tileEl, result.error); return; }
      await loadAndRender();
    }

    async function doRestart(id, tileEl) {
      const result = await ipcRenderer.invoke('restart-agent', id);
      if (!result.ok) { flashTileError(tileEl, result.error); return; }
      // SIGINT sent — restart loop respawns claude in ~3s. Status dot will
      // flicker grey then come back green on the next poll cycle.
    }

    // Flash success/error feedback on a detach button inside the settings
    // popover. Success: brief green border + console log of what happened.
    // Error: red border + flash the error string in the button's hint slot
    // for 2s before reverting. Keeps the popover open either way so Richard
    // can see the result without losing context.
    function flashDetachResult(btnEl, result, agentId) {
      const hintEl = btnEl.querySelector('.text .hint');
      const originalHint = hintEl ? hintEl.textContent : '';
      if (result && result.ok) {
        btnEl.classList.add('flash-ok');
        if (hintEl) {
          if (result.newWindow)      hintEl.textContent = `→ ${result.newWindow}`;
          else if (result.joinedTo)  hintEl.textContent = `→ ${result.joinedTo}`;
          else                       hintEl.textContent = 'done';
        }
        setTimeout(() => {
          btnEl.classList.remove('flash-ok');
          if (hintEl) hintEl.textContent = originalHint;
        }, 1800);
      } else {
        btnEl.classList.add('flash-err');
        if (hintEl) hintEl.textContent = String((result && result.error) || 'failed').slice(0, 36);
        // Also flash the agent tile so the failure registers even if the user's
        // eyes were on the dock rather than the popover.
        const tileBtn = document.getElementById(`btn-${agentId}`);
        if (tileBtn) flashTileError(tileBtn, (result && result.error) || 'failed');
        setTimeout(() => {
          btnEl.classList.remove('flash-err');
          if (hintEl) hintEl.textContent = originalHint;
        }, 2200);
      }
    }

    // Briefly flash an error tooltip beneath the tile when an action fails
    // (e.g. trying to restart an agent that isn't running). Avoids alert().
    function flashTileError(tileEl, msg) {
      const overlay = tileEl.querySelector('.confirm-overlay');
      if (!overlay) return;
      const label = overlay.querySelector('.label');
      const prev = label.textContent;
      label.textContent = String(msg || 'failed').slice(0, 28);
      label.style.color = '#ff7090';
      tileEl.classList.add('confirming');
      setTimeout(() => {
        tileEl.classList.remove('confirming');
        label.textContent = prev;
        label.style.color = '';
      }, 1800);
    }

    // Edit-mode toggle. Off by default. Clicking the pencil/Edit button puts
    // the panel into a configuration view where the destructive badges
    // (× remove, ⟳ restart) are visible. Tile-body clicks are inert in this
    // mode so a stray miss doesn't toggle selection. Click the button again
    // (or trigger an action that re-renders) to exit.
    function toggleEditMode() {
      const on = !document.body.classList.contains('editing');
      document.body.classList.toggle('editing', on);
      document.getElementById('edit-btn').classList.toggle('active', on);
      // Cancel any open confirm when leaving edit mode.
      if (!on) {
        document.querySelectorAll('.agent-btn.confirming').forEach(el => el.classList.remove('confirming'));
      }
    }

    // ---------------------------------------------------------------------
    // Status polling — updates the green/grey dot per agent
    // ---------------------------------------------------------------------
    async function pollStatusOnce() {
      try {
        const statuses = await ipcRenderer.invoke('pane-status');
        statuses.forEach(s => {
          if (!agents[s.id]) return;
          agents[s.id].running = s.running;
          const dot = document.getElementById(`dot-${s.id}`);
          if (dot) dot.classList.toggle('on', s.running);
        });
      } catch (err) {
        // Quiet: if tmux isn't running, all dots stay grey, nothing to do.
      }
      // After the dock-dot pass, refresh any open radial menu so newly-stopped
      // (or newly-started) agents have their orbs flipped to the right
      // disabled/enabled state without the user re-opening the menu.
      refreshOpenRadialDisabledState();
    }

    function startStatusPolling() {
      if (statusTimer) return;
      // Poll pane-status AND session-layout together so the layout-mismatch
      // hint and the stop-session button update on the same cadence as the
      // dock dots. Both are cheap (single tmux call each, no shell). Run
      // both immediately on startup so the panel doesn't show stale state
      // for the first 3s after launch.
      const tick = () => { pollStatusOnce(); pollSessionLayoutOnce(); };
      tick();
      statusTimer = setInterval(tick, 3000);
    }

    // ---------------------------------------------------------------------
    // Wire-up
    // ---------------------------------------------------------------------
    document.getElementById('send-btn').addEventListener('click', send);
    document.getElementById('chat-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') send(); });
    document.getElementById('edit-btn').addEventListener('click', toggleEditMode);
    document.getElementById('select-all-btn').addEventListener('click', selectAll);
    document.getElementById('deploy-btn').addEventListener('click', deploy);
    document.getElementById('f-cwd-pick').addEventListener('click', pickCwd);
    document.getElementById('f-avatar-pick').addEventListener('click', pickAvatar);
    document.getElementById('f-cancel').addEventListener('click', () => { document.body.classList.remove('adding'); syncWindowSize(); });
    document.getElementById('f-submit').addEventListener('click', submitAdd);

    // v2.5: wire the layout-mode segmented control. Reads localStorage on
    // boot for the persisted choice; clicks update layoutMode and persist.
    wireLayoutPills();
    // v2.6: wire the tear-down session button (✕ next to layout pills).
    wireStopSessionButton();

    loadAndRender().then(startStatusPolling);
    window.addEventListener('resize', syncWindowSize);
  </script>
</body>
</html>
