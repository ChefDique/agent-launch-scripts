<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    /*
      Personal Chat Central — cinematic glassmorphism, always-visible chat
      input, dynamically-sized panel. Single dark panel with three rows:
        1. agent dock (avatars + status dots + add button)
        2. chat input (always visible)
        3. send / recipient summary
    */
    :root {
      --bg-deep:       rgba(8, 8, 14, 0.72);
      --bg-glass:      rgba(20, 20, 30, 0.55);
      --bg-input:      rgba(255, 255, 255, 0.04);
      --border-soft:   rgba(255, 255, 255, 0.08);
      --border-medium: rgba(255, 255, 255, 0.16);
      --text-primary:  #f4f4f8;
      --text-muted:    #8a8a98;
      --accent:        #e07c4c;     /* anthropic orange */
      --accent-glow:   rgba(224, 124, 76, 0.55);
      --status-on:     #34d058;
      --status-off:    rgba(255, 255, 255, 0.18);
      --xavier:        #00f2ff;
      --lucius:        #ffaa00;
      --gekko:         #00ff88;
      --swarmy:        #ff77cc;
      --claude:        #e07c4c;
      --ease:          cubic-bezier(0.16, 1, 0.3, 1);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      /* Body / chat / inputs: monospace. Reads as a terminal/dev tool, fits
         the agent-launcher feel. Falls through to system mono if JetBrains
         Mono isn't installed. */
      font-family: 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* Reusable for any element that wants the humanist-sans pairing —
       names, captions, anything that's not chat/code text. */
    .ui-sans, .agent-label, .pill, .util-btn, .form-row label, .form-error {
      font-family: 'Inter', -apple-system, 'SF Pro Text', system-ui, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 14px;
      -webkit-app-region: drag;
    }

    /* ---------------------------------------------------------------------
       Panel
       --------------------------------------------------------------------- */
    .panel {
      width: 100%;
      max-width: 720px;
      background: var(--bg-deep);
      backdrop-filter: blur(40px) saturate(140%);
      -webkit-backdrop-filter: blur(40px) saturate(140%);
      border: 1px solid var(--border-medium);
      border-radius: 22px;
      box-shadow:
        0 30px 80px rgba(0, 0, 0, 0.55),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
      padding: 14px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
      overflow: hidden;
    }

    /* Subtle aurora behind glass — barely visible, just enough lift */
    .panel::before {
      content: '';
      position: absolute;
      inset: -50%;
      background:
        radial-gradient(circle at 20% 20%, rgba(224, 124, 76, 0.10), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(0, 242, 255, 0.07), transparent 40%);
      pointer-events: none;
      z-index: 0;
    }
    .panel > * { position: relative; z-index: 1; }

    /* ---------------------------------------------------------------------
       Top row: agent dock
       --------------------------------------------------------------------- */
    .dock {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: flex-start;
      /* Container itself stays draggable (inherits drag from body/.panel)
         so the gaps between tiles and any unused right-side space are valid
         grab regions. Each interactive child (.agent-btn, .add-btn) opts
         OUT via `no-drag` below. */
    }

    /* Tile wrapper: stacks the avatar button + the small text label below.
       The button keeps its 46x46 footprint; the label adds ~14px below. */
    .agent-tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      width: 46px;
    }

    .agent-label {
      /* font-family inherited from the .ui-sans group above */
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.4px;
      color: rgba(255, 255, 255, 0.62);
      max-width: 60px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: center;
      line-height: 1.2;
      transition: color 0.2s var(--ease);
      pointer-events: none;
      user-select: none;
    }
    .agent-tile:hover .agent-label { color: rgba(255, 255, 255, 0.92); }
    /* Label brightens when its avatar is active (selected). :has() is fine
       in Electron's Chromium. */
    .agent-tile:has(.agent-btn.active) .agent-label { color: var(--text-primary); }

    .agent-btn {
      position: relative;
      width: 46px;
      height: 46px;
      border-radius: 14px;
      border: 1px solid var(--border-soft);
      background: var(--bg-glass);
      padding: 0;
      cursor: pointer;
      transition: transform 0.25s var(--ease),
                  border-color 0.25s var(--ease),
                  box-shadow 0.25s var(--ease),
                  background 0.25s var(--ease);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
      -webkit-app-region: no-drag;
    }
    .agent-btn:hover { transform: translateY(-2px); background: rgba(255, 255, 255, 0.07); }
    .agent-btn .avatar { width: 100%; height: 100%; pointer-events: none; border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .agent-btn .avatar object,
    .agent-btn .avatar img { width: 100%; height: 100%; pointer-events: none; }
    .agent-btn .avatar.fallback {
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 0.5px;
      color: var(--text-primary);
      background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
    }

    .agent-btn.active { border-color: var(--accent); box-shadow: 0 0 24px var(--accent-glow), inset 0 0 0 1px var(--accent); }
    .agent-btn.active.xavier { border-color: var(--xavier); box-shadow: 0 0 24px rgba(0, 242, 255, 0.55); }
    .agent-btn.active.lucius { border-color: var(--lucius); box-shadow: 0 0 24px rgba(255, 170, 0, 0.55); }
    .agent-btn.active.gekko  { border-color: var(--gekko);  box-shadow: 0 0 24px rgba(0, 255, 136, 0.55); }
    .agent-btn.active.swarmy { border-color: var(--swarmy); box-shadow: 0 0 24px rgba(255, 119, 204, 0.55); }
    .agent-btn.active.claude { border-color: var(--claude); box-shadow: 0 0 24px rgba(224, 124, 76, 0.55); }

    /* Status dot (bottom-right, anchored outside the avatar). */
    .status-dot {
      position: absolute;
      bottom: -2px;
      right: -2px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--status-off);
      border: 2px solid var(--bg-deep);
      transition: background 0.3s var(--ease), box-shadow 0.3s var(--ease);
    }
    .status-dot.on { background: var(--status-on); box-shadow: 0 0 8px rgba(52, 208, 88, 0.7); }

    /* ---------------------------------------------------------------------
       Edit-mode badge — only visible when body.editing is on.
       --------------------------------------------------------------------- */
    /* One badge per tile, hidden by default:
         .remove-badge (top-right, red) — destructive, deletes from registry
       Restart / kill / cwd-change / attach live in the right-click radial
       menu, not here. Edit mode's only job is to gate registry deletion.
       Fixes the "× looked harmless, deleted claude entry on a stray click"
       trap by requiring deliberate Edit-mode entry before × is even shown,
       plus an inline ✓/✗ confirm before fire. */
    .badge {
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      line-height: 16px;
      text-align: center;
      cursor: pointer;
      opacity: 0;
      transform: scale(0.6);
      pointer-events: none;
      user-select: none;
      transition: opacity 0.2s var(--ease), transform 0.2s var(--ease);
      border: 1px solid rgba(0, 0, 0, 0.35);
      -webkit-app-region: no-drag;
    }
    .remove-badge {
      top: -6px;
      right: -6px;
      background: rgba(255, 60, 90, 0.92);
    }
    .remove-badge:hover { background: rgba(255, 80, 110, 1); }
    body.editing .agent-btn .badge { opacity: 1; transform: scale(1); pointer-events: auto; }

    /* In edit mode, the tile itself shows it's not selectable (subtle
       crosshatch/flicker not needed; just dim the active glow and add a
       dashed border to signal "this is a configuration view"). */
    body.editing .agent-btn { cursor: default; }
    body.editing .agent-btn:hover { transform: none; background: var(--bg-glass); }
    body.editing .agent-btn { border-style: dashed; border-color: var(--border-medium); }
    body.editing .agent-btn.active { box-shadow: none; }

    /* Inline confirm overlay — covers the avatar with a check / cross pair
       when a destructive action is requested. Same aesthetic, no native
       dialog. */
    .confirm-overlay {
      position: absolute;
      inset: 0;
      border-radius: 14px;
      background: rgba(8, 8, 14, 0.92);
      backdrop-filter: blur(2px);
      display: none;
      align-items: center;
      justify-content: center;
      gap: 4px;
      z-index: 5;
    }
    .agent-btn.confirming .confirm-overlay { display: flex; }
    .confirm-overlay .ok,
    .confirm-overlay .no {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      font-size: 11px;
      font-weight: 700;
      line-height: 18px;
      text-align: center;
      cursor: pointer;
      border: 1px solid rgba(0, 0, 0, 0.4);
      -webkit-app-region: no-drag;
    }
    .confirm-overlay .ok { background: var(--status-on); color: #062b10; }
    .confirm-overlay .no { background: rgba(255, 255, 255, 0.18); color: #fff; }
    .confirm-overlay .ok:hover  { box-shadow: 0 0 10px rgba(52, 208, 88, 0.6); }
    .confirm-overlay .no:hover  { background: rgba(255, 255, 255, 0.28); }
    .confirm-overlay .label {
      position: absolute;
      bottom: -16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      color: var(--text-muted);
      white-space: nowrap;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .add-btn {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      border: 1px dashed var(--border-medium);
      background: transparent;
      color: var(--text-muted);
      font-size: 22px;
      font-weight: 300;
      cursor: pointer;
      transition: all 0.25s var(--ease);
      -webkit-app-region: no-drag;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .add-btn:hover { color: var(--accent); border-color: var(--accent); background: rgba(224, 124, 76, 0.08); transform: translateY(-2px); }

    /* ---------------------------------------------------------------------
       Middle: chat input
       --------------------------------------------------------------------- */
    .chat-row {
      display: flex;
      align-items: center;
      gap: 10px;
      /* Container stays draggable. The two interactive children (.chat-wrap
         around the input and .send-btn) opt out via no-drag below so the
         gap between them is a valid grab region. */
    }
    .chat-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      background: var(--bg-input);
      border: 1px solid var(--border-soft);
      border-radius: 14px;
      padding: 0 14px;
      height: 42px;
      transition: border-color 0.25s var(--ease), background 0.25s var(--ease);
      -webkit-app-region: no-drag;
    }
    .chat-wrap:focus-within { border-color: var(--accent); background: rgba(255, 255, 255, 0.06); }
    #chat-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 14px;
      letter-spacing: 0.1px;
    }
    #chat-input::placeholder { color: var(--text-muted); }

    .send-btn {
      height: 42px;
      padding: 0 18px;
      border-radius: 14px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s var(--ease);
      -webkit-app-region: no-drag;
    }
    .send-btn:hover { background: #ec8957; box-shadow: 0 0 22px var(--accent-glow); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }

    /* ---------------------------------------------------------------------
       Bottom: recipient summary + utility buttons
       --------------------------------------------------------------------- */
    .meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.4px;
      /* Container stays draggable. .util-buttons opts out via no-drag below.
         The recipient-summary text is also marked no-drag so Richard can
         still triple-click to select pill text without the click counting
         as a drag start. */
      min-height: 18px;
    }
    .recipient-summary {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      -webkit-app-region: no-drag;
    }
    .recipient-summary .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-primary);
      margin-right: 4px;
      font-size: 10px;
    }
    .recipient-summary.broadcast .pill { background: rgba(224, 124, 76, 0.18); color: var(--accent); }
    .util-buttons { display: flex; gap: 6px; -webkit-app-region: no-drag; }
    .util-btn {
      background: transparent;
      border: 1px solid var(--border-soft);
      color: var(--text-muted);
      font-size: 10px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 4px 9px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s var(--ease);
    }
    .util-btn:hover { color: var(--text-primary); border-color: var(--border-medium); }
    .util-btn.active { color: var(--accent); border-color: var(--accent); }

    /* ---------------------------------------------------------------------
       Add-agent inline form (expandable)
       --------------------------------------------------------------------- */
    .add-form {
      display: none;
      flex-direction: column;
      gap: 8px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-soft);
      border-radius: 12px;
      -webkit-app-region: no-drag;
    }
    body.adding .add-form { display: flex; }

    .form-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .form-row label {
      width: 88px;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }
    .form-row input,
    .form-row select {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border-soft);
      border-radius: 8px;
      padding: 7px 10px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s var(--ease);
    }
    .form-row input:focus, .form-row select:focus { border-color: var(--accent); }
    .form-row .pick-btn {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border-soft);
      color: var(--text-muted);
      font-size: 10px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 6px 10px;
      border-radius: 8px;
      cursor: pointer;
    }
    .form-row .pick-btn:hover { color: var(--text-primary); border-color: var(--border-medium); }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 4px;
    }
    .form-actions button {
      background: transparent;
      border: 1px solid var(--border-medium);
      color: var(--text-primary);
      font-size: 11px;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      padding: 7px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s var(--ease);
    }
    .form-actions .submit { background: var(--accent); border-color: var(--accent); }
    .form-actions .submit:hover { background: #ec8957; box-shadow: 0 0 16px var(--accent-glow); }
    .form-actions button:hover { border-color: var(--text-primary); }

    .form-error {
      color: #ff7090;
      font-size: 11px;
      padding-top: 4px;
    }

    /* ---------------------------------------------------------------------
       Right-click radial fan menu (per-agent context menu)
       --------------------------------------------------------------------- */
    /* The menu lives at #radial-menu, a fixed-position container we move to
       the right-clicked tile. Items are positioned absolutely relative to
       that container; they animate in from --start-* and rest at --end-*
       (CSS custom properties set per-item by JS). The container is hidden
       by default (display:none) and shown by toggling .open. */
    #radial-menu {
      position: fixed;
      width: 0;
      height: 0;
      pointer-events: none;
      z-index: 1000;
      display: none;
    }
    #radial-menu.open { display: block; }

    .radial-item {
      position: absolute;
      top: 0;
      left: 0;
      transform: translate(var(--start-x, 0px), var(--start-y, 0px)) scale(0.4);
      opacity: 0;
      pointer-events: auto;
      -webkit-app-region: no-drag;

      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px 7px 9px;
      background: rgba(18, 18, 26, 0.88);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 12px;
      box-shadow:
        0 12px 36px rgba(0, 0, 0, 0.55),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
      color: var(--text-primary);
      font-family: 'Inter', -apple-system, 'SF Pro Text', system-ui, sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.3px;
      cursor: pointer;
      white-space: nowrap;
      transition:
        transform 0.32s var(--ease),
        opacity 0.28s var(--ease),
        border-color 0.18s var(--ease),
        box-shadow 0.18s var(--ease),
        background 0.18s var(--ease);
      user-select: none;
    }
    #radial-menu.open .radial-item {
      transform: translate(var(--end-x, 0px), var(--end-y, 0px)) scale(1);
      opacity: 1;
    }
    .radial-item:hover {
      border-color: var(--accent);
      background: rgba(28, 28, 38, 0.92);
      box-shadow:
        0 0 24px var(--accent-glow),
        0 12px 36px rgba(0, 0, 0, 0.55);
    }
    .radial-item .icon {
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: var(--accent);
      flex-shrink: 0;
    }
    .radial-item .label {
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .radial-item .label .key {
      color: var(--text-muted);
      font-size: 9.5px;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      margin-right: 6px;
    }
    .radial-item.danger:hover {
      border-color: rgba(255, 80, 110, 0.85);
      box-shadow:
        0 0 24px rgba(255, 60, 90, 0.45),
        0 12px 36px rgba(0, 0, 0, 0.55);
    }
    .radial-item.danger .icon { color: rgba(255, 110, 130, 0.95); }

    /* Inline confirm-replace inside a radial item (for the destructive
       "Close active sessions" action). Replaces the item's content with a
       compact ✓ ✗ pair without changing the item's position. */
    .radial-item.confirming { padding: 6px 10px; }
    .radial-item .confirm {
      display: none;
      align-items: center;
      gap: 6px;
    }
    .radial-item.confirming .icon,
    .radial-item.confirming .label { display: none; }
    .radial-item.confirming .confirm { display: flex; }
    .radial-item .confirm .ok,
    .radial-item .confirm .no {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      font-size: 11px;
      font-weight: 700;
      line-height: 20px;
      text-align: center;
      cursor: pointer;
      border: 1px solid rgba(0, 0, 0, 0.4);
    }
    .radial-item .confirm .ok { background: var(--status-on); color: #062b10; }
    .radial-item .confirm .no { background: rgba(255, 255, 255, 0.18); color: #fff; }
    .radial-item .confirm .prompt {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.4px;
      text-transform: uppercase;
      margin-right: 4px;
    }
  </style>
</head>
<body>
  <div class="panel" id="panel">
    <!-- Row 1: agent dock -->
    <div class="dock" id="dock"></div>

    <!-- Add agent form (hidden unless body.adding) -->
    <div class="add-form" id="add-form">
      <div class="form-row">
        <label>id</label>
        <input id="f-id" placeholder="lowercase, no spaces" />
      </div>
      <div class="form-row">
        <label>name</label>
        <input id="f-name" placeholder="display name (claude -n flag)" />
      </div>
      <div class="form-row">
        <label>cwd</label>
        <input id="f-cwd" placeholder="~/path/to/project" />
        <button class="pick-btn" id="f-cwd-pick">Pick</button>
      </div>
      <div class="form-row">
        <label>color</label>
        <select id="f-color">
          <option value="cyan">cyan</option>
          <option value="green">green</option>
          <option value="yellow">yellow</option>
          <option value="orange">orange</option>
          <option value="red">red</option>
          <option value="pink">pink</option>
          <option value="purple">purple</option>
          <option value="blue">blue</option>
        </select>
      </div>
      <div class="form-row">
        <label>startup</label>
        <input id="f-slash" value="/gogo" />
      </div>
      <div class="form-row">
        <label>avatar</label>
        <input id="f-avatar" placeholder="optional .svg path" readonly />
        <button class="pick-btn" id="f-avatar-pick">Pick</button>
      </div>
      <div class="form-error" id="f-error"></div>
      <div class="form-actions">
        <button id="f-cancel">Cancel</button>
        <button class="submit" id="f-submit">Create</button>
      </div>
    </div>

    <!-- Row 2: chat input -->
    <div class="chat-row">
      <div class="chat-wrap">
        <input id="chat-input" placeholder="Type to selected agents — or select all to broadcast" autocomplete="off" />
      </div>
      <button class="send-btn" id="send-btn">Send</button>
    </div>

    <!-- Row 3: recipient summary + utility -->
    <div class="meta-row">
      <div class="recipient-summary" id="recipient-summary">
        <span class="pill">no agents selected</span>
      </div>
      <div class="util-buttons">
        <button class="util-btn" id="edit-btn" title="Edit mode — reveal × buttons to remove agents from registry">Edit</button>
        <button class="util-btn" id="select-all-btn" title="Select all">All</button>
        <button class="util-btn" id="deploy-btn" title="Spawn selected agents in tmux">Deploy</button>
      </div>
    </div>
  </div>

  <!-- Right-click radial menu — fixed-positioned container, items animate
       outward from a center point that JS sets to the right-clicked tile.
       Hidden by default; .open class triggers the staggered fan-out. -->
  <div id="radial-menu" aria-hidden="true"></div>

  <script>
    const { ipcRenderer } = require('electron');

    // ---------------------------------------------------------------------
    // State
    // ---------------------------------------------------------------------
    let agents = {};        // id -> { id, displayName, tmuxTarget, color, avatar, selected, running }
    let agentOrder = [];    // preserve registry order
    let statusTimer = null;

    // ---------------------------------------------------------------------
    // Layout: measure DOM, ask main to setContentSize
    // ---------------------------------------------------------------------
    function syncWindowSize() {
      // Run twice: once now, once after the next frame, to handle late
      // layout (object SVG load, font swap, etc).
      const measure = () => {
        const panel = document.getElementById('panel');
        if (!panel) return;
        const rect = panel.getBoundingClientRect();
        // Body has 14px padding all around; window content size needs that too.
        const w = Math.ceil(rect.width) + 28;
        const h = Math.ceil(rect.height) + 28;
        ipcRenderer.send('resize-window', { width: w, height: h });
      };
      measure();
      requestAnimationFrame(measure);
    }

    // ---------------------------------------------------------------------
    // Render
    // ---------------------------------------------------------------------
    async function loadAndRender() {
      let registry = [];
      try { registry = await ipcRenderer.invoke('get-agents'); }
      catch (err) { console.error('failed to load registry:', err); }

      if (!registry || registry.length === 0) {
        registry = [
          { id: 'xavier', displayName: 'Xavier', tmuxTarget: 'xavier', avatar: 'xavier.svg' },
          { id: 'lucius', displayName: 'Lucius', tmuxTarget: 'lucius', avatar: 'lucius.svg' },
          { id: 'gekko',  displayName: 'Gekko',  tmuxTarget: 'gekko',  avatar: 'gekko.svg' },
          { id: 'swarmy', displayName: 'overlordswarmy', tmuxTarget: 'overlordswarmy', avatar: 'swarmy.svg' },
          { id: 'claude', displayName: 'Claude', tmuxTarget: 'claude', avatar: 'claude.svg' }
        ];
      }

      // Preserve selection state across reloads.
      const prevSelected = new Set(Object.values(agents).filter(a => a.selected).map(a => a.id));
      agents = {};
      agentOrder = [];
      registry.forEach(a => {
        agents[a.id] = { ...a, selected: prevSelected.has(a.id), running: false };
        agentOrder.push(a.id);
      });

      renderDock();
      updateRecipientSummary();
      syncWindowSize();
      pollStatusOnce();
    }

    // Cosmetic-only alias map for tile labels. The registry's display_name
    // for swarmy is "overlordswarmy" (load-bearing — it's the claude -n flag
    // value used by ps-grep detection and pane title resolution), but at
    // 10px / 60px max it gets visually clipped. Show a friendlier label.
    // Add other aliases here if future agents have similarly long names.
    const LABEL_ALIASES = {
      overlordswarmy: 'Swarmy'
    };
    function displayLabelFor(agent) {
      const dn = agent.displayName || agent.id || '';
      return LABEL_ALIASES[dn.toLowerCase()] || dn;
    }

    function renderDock() {
      const dock = document.getElementById('dock');
      dock.innerHTML = '';
      agentOrder.forEach(id => {
        const a = agents[id];
        const btn = document.createElement('button');
        btn.className = `agent-btn ${id}` + (a.selected ? ' active' : '');
        btn.id = `btn-${id}`;
        btn.title = a.displayName;
        btn.addEventListener('click', (ev) => {
          // Edit mode disables tile-body selection — only badges and overlay
          // controls are interactive. This prevents the "click a tile in edit
          // mode and accidentally toggle selection" cross-talk.
          if (document.body.classList.contains('editing')) return;
          // Don't toggle if the click was on a badge or overlay control.
          const t = ev.target;
          if (t && t.classList) {
            if (t.classList.contains('badge') ||
                t.classList.contains('remove-badge') ||
                t.classList.contains('ok') ||
                t.classList.contains('no') ||
                t.classList.contains('confirm-overlay')) return;
          }
          toggleAgent(id);
        });
        // Right-click → open radial fan menu for this agent. Suppress the
        // default Electron context menu (Reload / Quit) so it doesn't compete.
        btn.addEventListener('contextmenu', (ev) => {
          ev.preventDefault();
          ev.stopPropagation();
          openRadialMenu(id, btn);
        });

        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        if (a.avatar) {
          const obj = document.createElement('object');
          obj.setAttribute('data', `assets/${a.avatar}`);
          obj.setAttribute('type', 'image/svg+xml');
          obj.addEventListener('load', syncWindowSize);
          avatar.appendChild(obj);
        } else {
          avatar.classList.add('fallback');
          avatar.textContent = (a.displayName || a.id).slice(0, 1).toUpperCase();
        }
        btn.appendChild(avatar);

        const dot = document.createElement('div');
        dot.className = 'status-dot' + (a.running ? ' on' : '');
        dot.id = `dot-${id}`;
        btn.appendChild(dot);

        // Remove badge (right, red). Destructive — deletes from agents.json.
        // ONLY visible in edit mode AND requires inline confirm. This is now
        // the sole job of edit mode: gating registry-deletion behind an
        // explicit toggle. Restart / kill / cwd-change / attach all moved to
        // the right-click radial menu so they don't compete for the same
        // edit-mode real estate.
        const x = document.createElement('div');
        x.className = 'badge remove-badge';
        x.textContent = '×';
        x.title = 'Remove from registry';
        x.addEventListener('click', (ev) => {
          ev.stopPropagation();
          requestConfirm(btn, 'remove', () => doRemove(id, btn));
        });
        btn.appendChild(x);

        // Inline confirm overlay (the tile-takeover ✓ ✗ pair). Hidden until
        // requestConfirm() flips body.confirming on this tile.
        const overlay = document.createElement('div');
        overlay.className = 'confirm-overlay';
        const ok = document.createElement('div');
        ok.className = 'ok';
        ok.textContent = '✓';
        const no = document.createElement('div');
        no.className = 'no';
        no.textContent = '✗';
        const label = document.createElement('div');
        label.className = 'label';
        label.textContent = '';
        overlay.appendChild(ok);
        overlay.appendChild(no);
        overlay.appendChild(label);
        btn.appendChild(overlay);

        // Wrap the avatar button + a small text label below it. The label
        // shows the registry display_name, but with one alias: "overlordswarmy"
        // is too wide at 10px and gets clipped — show "Swarmy" instead. The
        // alias is purely cosmetic; tmux_target / display_name in the
        // registry stay unchanged.
        const tile = document.createElement('div');
        tile.className = 'agent-tile';
        tile.appendChild(btn);

        const nameLabel = document.createElement('div');
        nameLabel.className = 'agent-label';
        nameLabel.textContent = displayLabelFor(a);
        tile.appendChild(nameLabel);

        dock.appendChild(tile);
      });

      // Add (+) button at the end of the dock.
      const add = document.createElement('button');
      add.className = 'add-btn';
      add.title = 'Add agent';
      add.textContent = '+';
      add.addEventListener('click', toggleAddForm);
      dock.appendChild(add);
    }

    // ---------------------------------------------------------------------
    // Inline confirm — takes over the avatar with a ✓ ✗ pair until the user
    // picks one or 4s elapses (auto-cancels). The action callback only fires
    // on ✓. This is what makes a stray click ineffective: even if you somehow
    // hit the × badge, the destruction won't fire without a second click.
    // ---------------------------------------------------------------------
    let confirmTimer = null;
    function requestConfirm(tileEl, kind, onConfirm) {
      // Cancel any prior in-flight confirm (only one tile shows it at a time).
      document.querySelectorAll('.agent-btn.confirming').forEach(el => el.classList.remove('confirming'));
      if (confirmTimer) { clearTimeout(confirmTimer); confirmTimer = null; }

      const overlay = tileEl.querySelector('.confirm-overlay');
      const label = overlay.querySelector('.label');
      label.textContent = kind === 'remove' ? 'remove?' : 'restart?';
      tileEl.classList.add('confirming');

      // ✓ → run action
      const ok = overlay.querySelector('.ok');
      const no = overlay.querySelector('.no');
      const cleanup = () => {
        tileEl.classList.remove('confirming');
        if (confirmTimer) { clearTimeout(confirmTimer); confirmTimer = null; }
        ok.removeEventListener('click', okHandler);
        no.removeEventListener('click', noHandler);
      };
      const okHandler = (ev) => { ev.stopPropagation(); cleanup(); onConfirm(); };
      const noHandler = (ev) => { ev.stopPropagation(); cleanup(); };
      ok.addEventListener('click', okHandler);
      no.addEventListener('click', noHandler);

      // Auto-cancel after 4s so a forgotten confirm doesn't sit there waiting.
      confirmTimer = setTimeout(() => cleanup(), 4000);
    }

    // ---------------------------------------------------------------------
    // Right-click radial menu — fan-out per-agent action menu
    // ---------------------------------------------------------------------
    // Items, in order (matches Richard's spec):
    //   1. CWD: <current> → opens directory picker, writes back to registry
    //   2. Close active sessions → tmux kill-pane (destructive, inline confirm)
    //   3. Restart session → SIGINT, restart-loop respawns
    //   4. Attach → osascript opens iTerm tab with tmux attach + select-pane
    //
    // Items are positioned absolutely inside #radial-menu, which is fixed-
    // positioned at the right-clicked tile's center. Each item gets a stagger
    // delay so they fan out one after another, not all at once.

    const RADIAL_RADIUS = 95;
    // Four angles in the down-right quadrant. 0° = east, 90° = south.
    // Default sweep: ESE → SSW so menu hangs below the tile without colliding
    // with the dock above. If the tile is too close to the right edge for
    // those items to fit, openRadialMenu mirrors the angles to the left side.
    const RADIAL_ANGLES_RIGHT = [10, 45, 80, 115];
    const RADIAL_ANGLES_LEFT  = [170, 135, 100, 65];   // mirror across vertical axis

    let radialOpenForId = null;
    let radialDismissCleanup = null;

    function tildeCollapse(p) {
      if (!p) return '';
      // Renderer doesn't have process.env.HOME but we can guess via the
      // registry path stripping. The IPC tilde-collapses on save, so any
      // freshly-loaded registry value is already collapsed; this only matters
      // if a hand-edited registry has a literal /Users/... path. Best-effort.
      const home = (window.process && window.process.env && window.process.env.HOME) || '';
      if (home && p.startsWith(home + '/')) return '~' + p.slice(home.length);
      if (home && p === home) return '~';
      return p;
    }
    function truncatePath(p, max = 30) {
      if (!p || p.length <= max) return p;
      return '…' + p.slice(p.length - (max - 1));
    }

    function openRadialMenu(id, tileBtn) {
      // Tell main to suppress its native Reload/Quit context menu for this click.
      ipcRenderer.send('tile-rightclick-suppress');

      // If a menu is already open (for another tile), close it first.
      if (radialOpenForId) closeRadialMenu();

      const agent = agents[id];
      if (!agent) return;
      const menu = document.getElementById('radial-menu');
      menu.innerHTML = '';
      menu.classList.remove('open');

      // Position the container at the center of the right-clicked tile.
      const r = tileBtn.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      menu.style.left = `${cx}px`;
      menu.style.top = `${cy}px`;

      const cwdDisplay = truncatePath(tildeCollapse(agent.cwd || ''), 30);
      const items = [
        {
          icon: '📁',
          html: `<span class="key">CWD</span>${cwdDisplay || '(unset)'}`,
          action: () => doChangeCwd(id),
          danger: false
        },
        {
          icon: '⏹',
          html: `<span class="key">Close</span>active sessions`,
          action: (itemEl) => requestRadialConfirm(itemEl, 'kill?', () => doKillPane(id, tileBtn)),
          danger: true,
          // requestRadialConfirm handles its own cleanup; menu stays open until
          // confirm fires or auto-cancels.
          keepOpenOnClick: true
        },
        {
          icon: '⟳',
          html: `<span class="key">Restart</span>session`,
          action: () => doRestart(id, tileBtn),
          danger: false
        },
        {
          icon: '↗',
          html: `<span class="key">Attach</span>iTerm`,
          action: () => doAttach(id, tileBtn),
          danger: false
        }
      ];

      // Pick fan direction based on available space. If the tile is too close
      // to the right edge for the right-leaning fan to fit, mirror to the left.
      const fanLeft = cx + RADIAL_RADIUS + 220 > window.innerWidth;
      const angles = fanLeft ? RADIAL_ANGLES_LEFT : RADIAL_ANGLES_RIGHT;

      items.forEach((item, idx) => {
        const el = document.createElement('div');
        el.className = 'radial-item' + (item.danger ? ' danger' : '');
        el.innerHTML = `
          <div class="icon">${item.icon}</div>
          <div class="label">${item.html}</div>
          <div class="confirm">
            <span class="prompt"></span>
            <span class="ok">✓</span>
            <span class="no">✗</span>
          </div>
        `;
        // Per-item stagger via inline transition-delay. Closing animations
        // (when .open is removed) play in reverse order so the last-out is
        // the first-back.
        el.style.transitionDelay = `${idx * 60}ms`;

        // End position (open state): polar coord -> Cartesian, offset from the
        // item's own size so the icon roughly sits on the arc rather than the
        // item's top-left corner.
        const angle = angles[idx] * Math.PI / 180;
        const ex = Math.cos(angle) * RADIAL_RADIUS;
        const ey = Math.sin(angle) * RADIAL_RADIUS;
        // Anchor: items have label+icon, ~140px wide x ~32px tall. When fanning
        // left, anchor by the item's right edge so labels grow leftward
        // instead of overlapping the avatar.
        const anchorX = fanLeft ? -140 : -8;
        el.style.setProperty('--end-x', `${ex + anchorX}px`);
        el.style.setProperty('--end-y', `${ey - 16}px`);
        // Start at ~10% of the way out toward the destination so the fan looks
        // intentional — items appear to spring outward, not pop in place.
        el.style.setProperty('--start-x', `${ex * 0.1 + anchorX}px`);
        el.style.setProperty('--start-y', `${ey * 0.1 - 16}px`);

        el.addEventListener('click', (ev) => {
          ev.stopPropagation();
          item.action(el);
          if (!item.keepOpenOnClick) closeRadialMenu();
        });
        menu.appendChild(el);
      });

      // The menu items live in a fixed-position container — they're clipped
      // by the BrowserWindow viewport. Temporarily expand the window so the
      // fan-out has room to render. Compute the expanded bounds from the
      // menu's center and the maximum item end-position. closeRadialMenu()
      // restores via syncWindowSize().
      const maxOffset = RADIAL_RADIUS + 200;   // longest possible end-position
      const neededRight = cx + maxOffset;
      const neededBottom = cy + maxOffset;
      const curW = window.innerWidth;
      const curH = window.innerHeight;
      const expandW = Math.max(curW, Math.ceil(neededRight) + 28);
      const expandH = Math.max(curH, Math.ceil(neededBottom) + 28);
      if (expandW > curW || expandH > curH) {
        ipcRenderer.send('resize-window', { width: expandW, height: expandH });
      }

      // Force a reflow so the start positions land before .open animates.
      void menu.offsetWidth;
      menu.classList.add('open');
      radialOpenForId = id;

      // Dismiss handlers: outside click, Escape, scroll, window blur.
      const onPointerDown = (ev) => {
        if (!menu.contains(ev.target)) closeRadialMenu();
      };
      const onKey = (ev) => { if (ev.key === 'Escape') closeRadialMenu(); };
      const onScroll = () => closeRadialMenu();
      const onBlur = () => closeRadialMenu();
      // Use capture phase for pointerdown so we catch the click before any
      // tile's own handler retoggles selection.
      document.addEventListener('mousedown', onPointerDown, true);
      document.addEventListener('keydown', onKey);
      window.addEventListener('scroll', onScroll, true);
      window.addEventListener('blur', onBlur);
      radialDismissCleanup = () => {
        document.removeEventListener('mousedown', onPointerDown, true);
        document.removeEventListener('keydown', onKey);
        window.removeEventListener('scroll', onScroll, true);
        window.removeEventListener('blur', onBlur);
      };
    }

    function closeRadialMenu() {
      const menu = document.getElementById('radial-menu');
      menu.classList.remove('open');
      radialOpenForId = null;
      if (radialDismissCleanup) { radialDismissCleanup(); radialDismissCleanup = null; }
      // Hide the container after the closing animation finishes (keeps items
      // from blocking pointer events while invisible) and shrink the window
      // back to the panel's natural size.
      setTimeout(() => {
        if (!menu.classList.contains('open')) {
          menu.innerHTML = '';
          syncWindowSize();
        }
      }, 320);
    }

    // Inline confirm inside a radial item — used by the destructive "Close
    // active sessions" action. Replaces the item's icon + label with a
    // ✓ ✗ pair until one is clicked or 4s elapse.
    function requestRadialConfirm(itemEl, prompt, onConfirm) {
      const promptEl = itemEl.querySelector('.confirm .prompt');
      promptEl.textContent = prompt;
      itemEl.classList.add('confirming');
      const ok = itemEl.querySelector('.confirm .ok');
      const no = itemEl.querySelector('.confirm .no');
      let cancelled = false;
      const cleanup = () => {
        cancelled = true;
        itemEl.classList.remove('confirming');
        ok.removeEventListener('click', okHandler);
        no.removeEventListener('click', noHandler);
      };
      const okHandler = (ev) => { ev.stopPropagation(); cleanup(); onConfirm(); closeRadialMenu(); };
      const noHandler = (ev) => { ev.stopPropagation(); cleanup(); };
      ok.addEventListener('click', okHandler);
      no.addEventListener('click', noHandler);
      setTimeout(() => { if (!cancelled) cleanup(); }, 4000);
    }

    // ---------------------------------------------------------------------
    // Right-click action implementations
    // ---------------------------------------------------------------------
    async function doChangeCwd(id) {
      const dir = await ipcRenderer.invoke('pick-cwd');
      if (!dir) return;
      const result = await ipcRenderer.invoke('update-agent-cwd', { id, cwd: dir });
      if (!result.ok) {
        const tile = document.getElementById(`btn-${id}`);
        if (tile) flashTileError(tile, result.error);
        return;
      }
      // Refresh so the next radial-menu open shows the updated cwd, and any
      // subsequent Deploy uses the new path.
      await loadAndRender();
    }

    async function doKillPane(id, tileEl) {
      const result = await ipcRenderer.invoke('kill-pane', id);
      if (!result.ok) { flashTileError(tileEl, result.error); return; }
      // Status dot will flip grey on the next 3s poll. Pane is gone — until
      // re-Deploy.
    }

    async function doAttach(id, tileEl) {
      const result = await ipcRenderer.invoke('attach-pane', id);
      if (!result.ok) { flashTileError(tileEl, result.error); return; }
    }

    function toggleAgent(id) {
      agents[id].selected = !agents[id].selected;
      document.getElementById(`btn-${id}`).classList.toggle('active', agents[id].selected);
      updateRecipientSummary();
    }

    function selectAll() {
      const allOn = Object.values(agents).every(a => a.selected);
      Object.values(agents).forEach(a => {
        a.selected = !allOn;
        const btn = document.getElementById(`btn-${a.id}`);
        if (btn) btn.classList.toggle('active', a.selected);
      });
      updateRecipientSummary();
    }

    function updateRecipientSummary() {
      const selected = Object.values(agents).filter(a => a.selected);
      const total = Object.keys(agents).length;
      const summary = document.getElementById('recipient-summary');
      summary.classList.remove('broadcast');

      if (selected.length === 0) {
        summary.innerHTML = '<span class="pill">no recipients</span>';
        document.getElementById('chat-input').placeholder = 'Type a message — pick agents above to send';
      } else if (selected.length === total) {
        summary.classList.add('broadcast');
        summary.innerHTML = '<span class="pill">broadcast → all</span>';
        document.getElementById('chat-input').placeholder = 'Broadcast to every running pane';
      } else {
        summary.innerHTML = selected.map(a => `<span class="pill">${a.displayName}</span>`).join('');
        document.getElementById('chat-input').placeholder = `Message to ${selected.map(a => a.displayName).join(', ')}`;
      }
    }

    // ---------------------------------------------------------------------
    // Send + Deploy
    // ---------------------------------------------------------------------
    function send() {
      const input = document.getElementById('chat-input');
      const msg = input.value;
      if (!msg) return;
      const selected = Object.values(agents).filter(a => a.selected);
      if (selected.length === 0) return;
      const isAll = selected.length === Object.keys(agents).length;
      const payload = selected.map(a => ({ id: a.id, tmuxTarget: a.tmuxTarget }));
      ipcRenderer.send('broadcast-message', { message: msg, selectedAgents: payload, isAll });
      input.value = '';
      // Keep selection so consecutive messages don't require re-clicking. Power-user feel.
    }

    function deploy() {
      const ids = Object.values(agents).filter(a => a.selected).map(a => a.id);
      if (ids.length === 0) return;
      ipcRenderer.send('spawn-agents', ids);
    }

    // ---------------------------------------------------------------------
    // Add / Remove agent
    // ---------------------------------------------------------------------
    function toggleAddForm() {
      document.body.classList.toggle('adding');
      syncWindowSize();
      if (document.body.classList.contains('adding')) {
        document.getElementById('f-id').focus();
      }
    }

    async function pickCwd() {
      const dir = await ipcRenderer.invoke('pick-cwd');
      if (dir) document.getElementById('f-cwd').value = dir;
    }

    let pickedAvatarPath = null;
    async function pickAvatar() {
      const file = await ipcRenderer.invoke('pick-svg');
      if (file) {
        pickedAvatarPath = file;
        const parts = file.split('/');
        document.getElementById('f-avatar').value = parts[parts.length - 1];
      }
    }

    async function submitAdd() {
      const errEl = document.getElementById('f-error');
      errEl.textContent = '';
      const payload = {
        id: document.getElementById('f-id').value.trim(),
        displayName: document.getElementById('f-name').value.trim(),
        cwd: document.getElementById('f-cwd').value.trim(),
        color: document.getElementById('f-color').value,
        startupSlash: document.getElementById('f-slash').value.trim(),
        avatarSrc: pickedAvatarPath
      };
      const result = await ipcRenderer.invoke('add-agent', payload);
      if (!result.ok) { errEl.textContent = result.error || 'unknown error'; return; }
      // Reset form, close, reload.
      ['f-id', 'f-name', 'f-cwd', 'f-avatar'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('f-slash').value = '/gogo';
      pickedAvatarPath = null;
      document.body.classList.remove('adding');
      await loadAndRender();
    }

    async function doRemove(id, tileEl) {
      const result = await ipcRenderer.invoke('remove-agent', id);
      if (!result.ok) { flashTileError(tileEl, result.error); return; }
      await loadAndRender();
    }

    async function doRestart(id, tileEl) {
      const result = await ipcRenderer.invoke('restart-agent', id);
      if (!result.ok) { flashTileError(tileEl, result.error); return; }
      // SIGINT sent — restart loop respawns claude in ~3s. Status dot will
      // flicker grey then come back green on the next poll cycle.
    }

    // Briefly flash an error tooltip beneath the tile when an action fails
    // (e.g. trying to restart an agent that isn't running). Avoids alert().
    function flashTileError(tileEl, msg) {
      const overlay = tileEl.querySelector('.confirm-overlay');
      if (!overlay) return;
      const label = overlay.querySelector('.label');
      const prev = label.textContent;
      label.textContent = String(msg || 'failed').slice(0, 28);
      label.style.color = '#ff7090';
      tileEl.classList.add('confirming');
      setTimeout(() => {
        tileEl.classList.remove('confirming');
        label.textContent = prev;
        label.style.color = '';
      }, 1800);
    }

    // Edit-mode toggle. Off by default. Clicking the pencil/Edit button puts
    // the panel into a configuration view where the destructive badges
    // (× remove, ⟳ restart) are visible. Tile-body clicks are inert in this
    // mode so a stray miss doesn't toggle selection. Click the button again
    // (or trigger an action that re-renders) to exit.
    function toggleEditMode() {
      const on = !document.body.classList.contains('editing');
      document.body.classList.toggle('editing', on);
      document.getElementById('edit-btn').classList.toggle('active', on);
      // Cancel any open confirm when leaving edit mode.
      if (!on) {
        document.querySelectorAll('.agent-btn.confirming').forEach(el => el.classList.remove('confirming'));
      }
    }

    // ---------------------------------------------------------------------
    // Status polling — updates the green/grey dot per agent
    // ---------------------------------------------------------------------
    async function pollStatusOnce() {
      try {
        const statuses = await ipcRenderer.invoke('pane-status');
        statuses.forEach(s => {
          if (!agents[s.id]) return;
          agents[s.id].running = s.running;
          const dot = document.getElementById(`dot-${s.id}`);
          if (dot) dot.classList.toggle('on', s.running);
        });
      } catch (err) {
        // Quiet: if tmux isn't running, all dots stay grey, nothing to do.
      }
    }

    function startStatusPolling() {
      if (statusTimer) return;
      statusTimer = setInterval(pollStatusOnce, 3000);
    }

    // ---------------------------------------------------------------------
    // Wire-up
    // ---------------------------------------------------------------------
    document.getElementById('send-btn').addEventListener('click', send);
    document.getElementById('chat-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') send(); });
    document.getElementById('edit-btn').addEventListener('click', toggleEditMode);
    document.getElementById('select-all-btn').addEventListener('click', selectAll);
    document.getElementById('deploy-btn').addEventListener('click', deploy);
    document.getElementById('f-cwd-pick').addEventListener('click', pickCwd);
    document.getElementById('f-avatar-pick').addEventListener('click', pickAvatar);
    document.getElementById('f-cancel').addEventListener('click', () => { document.body.classList.remove('adding'); syncWindowSize(); });
    document.getElementById('f-submit').addEventListener('click', submitAdd);

    loadAndRender().then(startStatusPolling);
    window.addEventListener('resize', syncWindowSize);
  </script>
</body>
</html>
