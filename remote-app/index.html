</style>
</head>
<body>
  <div id="root"></div>
  <div class="action-toast" id="action-toast" aria-live="polite" aria-atomic="true"></div>
  <div class="settings-backdrop" id="settings-backdrop" aria-hidden="true"></div>
  <div class="add-overlay-backdrop" id="add-overlay-backdrop" aria-hidden="true"></div>

  <div class="chat-overlay" id="chat-overlay" aria-hidden="true">
    <div class="chat-topbar">
      <div class="channel-name">
        <span class="glyph">#</span>
        <span class="name">team</span>
        <span class="sub">richard + agents</span>
      </div>
      <div class="presence" id="chat-presence" aria-label="Agent presence">
        <!-- Pips and member count populated by renderChatPresence() -->
      </div>
    </div>

    <div class="chat-log" id="chat-log" role="log" aria-live="polite" aria-relevant="additions"></div>

    <div class="chat-error" id="chat-error" role="alert"></div>

    <div class="chat-composer" id="chat-composer">
      <div class="input-row">
        <textarea
          id="chat-textarea"
          placeholder="message the team"
          rows="1"
          autocomplete="off"
          aria-label="Message the team"></textarea>
        <button class="send-btn" id="chat-send-btn" disabled aria-label="Send message" title="Send (Enter)">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 12 L19 12 M13 6 L19 12 L13 18" />
          </svg>
        </button>
      </div>
      <div class="hint" aria-hidden="true"><kbd>↵</kbd> to send · <kbd>⇧↵</kbd> for newline</div>
    </div>
  </div>
  <script>
    /* ============================================================
       AgentRemote — keybinding map (ALS-001 #2 audit)
       ----------------------------------------------------------------
       1-5     short press   → toggle tile selection (chat-input not focused)
       1-5     long press    → start voice recording for that agent
                               (>250ms; release transcribes + sends just to
                               that agent, Esc / window-blur cancels)
       Cmd+Shift+Space       → global summon (system-wide, registered in
                               main.js registerGlobalShortcut). Forwards
                               'focus-chat-input' to the renderer.
       Esc                   → priority-stack: voice > add-form > drawer >
                               tile-popover. Each consumer pops one level.
       Enter (in chat input) → broadcast to selected agents
       Cmd+R / Cmd+Shift+R   → reload (Electron defaults — not blocked here)
       Block #4 (window-overlap): the BrowserWindow is now a workArea-sized
       transparent canvas. Renderer pings main.js via IPC ('set-ignore-mouse-
       events') based on whether the cursor is over a painted region, so
       transparent zones click through to underlying apps.
       ============================================================ */
    const { ipcRenderer } = require('electron');

    let AGENTS = [];
    const THEMES = {
      orange: { hex: '#e07c4c', name: 'Orange' },
      amber:  { hex: '#f0a14a', name: 'Amber' },
      rose:   { hex: '#e35d6a', name: 'Rose' },
      cyan:   { hex: '#5cc8d6', name: 'Cyan' },
      violet: { hex: '#9d7cf2', name: 'Violet' },
      lime:   { hex: '#bdd962', name: 'Lime' },
    };
    const BACKGROUNDS = [
      { id: 'aurora',     name: 'Aurora' },
      { id: 'mesh',       name: 'Mesh' },
      { id: 'iridescent', name: 'Iridescent' },
      { id: 'plasma',     name: 'Plasma' },
      { id: 'chrome',     name: 'Chrome' },
      { id: 'particles',  name: 'Particles' },
      { id: 'bands',      name: 'Bands' },
      { id: 'noir',       name: 'Noir' },
      { id: 'topo',       name: 'Topo' },
      { id: 'flat',       name: 'Flat' },
      { id: 'fluid',      name: 'Fluid',  disabled: true },
      { id: 'holo',       name: 'Holo',   disabled: true },
      { id: 'custom',     name: 'Custom', disabled: true },
    ];
    const STORAGE_KEY = 'agentremote.theme.v3';
    const DEFAULTS = {
      theme: 'orange',
      background: 'iridescent',
      motion: true,
      intensity: 0.6,
      speed: 1,
      blurAmount: 28,
      masterOpacity: 1,
      bgOpacity: 1,
      fluidResolution: 1,
      audioReactive: true,
      audioSens: 1.2,
      audioPulse: true,
      plasma: { c1: '#e07c4c', c2: '#7a4cff', c3: '#1ec4d6' },
      iridescent: { speed: 14, sat: 1.4, opacity: 0.95, edge: 14, bordered: true },
      chrome: { c1: '#9a9aab', c2: '#e8e8f0', c3: '#d4b86a', c4: '#d68a4a', speed: 14, opacity: 0.7, angle: 100 },
      fluid: { secondary: '#5b8cff', tertiary: '#2cc6d6' },
      custom: null,
      layout: 'panes',
      multiOn: false,
    };
    const BG_PRESETS = {
      iridescent: { intensity: 0.6, speed: 1.0, blurAmount: 28,
                    iridescent: { speed: 14, sat: 1.4, opacity: 0.95, edge: 14, bordered: true } },
      plasma:     { intensity: 0.7, speed: 0.7, blurAmount: 30 },
      chrome:     { intensity: 0.5, speed: 0.8, blurAmount: 22 },
      particles:  { intensity: 0.7, speed: 1.0, blurAmount: 26 },
      topo:       { intensity: 0.55, speed: 0.6, blurAmount: 24 },
      noir:       { intensity: 0.5, speed: 0.5, blurAmount: 22 },
      mesh:       { intensity: 0.5, speed: 0.7, blurAmount: 30 },
      aurora:     { intensity: 0.7, speed: 0.7, blurAmount: 30 },
      flat:       { intensity: 0.6, speed: 1.0, blurAmount: 28 },
    };

    function hexToRgba(hex, a) {
      const h = hex.replace('#', '');
      const r = parseInt(h.slice(0,2), 16);
      const g = parseInt(h.slice(2,4), 16);
      const b = parseInt(h.slice(4,6), 16);
      return `rgba(${r}, ${g}, ${b}, ${a})`;
    }
    function loadSettings() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return { ...DEFAULTS };
        const stored = JSON.parse(raw);
        const merged = { ...DEFAULTS, ...stored };
        for (const k of ['plasma', 'iridescent', 'chrome', 'fluid']) {
          merged[k] = { ...DEFAULTS[k], ...(stored[k] || {}) };
        }
        return merged;
      } catch (_) { return { ...DEFAULTS }; }
    }
    function saveSettings(s) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch (_) {}
    }

    const state = {
      settings: loadSettings(),
      selectedAgents: [],
      draft: '',
      editOn: false,
      gearOpen: false,
    };

    const root = document.getElementById('root');
    const toastEl = document.getElementById('action-toast');
    const backdropEl = document.getElementById('settings-backdrop');

    function el(tag, props, ...children) {
      const e = document.createElement(tag);
      if (props) {
        for (const [k, v] of Object.entries(props)) {
          if (v == null || v === false) continue;
          if (k === 'class') e.className = v;
          else if (k === 'html') e.innerHTML = v;
          else if (k === 'style') Object.assign(e.style, v);
          else if (k === 'dataset') Object.assign(e.dataset, v);
          else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2).toLowerCase(), v);
          else e.setAttribute(k, v);
        }
      }
      for (const c of children) {
        if (c == null || c === false) continue;
        e.appendChild(typeof c === 'string' || typeof c === 'number' ? document.createTextNode(String(c)) : c);
      }
      return e;
    }
    function svgPath(d, opts = {}) {
      const ns = 'http://www.w3.org/2000/svg';
      const s = document.createElementNS(ns, 'svg');
      s.setAttribute('viewBox', opts.viewBox || '0 0 24 24');
      if (opts.width) s.setAttribute('width', opts.width);
      if (opts.height) s.setAttribute('height', opts.height);
      s.setAttribute('fill', 'none');
      const p = document.createElementNS(ns, 'path');
      p.setAttribute('d', d);
      p.setAttribute('stroke', 'currentColor');
      p.setAttribute('stroke-width', opts.strokeWidth || '1.5');
      p.setAttribute('stroke-linecap', 'round');
      if (opts.linejoin) p.setAttribute('stroke-linejoin', opts.linejoin);
      s.appendChild(p);
      return s;
    }
    function gearSvg() {
      const ns = 'http://www.w3.org/2000/svg';
      const s = document.createElementNS(ns, 'svg');
      s.setAttribute('viewBox', '0 0 24 24'); s.setAttribute('width', '14'); s.setAttribute('height', '14');
      s.setAttribute('fill', 'none');
      const p = document.createElementNS(ns, 'path');
      p.setAttribute('d', 'M19.4 13a1.7 1.7 0 0 1 0-2L21 9.3l-2-3.5-2.2.7a1.7 1.7 0 0 1-1.7-1L14.4 3h-4l-.7 2.5a1.7 1.7 0 0 1-1.7 1l-2.2-.7-2 3.5L4.6 11a1.7 1.7 0 0 1 0 2L3 14.7l2 3.5 2.2-.7a1.7 1.7 0 0 1 1.7 1l.7 2.5h4l.7-2.5a1.7 1.7 0 0 1 1.7-1l2.2.7 2-3.5L19.4 13Z');
      p.setAttribute('stroke', 'currentColor'); p.setAttribute('stroke-width', '1.6'); p.setAttribute('stroke-linejoin', 'round');
      const c = document.createElementNS(ns, 'circle');
      c.setAttribute('cx','12'); c.setAttribute('cy','12'); c.setAttribute('r','2.6');
      c.setAttribute('stroke','currentColor'); c.setAttribute('stroke-width','1.6');
      s.appendChild(p); s.appendChild(c);
      return s;
    }

    let toastTimer = null;
    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1600);
    }

    function applyToPanel(panel) {
      const s = state.settings;
      const hex = THEMES[s.theme]?.hex || THEMES.orange.hex;
      panel.style.setProperty('--accent', hex);
      panel.style.setProperty('--accent-glow', hexToRgba(hex, 0.55));
      panel.style.setProperty('--accent-soft', hexToRgba(hex, 0.18));
      panel.style.setProperty('--master-opacity', s.masterOpacity);
      panel.style.setProperty('--bg-opacity', s.bgOpacity);
      panel.style.setProperty('--glass-blur', s.blurAmount + 'px');
      panel.classList.toggle('motion-off', !s.motion);
      panel.classList.toggle('has-iri-rim', s.background === 'iridescent' && s.iridescent.bordered);
    }

    function paintBackground(bgBase, texOverlay) {
      const s = state.settings;
      const id = s.background;
      bgBase.className = 'bg-base';
      bgBase.innerHTML = '';
      bgBase.style.cssText = '';
      texOverlay.innerHTML = '';
      // Rim layer is the iridescent bordered case — it's a sibling of bgBase
      // inside panel-shell at z:0 (below the glass veil at z:1). Clean up any
      // prior rim before repainting.
      if (panelEl) {
        Array.from(panelEl.querySelectorAll(':scope > .rim-layer')).forEach(n => n.remove());
      }
      const speedMul = s.motion ? (1 / Math.max(0.1, s.speed)) : 0;

      if (id === 'flat')   { bgBase.classList.add('bg-flat'); return; }
      if (id === 'mesh')   { bgBase.classList.add('bg-mesh'); bgBase.appendChild(el('span', { class: 'blob' })); return; }
      if (id === 'aurora') { bgBase.classList.add('bg-aurora'); return; }
      if (id === 'particles') {
        bgBase.classList.add('bg-particles');
        const tex = el('div', { class: 'tex-particles' });
        const seeds = Array.from({ length: 14 }, (_, i) => {
          const r1 = ((i * 9301 + 49297) % 233280) / 233280;
          const r2 = ((i * 7919 + 12345) % 233280) / 233280;
          const r3 = ((i * 31337 + 17) % 233280) / 233280;
          return {
            left: 5 + r1 * 90, top: 5 + r2 * 85,
            size: 6 + r3 * 10, delay: -r1 * 8, dur: 6 + r2 * 6,
            dx: (r3 - 0.5) * 80, dy: (r1 - 0.5) * 60,
            opacity: 0.55 + r2 * 0.4,
          };
        });
        for (const p of seeds) {
          const dot = el('span', { class: 'dot' });
          dot.style.cssText = `left:${p.left}%; top:${p.top}%; width:${p.size}px; height:${p.size}px; opacity:${p.opacity}; --dx:${p.dx}px; --dy:${p.dy}px; animation: dotFloat ${p.dur}s ease-in-out ${p.delay}s infinite alternate;`;
          tex.appendChild(dot);
        }
        texOverlay.appendChild(tex);
        return;
      }
      if (id === 'bands')  { bgBase.classList.add('bg-bands'); return; }
      if (id === 'noir')   { bgBase.classList.add('bg-noir'); texOverlay.appendChild(el('div', { class: 'tex-noir' })); return; }
      if (id === 'topo') {
        bgBase.classList.add('bg-topo');
        bgBase.appendChild(el('div', { class: 'topo-glow' }));
        const ns = 'http://www.w3.org/2000/svg';
        const wrap = el('div', { class: 'tex-topo' });
        const s2 = document.createElementNS(ns, 'svg');
        s2.setAttribute('viewBox', '0 0 780 246'); s2.setAttribute('preserveAspectRatio','none');
        const g = document.createElementNS(ns, 'g');
        g.setAttribute('stroke','var(--accent)'); g.setAttribute('fill','none');
        g.setAttribute('stroke-width','1.4'); g.setAttribute('opacity','0.55');
        [40, 70, 100, 130, 160, 190, 220].forEach((r, i) => {
          const e = document.createElementNS(ns, 'ellipse');
          e.setAttribute('cx', String(250 + i * 5));
          e.setAttribute('cy', '140');
          e.setAttribute('rx', String(r * 1.55));
          e.setAttribute('ry', String(r * 0.82));
          e.style.animation = `emberPulse ${10 + i}s ease-in-out ${-i * 0.7}s infinite alternate`;
          g.appendChild(e);
        });
        s2.appendChild(g); wrap.appendChild(s2); texOverlay.appendChild(wrap);
        return;
      }
      if (id === 'iridescent') {
        // Bordered: rainbow rim painted at z:0 (sibling of bgBase, below the
        // glass veil at z:1). The dark glass covers the center so only the
        // perimeter glow peeks out. .has-iri-rim class on panel-shell pushes
        // glass-fx alpha to ~0.96 so the cover is near-opaque.
        // Non-bordered: bg-iridescent fills the panel with the conic + radial veil.
        if (s.iridescent.bordered) {
          bgBase.classList.add('bg-flat');
          bgBase.style.background = '#07070d';
          const peak = 0.4 + (s.iridescent.edge / 60) * 1.2;
          const rim = el('div', { class: 'rim-layer' });
          const r1 = el('div', { class: 'tex-iri-rim' });
          r1.style.setProperty('--iri-sat', s.iridescent.sat);
          r1.style.setProperty('--iri-opacity', s.iridescent.opacity);
          const r2 = el('div', { class: 'tex-iri-light' });
          r2.style.setProperty('--iri-speed', (s.iridescent.speed * speedMul) + 's');
          r2.style.setProperty('--iri-peak', peak);
          r2.style.setProperty('--iri-opacity', s.iridescent.opacity);
          rim.appendChild(r1); rim.appendChild(r2);
          // Insert rim as the FIRST child of panelEl so it sits at z:0 with
          // bgBase, below the glass veil at z:1. The has-iri-rim class on
          // panel-shell makes glass-fx near-opaque so the rainbow is hidden
          // in the center, leaving only the soft outset glow on the edges.
          if (panelEl) panelEl.insertBefore(rim, panelEl.firstChild);
        } else {
          bgBase.classList.add('bg-iridescent');
          bgBase.style.setProperty('--iri-speed', (s.iridescent.speed * speedMul) + 's');
          bgBase.style.setProperty('--iri-sat', s.iridescent.sat);
          bgBase.style.setProperty('--iri-opacity', s.iridescent.opacity);
        }
        return;
      }
      if (id === 'plasma') {
        bgBase.classList.add('bg-plasma');
        bgBase.style.setProperty('--c1', s.plasma.c1);
        bgBase.style.setProperty('--c2', s.plasma.c2);
        bgBase.style.setProperty('--c3', s.plasma.c3);
        bgBase.style.setProperty('--plasma-speed', (14 * speedMul) + 's');
        bgBase.style.setProperty('--plasma-opacity', s.intensity * 1.3);
        return;
      }
      if (id === 'chrome') {
        bgBase.classList.add('bg-chrome');
        bgBase.style.setProperty('--cm1', s.chrome.c1);
        bgBase.style.setProperty('--cm2', s.chrome.c2);
        bgBase.style.setProperty('--cm3', s.chrome.c3);
        bgBase.style.setProperty('--cm4', s.chrome.c4);
        bgBase.style.setProperty('--chrome-speed', (s.chrome.speed * speedMul) + 's');
        bgBase.style.setProperty('--chrome-opacity', s.chrome.opacity);
        bgBase.style.setProperty('--chrome-angle', s.chrome.angle + 'deg');
        return;
      }
      // fluid / holo / custom — deferred. Fall back to flat.
      bgBase.classList.add('bg-flat');
    }

    function recipientText() {
      if (state.selectedAgents.length === 0) return 'no recipients';
      if (state.selectedAgents.length === AGENTS.length) return `all ${AGENTS.length} agents`;
      return state.selectedAgents
        .map(k => AGENTS.find(a => a.key === k)?.name)
        .filter(Boolean).join(' · ');
    }

    let panelEl, dockEl, chatInputEl, sendBtnEl, recipientEl, gearBtnEl,
        bgBaseEl, texOverlayEl, layoutPillEls, multiBtnEl, editBtnEl,
        allBtnEl, deployBtnEl, xBtnEl;

    function buildPanel() {
      bgBaseEl = el('div', { class: 'bg-base', 'aria-hidden': 'true' });
      texOverlayEl = el('div', { class: 'texture-overlay', 'aria-hidden': 'true' });
      const glass = el('div', { class: 'glass-fx' });

      gearBtnEl = el('button', {
        class: 'gear-btn', type: 'button',
        'aria-label': 'Appearance settings', title: 'Appearance',
        onClick: (e) => { e.stopPropagation(); toggleGear(); },
      }, gearSvg());

      dockEl = el('div', { class: 'dock' });
      for (const a of AGENTS) dockEl.appendChild(buildAgentTile(a));
      dockEl.appendChild(buildAddTile());

      chatInputEl = el('input', {
        class: 'chat-input', type: 'text',
        placeholder: 'Pick agents above, then type a message…',
        autocomplete: 'off',
        onInput: (e) => { state.draft = e.target.value; updateSendDisabled(); },
        onKeydown: (e) => {
          if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); }
        },
      });
      const chatWrap = el('div', { class: 'chat-wrap', onClick: () => chatInputEl.focus() }, chatInputEl);
      sendBtnEl = el('button', { class: 'send-btn', type: 'button', disabled: 'true', onClick: doSend }, 'SEND');
      const chatRow = el('div', { class: 'chat-row' }, chatWrap, sendBtnEl);

      recipientEl = el('div', { class: 'recipient-summary' }, recipientText());
      xBtnEl = el('button', {
        class: 'x-btn', type: 'button', 'aria-label': 'Clear', title: 'Clear selection + draft',
        onClick: doClear,
      }, svgPath('M1 1l7 7M8 1l-7 7', { viewBox: '0 0 9 9', width: 9, height: 9, strokeWidth: 1.4 }));

      const layoutPills = el('div', { class: 'layout-pills' });
      layoutPillEls = {};
      for (const id of ['panes', 'windows']) {
        const b = el('button', {
          class: 'layout-pill' + (state.settings.layout === id ? ' active' : ''),
          type: 'button',
          onClick: () => { state.settings.layout = id; saveSettings(state.settings); refreshLayoutPills(); },
        }, id.toUpperCase());
        layoutPillEls[id] = b;
        layoutPills.appendChild(b);
      }
      multiBtnEl = el('button', {
        class: 'layout-pill' + (state.settings.multiOn ? ' active' : ''),
        type: 'button',
        onClick: () => { state.settings.multiOn = !state.settings.multiOn; saveSettings(state.settings); refreshLayoutPills(); },
      }, 'MULTI');
      layoutPills.appendChild(multiBtnEl);

      editBtnEl = el('button', {
        class: 'util-btn' + (state.editOn ? ' active' : ''), type: 'button',
        title: 'Edit mode (placeholder — registry editing not wired in this build)',
        onClick: () => { state.editOn = !state.editOn; editBtnEl.classList.toggle('active', state.editOn); },
      }, 'EDIT');
      allBtnEl = el('button', {
        class: 'util-btn', type: 'button', title: 'Select all / clear all', onClick: doToggleAll,
      }, 'ALL');
      deployBtnEl = el('button', {
        class: 'util-btn deploy', type: 'button',
        title: 'Spawn selected agents (or all) in tmux', onClick: doDeploy,
      }, 'DEPLOY');

      const utilCluster = el('div', { class: 'util-cluster' },
        xBtnEl, layoutPills, editBtnEl, allBtnEl, deployBtnEl);
      const utilRow = el('div', { class: 'util-row' }, recipientEl, utilCluster);

      const content = el('div', { class: 'panel-content' }, dockEl, chatRow, utilRow);
      panelEl = el('div', { class: 'panel-shell' }, bgBaseEl, glass, gearBtnEl, texOverlayEl, content);
      root.appendChild(panelEl);
      applyToPanel(panelEl);
      paintBackground(bgBaseEl, texOverlayEl);
      refreshAllSelected();
    }

    function buildAgentTile(a) {
      const key = el('div', { class: 'agent-key' }, a.key);
      const img = el('img', { src: a.src, alt: a.name });
      img.onerror = () => { img.style.display = 'none'; };
      const dot = el('span', { class: 'status-dot' });
      const av = el('div', { class: 'agent-avatar' }, img, dot);
      const name = el('div', { class: 'agent-name' }, a.label);
      const tile = el('button', {
        class: 'agent-tile' + (state.selectedAgents.includes(a.key) ? ' selected' : ''),
        type: 'button',
        'aria-pressed': state.selectedAgents.includes(a.key) ? 'true' : 'false',
        dataset: { key: a.key },
        onClick: () => toggleAgent(a.key),
        onContextmenu: (e) => {
          e.preventDefault();
          // Tell main.js to suppress its native Reload/Quit context menu.
          // 250ms grace window matches main.js's lastTileRightClickAt check.
          ipcRenderer.send('tile-rightclick-suppress');
          openTilePopover(a, tile);
        },
      }, key, av, name);
      return tile;
    }
    function buildAddTile() {
      return el('button', {
        class: 'add-tile', type: 'button',
        'aria-label': 'Add agent',
        title: 'Add a new agent to the registry',
        onClick: openAddOverlay,
      }, svgPath('M7 1.5v11M1.5 7h11', { viewBox: '0 0 14 14', width: 14, height: 14 }));
    }

    // ----- Add-agent overlay --------------------------------------------------
    // Modal form. Opens centered above the panel; backdrop dims the rest. Esc
    // closes (with confirm if dirty); explicit X / Cancel always close. Backdrop
    // click closes only if the form is pristine — protects against accidental
    // mid-typing dismissal. Submits via ipcRenderer.invoke('add-agent', payload)
    // with the exact shape main.js's handler expects:
    //   { id, displayName, cwd, color, startupSlash, avatarSrc }
    const ADD_COLORS = ['cyan', 'green', 'yellow', 'orange', 'red', 'pink', 'purple', 'blue'];
    const addOverlayBackdropEl = document.getElementById('add-overlay-backdrop');
    let addOverlayEl = null;
    let addOverlayOpen = false;
    let addPickedAvatarPath = null;

    function buildAddOverlay() {
      const fields = {};

      // Header with title + close (X).
      const closeBtn = el('button', {
        class: 'add-overlay-close', type: 'button',
        'aria-label': 'Close', title: 'Close (Esc)',
        onClick: requestCloseAddOverlay,
      }, svgPath('M1 1l8 8M9 1l-8 8', { viewBox: '0 0 10 10', width: 10, height: 10, strokeWidth: 1.4 }));
      const head = el('div', { class: 'add-overlay-head' },
        el('div', { class: 'add-overlay-title' }, 'NEW AGENT'),
        closeBtn,
      );

      // Body — six rows.
      fields.id = el('input', {
        class: 'add-input', id: 'add-f-id', type: 'text',
        placeholder: 'lowercase, no spaces',
        autocomplete: 'off', spellcheck: 'false',
        onInput: (e) => {
          // Live-validate. Clear inline error once the value passes the regex.
          const v = e.target.value.trim();
          const ok = v.length === 0 || /^[a-z0-9_-]+$/.test(v);
          e.target.classList.toggle('invalid', !ok && v.length > 0);
          fields.idErr.textContent = (!ok && v.length > 0)
            ? 'lowercase a-z 0-9 _ - only'
            : '';
        },
      });
      fields.idErr = el('div', { class: 'add-field-error' });
      const idRow = el('div', { class: 'add-row' },
        el('div', { class: 'add-label' }, 'id'),
        fields.id,
        fields.idErr,
      );

      fields.name = el('input', {
        class: 'add-input', type: 'text',
        placeholder: 'display name (claude -n flag)',
        autocomplete: 'off',
      });
      const nameRow = el('div', { class: 'add-row' },
        el('div', { class: 'add-label' }, 'name'),
        fields.name,
      );

      fields.cwd = el('input', {
        class: 'add-input', type: 'text',
        placeholder: '~/path/to/project',
        autocomplete: 'off', spellcheck: 'false',
      });
      const cwdPick = el('button', {
        class: 'add-pick', type: 'button', title: 'Pick a directory',
        onClick: async () => {
          const dir = await ipcRenderer.invoke('pick-cwd');
          if (dir) fields.cwd.value = dir;
        },
      }, 'PICK');
      const cwdRow = el('div', { class: 'add-row has-pick' },
        el('div', { class: 'add-label' }, 'cwd'),
        fields.cwd,
        cwdPick,
      );

      fields.color = el('select', { class: 'add-select' },
        ...ADD_COLORS.map(c => el('option', { value: c }, c)),
      );
      const colorRow = el('div', { class: 'add-row' },
        el('div', { class: 'add-label' }, 'color'),
        fields.color,
      );

      fields.slash = el('input', {
        class: 'add-input', type: 'text',
        value: '/gogo',
        autocomplete: 'off', spellcheck: 'false',
      });
      const slashRow = el('div', { class: 'add-row' },
        el('div', { class: 'add-label' }, 'startup'),
        fields.slash,
      );

      fields.avatar = el('input', {
        class: 'add-input', type: 'text',
        placeholder: 'optional .svg path',
        readonly: 'true',
      });
      const avatarPick = el('button', {
        class: 'add-pick', type: 'button', title: 'Pick an .svg file',
        onClick: async () => {
          const file = await ipcRenderer.invoke('pick-svg');
          if (file) {
            addPickedAvatarPath = file;
            const parts = file.split('/');
            fields.avatar.value = parts[parts.length - 1];
          }
        },
      }, 'PICK');
      const avatarRow = el('div', { class: 'add-row has-pick' },
        el('div', { class: 'add-label' }, 'avatar'),
        fields.avatar,
        avatarPick,
      );

      const body = el('div', { class: 'add-overlay-body' },
        idRow, nameRow, cwdRow, colorRow, slashRow, avatarRow);

      // Footer — error slot + actions. Cancel always closes (no dirty check);
      // Submit fires the IPC handler, surfaces errors inline near submit.
      fields.formErr = el('div', { class: 'add-form-error' });
      const cancelBtn = el('button', {
        class: 'add-btn', type: 'button',
        onClick: () => closeAddOverlay(),
      }, 'CANCEL');
      const submitBtn = el('button', {
        class: 'add-btn submit', type: 'button',
        onClick: () => doAddAgentSubmit(fields, submitBtn),
      }, 'CREATE');
      const actions = el('div', { class: 'add-actions' }, cancelBtn, submitBtn);
      const foot = el('div', { class: 'add-overlay-foot' }, fields.formErr, actions);

      const overlay = el('div', {
        class: 'add-overlay', role: 'dialog',
        'aria-label': 'Add new agent', 'aria-hidden': 'true',
      }, head, body, foot);
      // Allow Enter to submit (except in the slash field where the user might
      // be typing a command with spaces — Enter still submits, no surprises).
      overlay.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          doAddAgentSubmit(fields, submitBtn);
        }
      });
      // Stash the field refs so close can reset them.
      overlay._fields = fields;
      overlay._submitBtn = submitBtn;
      return overlay;
    }

    function isAddFormDirty() {
      if (!addOverlayEl) return false;
      const f = addOverlayEl._fields;
      return Boolean(
        (f.id.value || '').trim() ||
        (f.name.value || '').trim() ||
        (f.cwd.value || '').trim() ||
        (f.avatar.value || '').trim() ||
        addPickedAvatarPath
      );
    }

    function resetAddForm() {
      if (!addOverlayEl) return;
      const f = addOverlayEl._fields;
      f.id.value = '';
      f.id.classList.remove('invalid');
      f.idErr.textContent = '';
      f.name.value = '';
      f.cwd.value = '';
      f.color.value = 'cyan';
      f.slash.value = '/gogo';
      f.avatar.value = '';
      f.formErr.textContent = '';
      addPickedAvatarPath = null;
    }

    function openAddOverlay() {
      if (!addOverlayEl) {
        addOverlayEl = buildAddOverlay();
        document.body.appendChild(addOverlayEl);
      }
      resetAddForm();
      // Grow the window first so the centered overlay renders fully — same
      // pattern the settings drawer uses (ensureWindowSizeFor 'drawer').
      ensureWindowSizeFor('add-form');
      addOverlayBackdropEl.classList.add('open');
      addOverlayBackdropEl.setAttribute('aria-hidden', 'false');
      addOverlayEl.classList.add('open');
      addOverlayEl.setAttribute('aria-hidden', 'false');
      addOverlayOpen = true;
      // Focus the first field after the open transition starts so the cursor
      // lands inside the input — matches the legacy build's UX.
      setTimeout(() => {
        try { addOverlayEl._fields.id.focus(); } catch (_) {}
      }, 60);
    }

    function closeAddOverlay() {
      if (!addOverlayOpen) return;
      addOverlayBackdropEl.classList.remove('open');
      addOverlayBackdropEl.setAttribute('aria-hidden', 'true');
      if (addOverlayEl) {
        addOverlayEl.classList.remove('open');
        addOverlayEl.setAttribute('aria-hidden', 'true');
      }
      addOverlayOpen = false;
      // Shrink window back to panel-only height.
      ensureWindowSizeFor('panel');
    }

    // Esc / X / Cancel route here. If the form has user input, prompt for a
    // confirm rather than nuking it; pristine form closes silently.
    function requestCloseAddOverlay() {
      if (isAddFormDirty()) {
        const ok = window.confirm('Discard the agent you started? Esc again to discard.');
        if (!ok) return;
      }
      closeAddOverlay();
    }

    async function doAddAgentSubmit(fields, submitBtn) {
      // Renderer-side validation mirrors main.js's add-agent guards so the user
      // gets a fast inline error rather than a round-trip rejection.
      fields.formErr.textContent = '';
      const id = (fields.id.value || '').trim().toLowerCase();
      if (!id) {
        fields.id.classList.add('invalid');
        fields.idErr.textContent = 'required';
        fields.id.focus();
        return;
      }
      if (!/^[a-z0-9_-]+$/.test(id)) {
        fields.id.classList.add('invalid');
        fields.idErr.textContent = 'lowercase a-z 0-9 _ - only';
        fields.id.focus();
        return;
      }
      const displayName = (fields.name.value || '').trim();
      if (!displayName) {
        fields.formErr.textContent = 'name required';
        fields.name.focus();
        return;
      }
      const cwd = (fields.cwd.value || '').trim();
      if (!cwd) {
        fields.formErr.textContent = 'cwd required';
        fields.cwd.focus();
        return;
      }
      const payload = {
        id,
        displayName,
        cwd,
        color: fields.color.value,
        startupSlash: (fields.slash.value || '').trim(),
        avatarSrc: addPickedAvatarPath,
      };

      submitBtn.disabled = true;
      try {
        const result = await ipcRenderer.invoke('add-agent', payload);
        if (!result || !result.ok) {
          fields.formErr.textContent = (result && result.error) || 'add failed';
          submitBtn.disabled = false;
          return;
        }
        // Success — append a tile to the dock for the new agent and close.
        // We keep the renderer's hardcoded labels for the original 5 untouched;
        // the new tile derives its label from displayName uppercased.
        appendNewAgentTile({ id, displayName });
        closeAddOverlay();
        showToast('AGENT ADDED');
      } catch (err) {
        fields.formErr.textContent = String((err && err.message) || err || 'add failed');
        submitBtn.disabled = false;
      }
    }

    // Append-only dock refresh after a successful add. The original 5 tiles
    // keep their hand-tuned labels; the new tile's label is derived from
    // displayName. The avatar src points to remote-app/assets/<id>.svg, which
    // main.js's add-agent handler just copied into place (or, if no SVG was
    // chosen, the img.onerror fallback in buildAgentTile hides the broken
    // image — a future follow-up could render a letter-disc fallback there).
    function appendNewAgentTile({ id, displayName }) {
      const nextKey = String(AGENTS.length + 1);
      const upperName = displayName.toUpperCase();
      // main.js's add-agent handler copies the picked SVG to assets/<id>.svg;
      // when no avatar was picked, the file doesn't exist and the img.onerror
      // in buildAgentTile silently hides the broken icon (existing behavior).
      const newAgent = {
        key: nextKey,
        id,
        name: upperName,
        label: upperName,
        src: `assets/${id}.svg`,
      };
      AGENTS.push(newAgent);
      // Insert before the add-tile (which is the last child).
      const addTile = dockEl.lastElementChild;
      const tile = buildAgentTile(newAgent);
      dockEl.insertBefore(tile, addTile);
    }

    function toggleAgent(key) {
      const idx = state.selectedAgents.indexOf(key);
      if (idx >= 0) state.selectedAgents.splice(idx, 1);
      else state.selectedAgents.push(key);
      refreshAgentTiles();
      refreshRecipientSummary();
      refreshAllSelected();
      updateSendDisabled();
    }
    function refreshAgentTiles() {
      Array.from(dockEl.children).forEach((tile) => {
        if (!tile.dataset || !tile.dataset.key) return;
        const sel = state.selectedAgents.includes(tile.dataset.key);
        tile.classList.toggle('selected', sel);
        tile.setAttribute('aria-pressed', sel ? 'true' : 'false');
      });
    }
    function refreshRecipientSummary() {
      recipientEl.textContent = recipientText();
      const n = state.selectedAgents.length;
      chatInputEl.placeholder = n === 0
        ? 'Pick agents above, then type a message…'
        : `Message ${n} ${n === 1 ? 'agent' : 'agents'}…`;
    }
    function refreshAllSelected() {
      const all = state.selectedAgents.length === AGENTS.length;
      allBtnEl.classList.toggle('active', all);
    }
    function refreshLayoutPills() {
      for (const [id, b] of Object.entries(layoutPillEls)) {
        b.classList.toggle('active', state.settings.layout === id);
      }
      multiBtnEl.classList.toggle('active', state.settings.multiOn);
    }
    function updateSendDisabled() {
      const ok = state.draft.trim().length > 0 && state.selectedAgents.length > 0;
      sendBtnEl.disabled = !ok;
    }
    function doToggleAll() {
      if (state.selectedAgents.length === AGENTS.length) state.selectedAgents = [];
      else state.selectedAgents = AGENTS.map(a => a.key);
      refreshAgentTiles();
      refreshRecipientSummary();
      refreshAllSelected();
      updateSendDisabled();
    }
    function doClear() {
      state.selectedAgents = [];
      state.draft = '';
      chatInputEl.value = '';
      refreshAgentTiles();
      refreshRecipientSummary();
      refreshAllSelected();
      updateSendDisabled();
    }

    /* IPC: layout map → main.js's layout names.
       PANES + multi=off → 'panes'    PANES + multi=on → 'tiled'
       WINDOWS + multi=off → 'windows' WINDOWS + multi=on → 'ittab' */
    function effectiveLayout() {
      const { layout, multiOn } = state.settings;
      if (layout === 'windows') return multiOn ? 'ittab' : 'windows';
      return multiOn ? 'tiled' : 'panes';
    }
    function doSend() {
      if (sendBtnEl.disabled) return;
      const msg = state.draft.trim();
      if (!msg) return;
      const ids = state.selectedAgents.map(k => AGENTS.find(a => a.key === k)?.id).filter(Boolean);
      if (!ids.length) return;
      const isAll = ids.length === AGENTS.length;
      // tmuxTarget mirrors the agent's lowercased pane title — same substring
      // rule main.js uses to resolve panes (`title.toLowerCase().includes(needle)`).
      // The id IS the lowercase target for every agent in the static list.
      const payload = ids.map(id => ({ id, tmuxTarget: id }));
      ipcRenderer.send('broadcast-message', { message: msg, selectedAgents: payload, isAll });
      showToast(`SENT → ${ids.length} ${ids.length === 1 ? 'AGENT' : 'AGENTS'}`);
      state.draft = '';
      chatInputEl.value = '';
      updateSendDisabled();
    }
    function doDeploy() {
      const ids = state.selectedAgents.length
        ? state.selectedAgents.map(k => AGENTS.find(a => a.key === k)?.id).filter(Boolean)
        : AGENTS.map(a => a.id);
      ipcRenderer.send('spawn-agents', { agents: ids, layout: effectiveLayout() });
      panelEl.classList.remove('flash-deploy');
      void panelEl.offsetWidth;
      panelEl.classList.add('flash-deploy');
      setTimeout(() => panelEl.classList.remove('flash-deploy'), 700);
      showToast('DEPLOYED');
    }

    /* ============================================================
       Per-tile right-click popover. CWD / KILL / RESTART / ATTACH —
       four IPC handlers that already exist in main.js. Single shared
       popover element, lazy-built on first open, repositioned each
       time. Closes on outside click, Escape, or scroll.
       ============================================================ */
    let tilePopoverEl = null;
    let tilePopoverAgent = null;
    let tilePopoverTile = null;

    function ensureTilePopover() {
      if (tilePopoverEl) return tilePopoverEl;
      tilePopoverEl = el('div', {
        class: 'tile-popover',
        role: 'menu',
        'aria-hidden': 'true',
        // Stop the document mousedown handler from immediately closing it.
        onMousedown: (e) => e.stopPropagation(),
      });
      document.body.appendChild(tilePopoverEl);
      return tilePopoverEl;
    }

    function openTilePopover(agent, tileEl) {
      const pop = ensureTilePopover();
      tilePopoverAgent = agent;
      tilePopoverTile = tileEl;
      pop.innerHTML = '';

      const head = el('div', { class: 'tile-popover-head' }, agent.label);
      pop.appendChild(head);
      pop.appendChild(buildPopAction({
        label: 'CWD',
        icon: 'M1 4l3-3h6l3 3v8a1 1 0 01-1 1H2a1 1 0 01-1-1V4z',
        onClick: () => tileActionCwd(agent),
      }));
      pop.appendChild(buildPopAction({
        label: 'ATTACH',
        icon: 'M3 11l4-4 4 4M7 7v6M2 2h10',
        onClick: () => tileActionAttach(agent),
      }));
      pop.appendChild(buildPopAction({
        label: 'RESTART',
        icon: 'M3 7a4 4 0 117 2.5M11 4v3h-3',
        onClick: () => tileActionRestart(agent),
      }));
      pop.appendChild(el('div', { class: 'tile-popover-divider' }));
      pop.appendChild(buildPopAction({
        label: 'KILL PANE',
        icon: 'M3 3l8 8M11 3l-8 8',
        danger: true,
        onClick: () => tileActionKill(agent),
      }));

      // Position relative to the tile. Anchor below by default; flip
      // above if there's not enough room. Keep within viewport horizontally.
      pop.classList.remove('open');
      pop.style.left = '0px';
      pop.style.top  = '0px';
      pop.style.setProperty('--tp-anchor-x', '50%');
      pop.style.setProperty('--tp-anchor-y', '0%');
      // Force a layout so the next frame's transition kicks in.
      void pop.offsetWidth;

      const tr = tileEl.getBoundingClientRect();
      const popW = pop.offsetWidth || 180;
      const popH = pop.offsetHeight || 160;
      const margin = 6;
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      let left = Math.round(tr.left + (tr.width - popW) / 2);
      left = Math.max(8, Math.min(vw - popW - 8, left));
      // Prefer below the tile. Flip above if no room. If neither side fits
      // (small window), fall back to below + clip to the viewport bottom so
      // the popover never lands off-screen.
      let top = Math.round(tr.bottom + margin);
      let anchorY = '0%';
      if (top + popH > vh - 8) {
        const flipped = Math.round(tr.top - popH - margin);
        if (flipped >= 8) {
          top = flipped;
          anchorY = '100%';
        } else {
          top = Math.max(8, vh - popH - 8);
        }
      }
      pop.style.left = left + 'px';
      pop.style.top  = top  + 'px';
      pop.style.setProperty('--tp-anchor-y', anchorY);
      pop.setAttribute('aria-hidden', 'false');
      requestAnimationFrame(() => pop.classList.add('open'));
    }

    function closeTilePopover() {
      if (!tilePopoverEl) return;
      tilePopoverEl.classList.remove('open');
      tilePopoverEl.setAttribute('aria-hidden', 'true');
      tilePopoverAgent = null;
      tilePopoverTile = null;
    }

    function buildPopAction({ label, icon, onClick, danger }) {
      const svg = svgPath(icon, { viewBox: '0 0 14 14', width: 12, height: 12, strokeWidth: 1.6 });
      const btn = el('button', {
        class: 'tile-popover-action' + (danger ? ' danger' : ''),
        type: 'button',
        role: 'menuitem',
        onClick: () => { closeTilePopover(); onClick(); },
      }, svg, el('span', null, label));
      return btn;
    }

    async function tileActionCwd(agent) {
      const picked = await ipcRenderer.invoke('pick-cwd');
      if (!picked) return;
      const res = await ipcRenderer.invoke('update-agent-cwd', { id: agent.id, cwd: picked });
      if (res && res.ok) showToast(`${agent.label} CWD → ${res.cwd}`);
      else showToast(`CWD UPDATE FAILED${res?.error ? ' — ' + res.error : ''}`);
    }
    async function tileActionAttach(agent) {
      const res = await ipcRenderer.invoke('attach-pane', agent.id);
      if (res && res.ok) showToast(`ATTACHED → ${agent.label}`);
      else showToast(res?.error ? `ATTACH: ${res.error.toUpperCase()}` : 'ATTACH FAILED');
    }
    async function tileActionRestart(agent) {
      const res = await ipcRenderer.invoke('restart-agent', agent.id);
      if (res && res.ok) showToast(`RESTARTING → ${agent.label}`);
      else showToast(res?.error ? `RESTART: ${res.error.toUpperCase()}` : 'RESTART FAILED');
    }
    async function tileActionKill(agent) {
      const res = await ipcRenderer.invoke('kill-pane', agent.id);
      if (res && res.ok) showToast(`KILLED → ${agent.label}`);
      else showToast(res?.error ? `KILL: ${res.error.toUpperCase()}` : 'KILL FAILED');
    }

    let drawerEl, drawerBodyEl, savedFlashEl;
    function buildDrawer() {
      savedFlashEl = el('div', { class: 'saved-flash' }, 'SAVED');
      const closeBtn = el('button', {
        class: 'settings-close', type: 'button',
        'aria-label': 'Close', title: 'Close (Esc)',
        onClick: closeGear,
      }, svgPath('M1 1l8 8M9 1l-8 8', { viewBox: '0 0 10 10', width: 10, height: 10, strokeWidth: 1.5 }));
      const resetBtn = el('button', {
        class: 'settings-reset', type: 'button',
        title: 'Reset all appearance settings', onClick: resetAppearance,
      }, 'RESET');
      const head = el('div', { class: 'settings-head' },
        el('h2', null, 'Appearance'),
        el('div', { class: 'settings-head-actions' }, resetBtn, closeBtn));
      drawerBodyEl = el('div', { class: 'settings-body' });
      drawerEl = el('aside', {
        class: 'settings-panel', role: 'dialog', 'aria-label': 'Appearance', 'aria-hidden': 'true',
      }, savedFlashEl, head, drawerBodyEl);
      document.body.appendChild(drawerEl);
      renderDrawerBody();
    }
    function renderDrawerBody() {
      drawerBodyEl.innerHTML = '';
      drawerBodyEl.appendChild(sectionAccent());
      drawerBodyEl.appendChild(sectionBackground());
      const perBg = sectionPerBackground();
      if (perBg) drawerBodyEl.appendChild(perBg);
      drawerBodyEl.appendChild(sectionMotion());
      drawerBodyEl.appendChild(sectionAppOpacity());
    }
    function sectionAccent() {
      const rail = el('div', { class: 'theme-rail' });
      for (const [key, t] of Object.entries(THEMES)) {
        const wrap = el('div', { class: 'theme-chip-wrap' });
        const chip = el('button', {
          class: 'theme-chip' + (state.settings.theme === key ? ' selected' : ''),
          'aria-label': t.name, type: 'button',
          style: { '--chip-color': t.hex },
          onClick: () => updateSetting({ theme: key }),
        });
        const label = el('div', { class: 'theme-chip-label' }, t.name);
        wrap.appendChild(chip); wrap.appendChild(label);
        rail.appendChild(wrap);
      }
      return el('div', { class: 'settings-section' }, el('h3', null, 'Accent color'), rail);
    }
    function sectionBackground() {
      const grid = el('div', { class: 'bg-grid' });
      for (const b of BACKGROUNDS) {
        const cls = 'bg-swatch'
          + (state.settings.background === b.id ? ' selected' : '')
          + (b.disabled ? ' disabled' : '');
        const fill = el('div', { class: 'swatch-fill', style: { background: bgPreviewCss(b.id) } });
        const lab = el('div', { class: 'swatch-label' }, b.name);
        const swatch = el('button', {
          class: cls, type: 'button',
          title: b.disabled ? `${b.name} — coming in a later iteration` : b.name,

      let left = rect.right - PANEL_W;
      if (left < margin) left = margin;
      if (left + PANEL_W > window.innerWidth - margin) left = window.innerWidth - PANEL_W - margin;
      let top = rect.bottom + 8;
      if (top + PANEL_MAX_H > window.innerHeight - margin) {
        top = Math.max(margin, rect.top - PANEL_MAX_H - 8);

      const anchorX = (rect.left + rect.width / 2) - left;
      drawerEl.style.left = left + 'px';
